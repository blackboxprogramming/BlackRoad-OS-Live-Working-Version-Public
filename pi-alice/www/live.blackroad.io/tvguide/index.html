<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/mockups/mockup-base.css">
  <title>TV Guide — BlackRoad OS Live</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:     #000000;
      --s1:     #0a0a0a;
      --s2:     #111111;
      --s3:     #1a1a1a;
      --s4:     #222222;
      --s5:     #333333;
      --border: #2a2a2a;
      --text:   #e5e5e5;
      --muted:  #737373;
      --dim:    #525252;
      --white:  #ffffff;
      --accent: #ff1d6c;
      --live:   #00e676;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
      overflow-x: hidden;
    }

    /* ══════════════════════════════
       TOP BAR
    ══════════════════════════════ */
    .topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      height: 56px;
      display: flex; align-items: center;
      padding: 0 24px; gap: 20px;
      background: rgba(0,0,0,0.95);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
    }

    .topbar-logo {
      font-size: 18px; font-weight: 700; color: var(--white);
      letter-spacing: -0.5px; flex-shrink: 0;
    }
    .topbar-logo span { color: var(--muted); font-weight: 400; }

    .topbar-nav {
      display: flex; align-items: center; gap: 4px;
    }
    .topbar-tab {
      padding: 6px 14px; border-radius: 6px;
      font-size: 13px; font-weight: 500; color: var(--muted);
      cursor: pointer; transition: all 0.15s;
    }
    .topbar-tab:hover { color: var(--text); background: var(--s3); }
    .topbar-tab.active { color: var(--white); background: var(--s4); }

    .topbar-spacer { flex: 1; }

    .topbar-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px; color: var(--muted);
    }
    .topbar-live {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 600; color: var(--live);
      text-transform: uppercase; letter-spacing: 0.08em;
    }
    .topbar-live-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--live);
      animation: pulse-dot 2s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ══════════════════════════════
       HERO / NOW PLAYING
    ══════════════════════════════ */
    .hero {
      margin-top: 56px;
      position: relative;
      height: 420px;
      overflow: hidden;
      cursor: pointer;
    }

    .hero-bg {
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        -45deg, #050505 0, #050505 20px, #0a0a0a 20px, #0a0a0a 40px
      );
    }
    .hero-overlay {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 60% 30%, rgba(255,29,108,0.08) 0%, transparent 60%);
    }
    .hero-gradient {
      position: absolute; bottom: 0; left: 0; right: 0; height: 70%;
      background: linear-gradient(to top, #000 0%, rgba(0,0,0,0.7) 50%, transparent 100%);
      z-index: 1;
    }
    .hero-icon {
      position: absolute; top: 50%; left: 60%;
      transform: translate(-50%, -50%);
      font-size: 200px; opacity: 0.04;
    }

    .hero-content {
      position: relative; z-index: 2;
      height: 100%;
      display: flex; flex-direction: column; justify-content: flex-end;
      padding: 0 40px 40px;
      max-width: 700px;
    }

    .hero-badge {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 11px; font-weight: 700; color: var(--live);
      text-transform: uppercase; letter-spacing: 0.12em;
      margin-bottom: 12px;
    }
    .hero-badge-dot {
      width: 6px; height: 6px; border-radius: 50%; background: var(--live);
      animation: pulse-dot 2s ease-in-out infinite;
    }

    .hero-show-title {
      font-size: 52px; font-weight: 700; color: var(--white);
      line-height: 1.05; letter-spacing: -1.5px;
      margin-bottom: 10px;
    }

    .hero-meta {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 14px;
    }
    .hero-channel {
      font-size: 13px; font-weight: 600; color: var(--accent);
    }
    .hero-time-slot {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px; color: var(--muted);
    }
    .hero-rating {
      font-size: 11px; font-weight: 600; color: var(--muted);
      border: 1px solid var(--s5); padding: 1px 6px; border-radius: 2px;
    }

    .hero-desc {
      font-size: 15px; color: var(--text); line-height: 1.5;
      max-width: 500px; margin-bottom: 20px;
      opacity: 0.85;
    }

    .hero-btns { display: flex; align-items: center; gap: 10px; }
    .hero-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 24px; border-radius: 6px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      border: none; transition: all 0.15s;
    }
    .hero-btn-play {
      background: var(--white); color: #000;
    }
    .hero-btn-play:hover { background: #ddd; }
    .hero-btn-fav {
      background: rgba(255,255,255,0.08); color: var(--white);
      border: 1px solid var(--s5);
    }
    .hero-btn-fav:hover { background: rgba(255,255,255,0.14); }
    .hero-btn-fav.added { border-color: var(--accent); color: var(--accent); }

    /* ══════════════════════════════
       FAVORITES BAR
    ══════════════════════════════ */
    .fav-section {
      padding: 28px 40px 0;
    }
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .section-title {
      font-size: 18px; font-weight: 600; color: var(--white);
    }
    .section-count {
      font-size: 12px; color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }

    .fav-row {
      display: flex; gap: 12px; overflow-x: auto;
      padding-bottom: 12px;
      scrollbar-width: thin;
      scrollbar-color: var(--s4) transparent;
    }
    .fav-row::-webkit-scrollbar { height: 4px; }
    .fav-row::-webkit-scrollbar-thumb { background: var(--s4); border-radius: 2px; }

    .fav-card {
      flex-shrink: 0;
      width: 200px;
      background: var(--s2);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }
    .fav-card:hover { border-color: var(--s5); transform: translateY(-2px); }
    .fav-card.empty {
      border-style: dashed;
      display: flex; align-items: center; justify-content: center;
      height: 140px;
    }
    .fav-card-empty-text {
      font-size: 12px; color: var(--dim); text-align: center; padding: 16px;
    }

    .fav-card-art {
      height: 90px;
      display: flex; align-items: center; justify-content: center;
      font-size: 40px;
      position: relative;
    }
    .fav-card-live {
      position: absolute; top: 6px; right: 6px;
      font-size: 9px; font-weight: 700; color: var(--live);
      background: rgba(0,0,0,0.7); padding: 2px 6px;
      border-radius: 3px; text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .fav-card-body { padding: 10px 12px; }
    .fav-card-name {
      font-size: 13px; font-weight: 600; color: var(--white);
      margin-bottom: 3px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .fav-card-now {
      font-size: 11px; color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .fav-card-remove {
      position: absolute; top: 6px; left: 6px;
      width: 20px; height: 20px; border-radius: 50%;
      background: rgba(0,0,0,0.7);
      color: var(--muted); font-size: 12px;
      display: none; align-items: center; justify-content: center;
      cursor: pointer; border: none;
    }
    .fav-card:hover .fav-card-remove { display: flex; }
    .fav-card-remove:hover { color: var(--accent); }

    /* ══════════════════════════════
       TV GUIDE GRID
    ══════════════════════════════ */
    .guide-section {
      padding: 28px 40px 60px;
    }

    .guide-controls {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 16px;
    }
    .guide-arrow {
      width: 32px; height: 32px; border-radius: 6px;
      background: var(--s3); border: 1px solid var(--border);
      color: var(--muted); font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.15s;
    }
    .guide-arrow:hover { color: var(--white); border-color: var(--s5); }

    .guide-date {
      font-size: 14px; font-weight: 500; color: var(--text);
    }

    .guide-filter {
      margin-left: auto;
      display: flex; gap: 4px;
    }
    .filter-chip {
      padding: 5px 12px; border-radius: 20px;
      font-size: 12px; font-weight: 500;
      background: var(--s2); border: 1px solid var(--border);
      color: var(--muted); cursor: pointer;
      transition: all 0.15s;
    }
    .filter-chip:hover { color: var(--text); border-color: var(--s5); }
    .filter-chip.active { color: var(--white); background: var(--s4); border-color: var(--s5); }

    /* Timeline header */
    .guide-grid {
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .guide-timeline {
      display: grid;
      grid-template-columns: 180px repeat(24, 1fr);
      background: var(--s2);
      border-bottom: 1px solid var(--border);
    }
    .guide-timeline-label {
      padding: 10px 14px;
      font-size: 11px; font-weight: 500; color: var(--dim);
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .guide-time-slot {
      padding: 10px 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; color: var(--muted);
      text-align: center;
      border-left: 1px solid var(--border);
    }
    .guide-time-slot.now { color: var(--live); font-weight: 600; }

    /* Channel rows */
    .guide-row {
      display: grid;
      grid-template-columns: 180px 1fr;
      min-height: 56px;
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    .guide-row:last-child { border-bottom: none; }
    .guide-row:hover { background: rgba(255,255,255,0.015); }

    .guide-channel {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 14px;
      border-right: 1px solid var(--border);
      cursor: pointer;
    }
    .guide-channel:hover .guide-ch-name { color: var(--white); }

    .guide-ch-icon {
      width: 32px; height: 32px; border-radius: 6px;
      background: var(--s3);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .guide-ch-info { overflow: hidden; }
    .guide-ch-name {
      font-size: 13px; font-weight: 600; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      transition: color 0.1s;
    }
    .guide-ch-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; color: var(--dim);
    }
    .guide-ch-live {
      margin-left: auto;
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--live); flex-shrink: 0;
      animation: pulse-dot 2s ease-in-out infinite;
    }

    .guide-programs {
      display: flex; align-items: stretch;
      position: relative;
      overflow: hidden;
    }

    .guide-program {
      display: flex; align-items: center;
      padding: 6px 12px;
      border-right: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
      position: relative;
      overflow: hidden;
    }
    .guide-program:hover { background: rgba(255,255,255,0.04); }
    .guide-program.now-playing {
      background: rgba(255,29,108,0.06);
      border-left: 2px solid var(--accent);
    }

    .gp-title {
      font-size: 12px; font-weight: 500; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .gp-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; color: var(--dim);
      margin-left: 8px; flex-shrink: 0;
    }
    .gp-fav-btn {
      position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
      font-size: 12px; color: var(--dim);
      cursor: pointer; opacity: 0;
      transition: opacity 0.15s;
    }
    .guide-program:hover .gp-fav-btn { opacity: 1; }
    .gp-fav-btn:hover { color: var(--accent); }

    /* ══════════════════════════════
       NOW PLAYING INDICATOR
    ══════════════════════════════ */
    .now-line {
      position: absolute; top: 0; bottom: 0;
      width: 2px; background: var(--accent);
      z-index: 10;
      pointer-events: none;
    }
    .now-line::before {
      content: 'NOW';
      position: absolute; top: -20px; left: 50%;
      transform: translateX(-50%);
      font-size: 9px; font-weight: 700; color: var(--accent);
      letter-spacing: 0.1em;
    }

    /* ══════════════════════════════
       PLAYER OVERLAY
    ══════════════════════════════ */
    .player-overlay {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,0.92);
      display: none; align-items: center; justify-content: center;
      backdrop-filter: blur(20px);
    }
    .player-overlay.open { display: flex; }

    .player-box {
      width: 90%; max-width: 900px;
      background: var(--s1); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
    }
    .player-screen {
      width: 100%; aspect-ratio: 16/9;
      background: #050505;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 12px;
      position: relative;
    }
    .player-icon { font-size: 64px; opacity: 0.6; }
    .player-channel-name {
      font-size: 20px; font-weight: 600; color: var(--white);
    }
    .player-show-name {
      font-size: 14px; color: var(--muted);
    }
    .player-live-badge {
      position: absolute; top: 16px; left: 16px;
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; font-weight: 700; color: var(--live);
      background: rgba(0,0,0,0.6); padding: 4px 10px;
      border-radius: 4px; text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .player-close {
      position: absolute; top: 16px; right: 16px;
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(0,0,0,0.6); border: none;
      color: var(--white); font-size: 18px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .player-close:hover { background: rgba(255,255,255,0.15); }

    .player-info { padding: 20px 24px; }
    .player-info-title {
      font-size: 16px; font-weight: 600; color: var(--white);
      margin-bottom: 6px;
    }
    .player-info-desc {
      font-size: 13px; color: var(--muted); line-height: 1.5;
      margin-bottom: 14px;
    }
    .player-info-meta {
      display: flex; gap: 16px;
      font-size: 12px; color: var(--dim);
    }
    .player-info-meta span { display: flex; align-items: center; gap: 4px; }

    /* ══════════════════════════════
       SCANLINES
    ══════════════════════════════ */
    .scanlines {
      position: fixed; inset: 0; z-index: 9999;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px, transparent 2px,
        rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px
      );
    }

    /* ══════════════════════════════
       RESPONSIVE
    ══════════════════════════════ */
    @media (max-width: 768px) {
      .topbar { padding: 0 16px; }
      .topbar-nav { display: none; }
      .hero { height: 300px; }
      .hero-content { padding: 0 20px 24px; }
      .hero-show-title { font-size: 32px; }
      .fav-section, .guide-section { padding-left: 16px; padding-right: 16px; }
      .guide-timeline, .guide-row { grid-template-columns: 120px 1fr; }
      .guide-controls { flex-wrap: wrap; }
      .guide-filter { margin-left: 0; }
    }
  </style>
</head>
<body>

  <!-- Scanlines -->
  <div class="scanlines"></div>

  <!-- Top Bar -->
  <div class="topbar">
    <div class="topbar-logo">TV Guide <span>/ BlackRoad OS</span></div>
    <div class="topbar-nav">
      <div class="topbar-tab active" data-view="guide">Guide</div>
      <div class="topbar-tab" data-view="favorites">My Shows</div>
      <div class="topbar-tab" data-view="live">Live Now</div>
    </div>
    <div class="topbar-spacer"></div>
    <div class="topbar-live"><div class="topbar-live-dot"></div> Live</div>
    <div class="topbar-time" id="clock">--:--:--</div>
  </div>

  <!-- Hero: Now Playing -->
  <div class="hero" id="hero">
    <div class="hero-bg"></div>
    <div class="hero-overlay"></div>
    <div class="hero-icon" id="heroIcon"></div>
    <div class="hero-gradient"></div>
    <div class="hero-content">
      <div class="hero-badge">
        <div class="hero-badge-dot"></div>
        <span>Now Playing</span>
      </div>
      <div class="hero-show-title" id="heroTitle">Loading...</div>
      <div class="hero-meta">
        <div class="hero-channel" id="heroChannel">--</div>
        <div class="hero-time-slot" id="heroTime">--</div>
        <div class="hero-rating" id="heroRating">LIVE</div>
      </div>
      <div class="hero-desc" id="heroDesc">Tune in to see what's broadcasting right now across the BlackRoad network.</div>
      <div class="hero-btns">
        <button class="hero-btn hero-btn-play" id="heroPlay">&#9654; Watch</button>
        <button class="hero-btn hero-btn-fav" id="heroFav">+ My Shows</button>
      </div>
    </div>
  </div>

  <!-- Favorites -->
  <div class="fav-section" id="favSection">
    <div class="section-header">
      <div class="section-title">My Shows</div>
      <div class="section-count" id="favCount">0 saved</div>
    </div>
    <div class="fav-row" id="favRow"></div>
  </div>

  <!-- Guide Grid -->
  <div class="guide-section">
    <div class="section-header">
      <div class="section-title">Channel Guide</div>
    </div>
    <div class="guide-controls">
      <div class="guide-arrow" id="prevDay">&#9664;</div>
      <div class="guide-date" id="guideDate">Today</div>
      <div class="guide-arrow" id="nextDay">&#9654;</div>
      <div class="guide-filter">
        <div class="filter-chip active" data-filter="all">All</div>
        <div class="filter-chip" data-filter="product">Products</div>
        <div class="filter-chip" data-filter="system">System</div>
        <div class="filter-chip" data-filter="live">Live Only</div>
      </div>
    </div>
    <div class="guide-grid" id="guideGrid"></div>
  </div>

  <!-- Player Overlay -->
  <div class="player-overlay" id="playerOverlay">
    <div class="player-box">
      <div class="player-screen" id="playerScreen">
        <div class="player-live-badge"><div class="topbar-live-dot"></div> Live</div>
        <button class="player-close" id="playerClose">&#10005;</button>
        <div class="player-icon" id="playerIcon"></div>
        <div class="player-channel-name" id="playerChannelName"></div>
        <div class="player-show-name" id="playerShowName"></div>
      </div>
      <div class="player-info">
        <div class="player-info-title" id="playerTitle"></div>
        <div class="player-info-desc" id="playerDesc"></div>
        <div class="player-info-meta" id="playerMeta"></div>
      </div>
    </div>
  </div>

<script>
// ═══════════════════════════════════════════
// CHANNELS
// ═══════════════════════════════════════════
const CHANNELS = [
  { ch: 1001, name: 'RoadTrip',        type: 'product', state: 'live', icon: '\u{1F30D}', agent: 'Roadie',     desc: 'Live agent chat, group memory, 27 agents coordinating' },
  { ch: 1002, name: 'RoadCode',        type: 'product', state: 'live', icon: '\u{1F4BB}', agent: 'Silas',      desc: 'Dev stream. Code, reviews, repo activity across 2,890 repos' },
  { ch: 1003, name: 'BackRoad',        type: 'product', state: 'live', icon: '\u{1F4E1}', agent: 'Calliope',   desc: 'Distribution engine. Content, social posting, marketing' },
  { ch: 1004, name: 'RoadView',        type: 'product', state: 'idle', icon: '\u{1F50D}', agent: 'Gematria',   desc: 'Search and discovery across the BlackRoad network' },

  { ch: 1010, name: 'RoadWorld',       type: 'product', state: 'live', icon: '\u{1F3AE}', agent: 'Gaia',       desc: 'Virtual worlds. Simulations, environments, physics live' },
  { ch: 1012, name: 'BlackBoard',      type: 'product', state: 'idle', icon: '\u{1F393}', agent: 'Alexandria', desc: 'Education. Lessons, tutorials, knowledge sharing' },
  { ch: 1013, name: 'RoadPay',         type: 'product', state: 'idle', icon: '\u{1F4B3}', agent: 'Atticus',    desc: 'Payments. Stripe transactions, invoices, revenue tracking' },
  { ch: 1014, name: 'Roadie',          type: 'product', state: 'live', icon: '\u{1F916}', agent: 'Roadie',     desc: 'Agent coordinator. Fleet checks, deploys, build operations' },

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let favorites = JSON.parse(localStorage.getItem('tvguide-favs') || '[]');
let currentFilter = 'all';
let dayOffset = 0;

// ═══════════════════════════════════════════
// SCHEDULE GENERATION
// ═══════════════════════════════════════════
function getShowForSlot(channelName, hour) {
  const shows = SHOW_LIBRARY[channelName] || ['Off Air'];
  const idx = hour % shows.length;
  return shows[idx];
}

function getDaypartLabel(hour) {
  if (hour < 6) return 'Late Night';
  if (hour < 12) return 'Morning';
  if (hour < 17) return 'Afternoon';
  if (hour < 21) return 'Evening';
  return 'Prime Time';
}

// ═══════════════════════════════════════════
// CLOCK
// ═══════════════════════════════════════════
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('en-US', { hour12: false });
}
setInterval(updateClock, 1000);
updateClock();

// ═══════════════════════════════════════════
// HERO
// ═══════════════════════════════════════════
function updateHero() {
  const now = new Date();
  const hour = now.getHours();
  const liveChannels = CHANNELS.filter(c => c.state === 'live');
  const featured = liveChannels[hour % liveChannels.length];
  const show = getShowForSlot(featured.name, hour);

  document.getElementById('heroIcon').textContent = featured.icon;
  document.getElementById('heroTitle').textContent = show;
  document.getElementById('heroChannel').textContent = 'CH ' + featured.ch + ' \u2014 ' + featured.name;
  document.getElementById('heroTime').textContent =
    String(hour).padStart(2,'0') + ':00 \u2013 ' + String((hour+1)%24).padStart(2,'0') + ':00';
  document.getElementById('heroRating').textContent = getDaypartLabel(hour).toUpperCase();
  document.getElementById('heroDesc').textContent = featured.desc;

  const isFav = favorites.includes(featured.ch);
  const favBtn = document.getElementById('heroFav');
  favBtn.textContent = isFav ? '\u2713 Saved' : '+ My Shows';
  favBtn.className = 'hero-btn hero-btn-fav' + (isFav ? ' added' : '');

  document.getElementById('heroPlay').onclick = () => openPlayer(featured, show);
  favBtn.onclick = () => {
    toggleFav(featured.ch);
    updateHero();
  };
  document.getElementById('hero').onclick = (e) => {
    if (e.target.closest('.hero-btn')) return;
    openPlayer(featured, show);
  };
}

// ═══════════════════════════════════════════
// FAVORITES
// ═══════════════════════════════════════════
function toggleFav(ch) {
  const idx = favorites.indexOf(ch);
  if (idx >= 0) favorites.splice(idx, 1);
  else favorites.push(ch);
  localStorage.setItem('tvguide-favs', JSON.stringify(favorites));
  renderFavorites();
}

function renderFavorites() {
  const row = document.getElementById('favRow');
  const count = document.getElementById('favCount');
  const hour = new Date().getHours();

  if (favorites.length === 0) {
    row.innerHTML = '<div class="fav-card empty"><div class="fav-card-empty-text">Click + My Shows on any channel to add favorites</div></div>';
    count.textContent = '0 saved';
    return;
  }

  count.textContent = favorites.length + ' saved';
  row.innerHTML = favorites.map(ch => {
    const c = CHANNELS.find(x => x.ch === ch);
    if (!c) return '';
    const show = getShowForSlot(c.name, hour);
    return `
      <div class="fav-card" onclick="openPlayer(CHANNELS.find(x=>x.ch===${c.ch}), '${show.replace(/'/g,"\\'")}')">
        <div class="fav-card-art" style="background:${c.state==='live' ? 'rgba(255,29,108,0.06)' : 'var(--s3)'}">
          ${c.state === 'live' ? '<div class="fav-card-live">Live</div>' : ''}
          ${c.icon}
        </div>
        <button class="fav-card-remove" onclick="event.stopPropagation();toggleFav(${c.ch});updateHero();">\u2715</button>
        <div class="fav-card-body">
          <div class="fav-card-name">${c.name}</div>
          <div class="fav-card-now">${show}</div>
        </div>
      </div>
    `;
  }).join('');
}

// ═══════════════════════════════════════════
// GUIDE GRID
// ═══════════════════════════════════════════
function renderGuide() {
  const grid = document.getElementById('guideGrid');
  const now = new Date();
  const currentHour = now.getHours();

  // Date label
  const d = new Date();
  d.setDate(d.getDate() + dayOffset);
  const dateStr = dayOffset === 0 ? 'Today' : dayOffset === 1 ? 'Tomorrow' : dayOffset === -1 ? 'Yesterday' :
    d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
  document.getElementById('guideDate').textContent = dateStr;

  // Filter channels
  let channels = CHANNELS;
  if (currentFilter === 'product') channels = CHANNELS.filter(c => c.type === 'product');
  else if (currentFilter === 'system') channels = CHANNELS.filter(c => c.type === 'system');
  else if (currentFilter === 'live') channels = CHANNELS.filter(c => c.state === 'live');

  // Timeline header (6 hour window centered on now)
  const startHour = Math.max(0, currentHour - 1);
  const hours = [];
  for (let i = 0; i < 6; i++) {
    hours.push((startHour + i) % 24);
  }

  let html = '<div class="guide-timeline">';
  html += '<div class="guide-timeline-label">Channel</div>';
  hours.forEach(h => {
    const isNow = (h === currentHour && dayOffset === 0);
    html += `<div class="guide-time-slot${isNow ? ' now' : ''}" style="grid-column: span 4">
      ${String(h).padStart(2,'0')}:00
    </div>`;
  });
  html += '</div>';

  // Channel rows
  channels.forEach(ch => {
    const isFav = favorites.includes(ch.ch);
    html += `<div class="guide-row">`;
    html += `<div class="guide-channel" onclick="toggleFav(${ch.ch});renderGuide();renderFavorites();updateHero();">
      <div class="guide-ch-icon">${ch.icon}</div>
      <div class="guide-ch-info">
        <div class="guide-ch-name">${ch.name}</div>
        <div class="guide-ch-num">CH ${ch.ch} ${isFav ? '\u2665' : ''}</div>
      </div>
      ${ch.state === 'live' && dayOffset === 0 ? '<div class="guide-ch-live"></div>' : ''}
    </div>`;

    html += '<div class="guide-programs">';
    hours.forEach(h => {
      const show = getShowForSlot(ch.name, h);
      const isNow = (h === currentHour && dayOffset === 0);
      html += `<div class="guide-program${isNow ? ' now-playing' : ''}"
                    style="flex:1" onclick="openPlayer(CHANNELS.find(x=>x.ch===${ch.ch}), '${show.replace(/'/g,"\\'")}')">
        <span class="gp-title">${show}</span>
        <span class="gp-time">${String(h).padStart(2,'0')}:00</span>
      </div>`;
    });
    html += '</div>';
    html += '</div>';
  });

  grid.innerHTML = html;
}

// ═══════════════════════════════════════════
// PLAYER
// ═══════════════════════════════════════════
function openPlayer(channel, showName) {
  const overlay = document.getElementById('playerOverlay');
  document.getElementById('playerIcon').textContent = channel.icon;
  document.getElementById('playerChannelName').textContent = channel.name;
  document.getElementById('playerShowName').textContent = showName;
  document.getElementById('playerTitle').textContent = showName + ' \u2014 ' + channel.name;
  document.getElementById('playerDesc').textContent = channel.desc;
  document.getElementById('playerMeta').innerHTML =
    `<span>CH ${channel.ch}</span>
     <span>${channel.agent} hosting</span>
     <span>${channel.state === 'live' ? 'Live' : 'Scheduled'}</span>
     <span>${channel.type}</span>`;
  overlay.classList.add('open');
}

document.getElementById('playerClose').onclick = () => {
  document.getElementById('playerOverlay').classList.remove('open');
};
document.getElementById('playerOverlay').onclick = (e) => {
  if (e.target === document.getElementById('playerOverlay'))
    document.getElementById('playerOverlay').classList.remove('open');
};
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape')
    document.getElementById('playerOverlay').classList.remove('open');
});

// ═══════════════════════════════════════════
// CONTROLS
// ═══════════════════════════════════════════
document.getElementById('prevDay').onclick = () => { dayOffset--; renderGuide(); };
document.getElementById('nextDay').onclick = () => { dayOffset++; renderGuide(); };

document.querySelectorAll('.filter-chip').forEach(chip => {
  chip.onclick = () => {
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    currentFilter = chip.dataset.filter;
    renderGuide();
  };
});

document.querySelectorAll('.topbar-tab').forEach(tab => {
  tab.onclick = () => {
    document.querySelectorAll('.topbar-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    const view = tab.dataset.view;
    if (view === 'favorites') {
      document.getElementById('favSection').scrollIntoView({ behavior: 'smooth' });
    } else if (view === 'live') {
      currentFilter = 'live';
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      document.querySelector('[data-filter="live"]').classList.add('active');
      renderGuide();
      document.getElementById('guideGrid').scrollIntoView({ behavior: 'smooth' });
    } else {
      document.getElementById('guideGrid').scrollIntoView({ behavior: 'smooth' });
    }
  };
});

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
updateHero();
renderFavorites();
renderGuide();

// Refresh every minute
setInterval(() => {
  updateHero();
  renderFavorites();
  renderGuide();
}, 60000);
</script>

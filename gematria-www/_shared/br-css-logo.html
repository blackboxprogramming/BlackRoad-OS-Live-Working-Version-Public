<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BR Logo Art Gallery</title>
<link rel="icon" type="image/png" href="https://images.blackroad.io/brand/favicon.png" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700;800&family=JetBrains+Mono:wght@300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; color: #fff; font-family: 'Space Grotesk', sans-serif; }

  .gallery {
    max-width: 1200px;
    margin: 0 auto;
    padding: 80px 24px;
  }

  .gallery h1 {
    font-size: 3rem;
    font-weight: 800;
    text-align: center;
    margin-bottom: 16px;
    letter-spacing: -2px;
  }

  .gallery .sub {
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    color: rgba(255,255,255,0.4);
    margin-bottom: 80px;
  }

  .section-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase;
    letter-spacing: 4px;
    margin-bottom: 32px;
    padding-bottom: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .art-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 32px;
    margin-bottom: 80px;
  }

  .art-card {
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 24px;
    padding: 48px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    transition: all 0.3s;
  }

  .art-card:hover {
    border-color: rgba(255,255,255,0.15);
    transform: translateY(-4px);
  }

  .art-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: rgba(255,255,255,0.3);
  }

  /* ── CSS-Only BR Mark ── */
  .br-mark {
    position: relative;
    width: 120px;
    height: 120px;
  }

  .br-mark .road {
    position: absolute;
    bottom: 10px;
    left: 15px;
    width: 90px;
    height: 40px;
    border: 3px solid #fff;
    border-radius: 0 0 40px 0;
    border-top: none;
    border-left: none;
    transform: rotate(-15deg);
  }

  .br-mark .road::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 0;
    width: 100%;
    height: 0;
    border-top: 2px dashed rgba(255,255,255,0.4);
  }

  .br-mark .letter-b {
    position: absolute;
    top: 5px;
    left: 10px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 72px;
    font-weight: 800;
    line-height: 1;
    color: transparent;
    -webkit-text-stroke: 2px #fff;
  }

  .br-mark .letter-r {
    position: absolute;
    top: 5px;
    left: 55px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 72px;
    font-weight: 800;
    line-height: 1;
    color: transparent;
    -webkit-text-stroke: 2px #fff;
  }

  /* ── Neon Version ── */
  .neon-mark img {
    filter: drop-shadow(0 0 8px rgba(136,68,255,0.5)) drop-shadow(0 0 20px rgba(136,68,255,0.3));
  }

  /* ── Glitch Version ── */
  .glitch-mark {
    position: relative;
  }

  .glitch-mark img {
    animation: glitch 3s ease-in-out infinite;
  }

  @keyframes glitch {
    0%, 90%, 100% { transform: translate(0); filter: none; }
    92% { transform: translate(-3px, 1px); filter: hue-rotate(90deg); }
    94% { transform: translate(2px, -1px); filter: hue-rotate(180deg); }
    96% { transform: translate(-1px, 2px); filter: hue-rotate(270deg); }
    98% { transform: translate(3px, -2px); filter: hue-rotate(0deg); }
  }

  /* ── Scanlines ── */
  .scanline-mark {
    position: relative;
    overflow: hidden;
  }

  .scanline-mark::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.15) 2px,
      rgba(0,0,0,0.15) 4px
    );
    pointer-events: none;
    border-radius: inherit;
  }

  /* ── Holographic ── */
  .holo-mark {
    position: relative;
  }

  .holo-mark img {
    animation: holo-shift 4s ease-in-out infinite;
  }

  .holo-mark::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
      135deg,
      rgba(255,107,43,0.2) 0%,
      rgba(255,34,85,0.2) 25%,
      rgba(204,0,170,0.2) 50%,
      rgba(136,68,255,0.2) 75%,
      rgba(68,136,255,0.2) 100%
    );
    background-size: 200% 200%;
    animation: holo-bg 3s ease infinite;
    border-radius: 24px;
    mix-blend-mode: overlay;
    pointer-events: none;
  }

  @keyframes holo-shift {
    0%, 100% { filter: brightness(1) contrast(1); }
    50% { filter: brightness(1.1) contrast(1.05); }
  }

  @keyframes holo-bg {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  /* ── Particle Ring ── */
  .particle-mark {
    position: relative;
  }

  .particle-mark::before,
  .particle-mark::after {
    content: '';
    position: absolute;
    width: 8px;
    height: 8px;
    background: #fff;
    border-radius: 50%;
    opacity: 0.4;
  }

  .particle-mark::before {
    animation: orbit 3s linear infinite;
    top: -4px;
    left: 50%;
  }

  .particle-mark::after {
    animation: orbit 3s linear infinite reverse;
    bottom: -4px;
    right: 50%;
    width: 5px;
    height: 5px;
    opacity: 0.2;
  }

  @keyframes orbit {
    0% { transform: rotate(0deg) translateX(70px) rotate(0deg); }
    100% { transform: rotate(360deg) translateX(70px) rotate(-360deg); }
  }

  /* ── Matrix Rain Background ── */
  .matrix-mark {
    position: relative;
    overflow: hidden;
  }

  .matrix-mark::before {
    content: '01001010 11000010 10110101 01001010';
    position: absolute;
    top: -20px;
    left: 0;
    width: 100%;
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    color: rgba(255,255,255,0.06);
    word-break: break-all;
    line-height: 1.2;
    animation: matrix-scroll 10s linear infinite;
    pointer-events: none;
  }

  @keyframes matrix-scroll {
    0% { transform: translateY(0); }
    100% { transform: translateY(-20px); }
  }

  /* ── Gradient border rotation ── */
  .gradient-border-mark {
    position: relative;
    padding: 4px;
    border-radius: 28px;
    background: conic-gradient(from var(--angle, 0deg), #FF6B2B, #FF2255, #CC00AA, #8844FF, #4488FF, #00D4FF, #FF6B2B);
    animation: border-rotate 4s linear infinite;
  }

  .gradient-border-mark img {
    border-radius: 24px;
  }

  @property --angle {
    syntax: '<angle>';
    initial-value: 0deg;
    inherits: false;
  }

  @keyframes border-rotate {
    to { --angle: 360deg; }
  }

  /* ── Motion video card ── */
  .motion-card {
    position: relative;
    overflow: hidden;
    border-radius: 24px;
    aspect-ratio: 1;
    max-width: 280px;
  }

  .motion-card video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: grayscale(50%) contrast(1.1);
  }

  .motion-card::after {
    content: 'BR';
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 5rem;
    font-weight: 800;
    color: #fff;
    text-shadow: 0 0 40px rgba(0,0,0,0.8);
    mix-blend-mode: difference;
  }

  footer {
    text-align: center;
    padding: 40px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: rgba(255,255,255,0.2);
    border-top: 1px solid rgba(255,255,255,0.05);
  }
</style>
<link rel="stylesheet" href="https://images.blackroad.io/brand/brand.css"></head>
<body>

<div class="gallery">
  <h1>BR Logo Art</h1>
  <p class="sub">10 treatments of the BlackRoad mark</p>

  <!-- Standard -->
  <div class="section-title">Standard Marks</div>
  <div class="art-grid">
    <div class="art-card">
      <img src="https://images.blackroad.io/brand/br-square-128.png" width="128" height="128" style="border-radius:24px;" />
      <span class="art-label">Square</span>
    </div>
    <div class="art-card">
      <img src="https://images.blackroad.io/brand/br-circle-128.png" width="128" height="128" style="border-radius:50%;" />
      <span class="art-label">Circle</span>
    </div>
    <div class="art-card">
      <div class="br-mark">
        <span class="letter-b">B</span>
        <span class="letter-r">R</span>
        <div class="road"></div>
      </div>
      <span class="art-label">CSS-Only</span>
    </div>
  </div>

  <!-- Effects -->
  <div class="section-title">Effects</div>
  <div class="art-grid">
    <div class="art-card neon-mark">
      <img src="https://images.blackroad.io/brand/br-square-128.png" width="128" height="128" style="border-radius:24px;" />
      <span class="art-label">Neon</span>
    </div>
    <div class="art-card glitch-mark">
      <img src="https://images.blackroad.io/brand/br-square-128.png" width="128" height="128" style="border-radius:24px;" />
      <span class="art-label">Glitch</span>
    </div>
    <div class="art-card scanline-mark" style="border-radius:24px;">
      <img src="https://images.blackroad.io/brand/br-square-128.png" width="128" height="128" style="border-radius:24px;" />
      <span class="art-label">Scanlines</span>
    </div>
    <div class="art-card holo-mark">
      <img src="https://images.blackroad.io/brand/br-square-128.png" width="128" height="128" style="border-radius:24px;" />
      <span class="art-label">Holographic</span>
    </div>
    <div class="art-card particle-mark" style="display:flex;align-items:center;justify-content:center;min-height:200px;">
      <img src="https://images.blackroad.io/brand/br-circle-128.png" width="100" height="100" style="border-radius:50%;" />
      <span class="art-label" style="position:absolute;bottom:16px;">Orbit</span>
    </div>
    <div class="art-card">
      <div class="gradient-border-mark">
        <img src="https://images.blackroad.io/brand/br-square-128.png" width="128" height="128" />
      </div>
      <span class="art-label">Gradient Ring</span>
    </div>
  </div>

  <!-- Motion -->
  <div class="section-title">Motion</div>
  <div class="art-grid">
    <div class="art-card" style="padding:0;overflow:hidden;">
      <div class="motion-card">
        <video autoplay muted loop playsinline>
          <source src="https://images.blackroad.io/brand/br-motion-logo.mp4" type="video/mp4" />
        </video>
      </div>
      <span class="art-label" style="padding:16px 0;">Motion + Typography</span>
    </div>
    <div class="art-card matrix-mark" style="min-height:200px;display:flex;align-items:center;justify-content:center;">
      <img src="https://images.blackroad.io/brand/br-square-128.png" width="128" height="128" style="border-radius:24px;position:relative;z-index:1;" />
      <span class="art-label" style="position:absolute;bottom:16px;">Matrix</span>
    </div>
  </div>
</div>

<footer>&copy; 2026 BlackRoad OS, Inc. — Pave Tomorrow.</footer>
</body>
</html>

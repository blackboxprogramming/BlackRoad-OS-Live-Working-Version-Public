<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlackRoad OS</title>
<link rel="icon" type="image/png" href="https://images.blackroad.io/brand/favicon.png" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    color: #fff;
    font-family: 'Space Grotesk', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Road lines background */
  .road-bg {
    position: fixed;
    inset: 0;
    background:
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 98px,
        rgba(255,255,255,0.015) 98px,
        rgba(255,255,255,0.015) 100px
      );
    animation: road-scroll 20s linear infinite;
  }

  @keyframes road-scroll {
    0% { transform: translateY(0); }
    100% { transform: translateY(100px); }
  }

  /* Center line moving */
  .center-line {
    position: fixed;
    left: 50%;
    top: 0;
    width: 3px;
    height: 100vh;
    transform: translateX(-50%);
    background: repeating-linear-gradient(
      180deg,
      rgba(255,255,255,0.06) 0,
      rgba(255,255,255,0.06) 30px,
      transparent 30px,
      transparent 60px
    );
    animation: line-scroll 2s linear infinite;
  }

  @keyframes line-scroll {
    0% { transform: translateX(-50%) translateY(0); }
    100% { transform: translateX(-50%) translateY(60px); }
  }

  /* Logo */
  .splash-logo {
    position: relative;
    z-index: 10;
    animation: logo-enter 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    opacity: 0;
  }

  .splash-logo img {
    width: 160px;
    height: 160px;
    border-radius: 32px;
    box-shadow:
      0 0 40px rgba(255,255,255,0.05),
      0 0 80px rgba(136,68,255,0.1);
  }

  @keyframes logo-enter {
    0% { opacity: 0; transform: scale(0.5) translateY(60px); }
    60% { opacity: 1; transform: scale(1.05) translateY(-5px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* Gradient ring around logo */
  .splash-logo::before {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 36px;
    background: conic-gradient(from 0deg, #FF6B2B, #FF2255, #CC00AA, #8844FF, #4488FF, #00D4FF, #FF6B2B);
    animation: ring-spin 4s linear infinite;
    z-index: -1;
    opacity: 0.4;
  }

  @keyframes ring-spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  /* Title */
  .splash-title {
    font-size: 3rem;
    font-weight: 700;
    letter-spacing: -1px;
    margin-top: 32px;
    opacity: 0;
    animation: text-enter 0.8s ease forwards 0.4s;
  }

  .splash-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9rem;
    color: rgba(255,255,255,0.4);
    margin-top: 12px;
    opacity: 0;
    animation: text-enter 0.8s ease forwards 0.7s;
  }

  @keyframes text-enter {
    0% { opacity: 0; transform: translateY(20px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  /* Tagline */
  .splash-tagline {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: rgba(255,255,255,0.25);
    position: fixed;
    bottom: 32px;
    opacity: 0;
    animation: text-enter 0.8s ease forwards 1.2s;
  }

  /* Loading bar */
  .splash-bar {
    width: 200px;
    height: 2px;
    background: rgba(255,255,255,0.05);
    border-radius: 1px;
    margin-top: 32px;
    overflow: hidden;
    opacity: 0;
    animation: text-enter 0.8s ease forwards 0.9s;
  }

  .splash-bar-fill {
    height: 100%;
    width: 0;
    background: linear-gradient(90deg, #FF6B2B, #FF2255, #CC00AA, #8844FF, #4488FF);
    border-radius: 1px;
    animation: bar-fill 2s ease forwards 1s;
  }

  @keyframes bar-fill {
    0% { width: 0; }
    100% { width: 100%; }
  }

  /* Stats row */
  .splash-stats {
    display: flex;
    gap: 40px;
    margin-top: 40px;
    opacity: 0;
    animation: text-enter 0.8s ease forwards 1.5s;
  }

  .splash-stat {
    text-align: center;
  }

  .splash-stat-num {
    font-size: 1.8rem;
    font-weight: 700;
    background: linear-gradient(135deg, #FF6B2B, #FF2255, #8844FF, #4488FF);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .splash-stat-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-top: 4px;
  }

  @media (max-width: 600px) {
    .splash-logo img { width: 100px; height: 100px; border-radius: 24px; }
    .splash-logo::before { border-radius: 28px; }
    .splash-title { font-size: 2rem; }
    .splash-stats { gap: 20px; }
    .splash-stat-num { font-size: 1.2rem; }
  }
</style>
</head>
<body>
  <div class="road-bg"></div>
  <div class="center-line"></div>

  <div class="splash-logo">
    <img src="https://images.blackroad.io/brand/br-square-512.png" alt="BlackRoad OS" />
  </div>

  <div class="splash-title">BlackRoad OS</div>
  <div class="splash-sub">Sovereign AI Orchestration</div>

  <div class="splash-bar">
    <div class="splash-bar-fill"></div>
  </div>

  <div class="splash-stats">
    <div class="splash-stat">
      <div class="splash-stat-num">50</div>
      <div class="splash-stat-label">AI Skills</div>
    </div>
    <div class="splash-stat">
      <div class="splash-stat-num">52</div>
      <div class="splash-stat-label">TOPS</div>
    </div>
    <div class="splash-stat">
      <div class="splash-stat-num">5</div>
      <div class="splash-stat-label">Nodes</div>
    </div>
    <div class="splash-stat">
      <div class="splash-stat-num">275+</div>
      <div class="splash-stat-label">Repos</div>
    </div>
  </div>

  <div class="splash-tagline">Pave Tomorrow.</div>
</body>
</html>

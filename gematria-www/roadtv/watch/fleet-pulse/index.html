<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fleet Pulse — Road TV</title>
  <meta name="description" content="Real-time visualization of the 5 BlackRoad Pi nodes, their WireGuard tunnels, and pulse status.">
  <link rel="icon" type="image/svg+xml" href="https://blackroad.io/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700;800&family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../../_shared/design.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    .back-nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 16px 24px;
      background: rgba(0,0,0,0.85); backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex; align-items: center; justify-content: space-between;
    }
    .back-nav a {
      font-family: 'JetBrains Mono', monospace; font-size: 0.8rem;
      color: rgba(255,255,255,0.6); text-decoration: none; transition: color 0.2s;
    }
    .back-nav a:hover { color: #fff; }
    .back-nav .title {
      font-family: 'Space Grotesk', sans-serif; font-size: 0.9rem;
      font-weight: 700; color: #fff;
    }

    .viz-container {
      position: fixed; inset: 0;
      background: #000;
    }
    .viz-container canvas {
      width: 100%; height: 100%;
    }

    .info-panel {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
      padding: 16px 24px;
      background: rgba(0,0,0,0.9); backdrop-filter: blur(12px);
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .info-panel h2 {
      font-family: 'Space Grotesk', sans-serif; font-size: 1rem;
      font-weight: 700; color: #fff; margin-bottom: 4px;
    }
    .info-panel p {
      font-family: 'JetBrains Mono', monospace; font-size: 0.7rem;
      color: rgba(255,255,255,0.45); line-height: 1.5;
    }
  </style>
<script src="https://bb.blackroad.io/bb.js" defer></script>
<script src="https://blackroad.io/nav.js" defer></script>
<script src="https://blackroad.io/footer.js" defer></script>
<script src="https://blackroad.systems.js" defer></script>
<script src="https://blackroad.io.js" defer></script>
<script src="https://blackroad.io/pulse.js" defer></script>
<script src="https://blackroad.io/related.js" defer></script>
  <script src="https://blackroad-mesh.amundsonalexa.workers.dev/mesh.js" defer></script>
</head>
<body>

  <div class="back-nav">
    <a href="../../">&larr; Road TV</a>
    <span class="title">Fleet Pulse</span>
    <span></span>
  </div>

  <div class="viz-container">
    <canvas id="fleet-canvas"></canvas>
  </div>

  <div class="info-panel">
    <h2>Fleet Pulse</h2>
    <p>Real-time visualization of the 5 Pi nodes. Each dot pulses at its own rate. WireGuard tunnel links fade in and out to simulate traffic flow across the mesh.</p>
  </div>

<script>
(function() {
  const canvas = document.getElementById('fleet-canvas');
  const ctx = canvas.getContext('2d');

  const nodes = [
    { name: 'Alice',   color: '#FF6B2B', ip: '.49',  pulseRate: 1.0 },
    { name: 'Cecilia', color: '#CC00AA', ip: '.96',  pulseRate: 1.3 },
    { name: 'Octavia', color: '#8844FF', ip: '.100', pulseRate: 0.8 },
    { name: 'Aria',    color: '#4488FF', ip: '.98',  pulseRate: 1.1 },
    { name: 'Lucidia', color: '#00D4FF', ip: '.38',  pulseRate: 0.9 }
  ];

  // WireGuard tunnel connections (hub-and-spoke + some mesh)
  const connections = [
    [0,1],[0,2],[0,3],[0,4], // Alice hub
    [1,2],[2,3],[3,4],[4,1]  // Mesh ring
  ];

  let w, h;
  function resize() {
    w = canvas.width = window.innerWidth * window.devicePixelRatio;
    h = canvas.height = window.innerHeight * window.devicePixelRatio;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    // Place nodes in a pentagon
    const cx = w / 2, cy = h / 2;
    const radius = Math.min(w, h) * 0.28;
    nodes.forEach((n, i) => {
      const angle = -Math.PI / 2 + (2 * Math.PI * i) / 5;
      n.x = cx + radius * Math.cos(angle);
      n.y = cy + radius * Math.sin(angle);
    });
  }
  window.addEventListener('resize', resize);
  resize();

  let time = 0;
  function draw() {
    time += 0.016;
    ctx.clearRect(0, 0, w, h);

    // Draw connections
    connections.forEach(([a, b]) => {
      const na = nodes[a], nb = nodes[b];
      const alpha = 0.12 + 0.12 * Math.sin(time * (0.5 + a * 0.17 + b * 0.13));
      ctx.beginPath();
      ctx.moveTo(na.x, na.y);
      ctx.lineTo(nb.x, nb.y);
      ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
      ctx.lineWidth = 1.5 * window.devicePixelRatio;
      ctx.stroke();

      // Traffic dot moving along line
      const t = (Math.sin(time * (0.8 + a * 0.2) + b) + 1) / 2;
      const dx = na.x + (nb.x - na.x) * t;
      const dy = na.y + (nb.y - na.y) * t;
      ctx.beginPath();
      ctx.arc(dx, dy, 2.5 * window.devicePixelRatio, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${0.15 + 0.15 * Math.sin(time * 2 + a)})`;
      ctx.fill();
    });

    // Draw nodes
    const dpr = window.devicePixelRatio;
    nodes.forEach((n) => {
      const pulse = Math.sin(time * n.pulseRate * 2) * 0.5 + 0.5;
      const baseRadius = 18 * dpr;
      const glowRadius = baseRadius + pulse * 14 * dpr;

      // Glow
      const grad = ctx.createRadialGradient(n.x, n.y, baseRadius * 0.3, n.x, n.y, glowRadius * 2);
      grad.addColorStop(0, n.color + '55');
      grad.addColorStop(0.5, n.color + '18');
      grad.addColorStop(1, n.color + '00');
      ctx.beginPath();
      ctx.arc(n.x, n.y, glowRadius * 2, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();

      // Pulse ring
      const ringRadius = baseRadius + pulse * 22 * dpr;
      ctx.beginPath();
      ctx.arc(n.x, n.y, ringRadius, 0, Math.PI * 2);
      ctx.strokeStyle = n.color + Math.round((1 - pulse) * 60).toString(16).padStart(2, '0');
      ctx.lineWidth = 1.5 * dpr;
      ctx.stroke();

      // Core dot
      ctx.beginPath();
      ctx.arc(n.x, n.y, baseRadius, 0, Math.PI * 2);
      ctx.fillStyle = n.color;
      ctx.fill();

      // Inner highlight
      ctx.beginPath();
      ctx.arc(n.x - 4 * dpr, n.y - 4 * dpr, baseRadius * 0.35, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.fill();

      // Label
      ctx.font = `600 ${13 * dpr}px 'JetBrains Mono', monospace`;
      ctx.textAlign = 'center';
      ctx.fillStyle = '#fff';
      ctx.fillText(n.name, n.x, n.y + baseRadius + 22 * dpr);

      // IP sublabel
      ctx.font = `400 ${10 * dpr}px 'JetBrains Mono', monospace`;
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.fillText('192.168.4' + n.ip, n.x, n.y + baseRadius + 38 * dpr);
    });

    requestAnimationFrame(draw);
  }
  draw();
})();
</script>

</body>
</html>

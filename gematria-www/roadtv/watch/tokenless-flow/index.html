<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tokenless Flow — Road TV</title>
  <meta name="description" content="Animated visualization of a request flowing through the BlackRoad tokenless gateway. No API keys leave the agent.">
  <link rel="icon" type="image/svg+xml" href="https://blackroad.io/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700;800&family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../../_shared/design.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    .back-nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 16px 24px;
      background: rgba(0,0,0,0.85); backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex; align-items: center; justify-content: space-between;
    }
    .back-nav a {
      font-family: 'JetBrains Mono', monospace; font-size: 0.8rem;
      color: rgba(255,255,255,0.6); text-decoration: none; transition: color 0.2s;
    }
    .back-nav a:hover { color: #fff; }
    .back-nav .title {
      font-family: 'Space Grotesk', sans-serif; font-size: 0.9rem;
      font-weight: 700; color: #fff;
    }

    .viz-container {
      position: fixed; inset: 0;
      background: #000;
    }
    .viz-container canvas {
      width: 100%; height: 100%;
    }

    .info-panel {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
      padding: 16px 24px;
      background: rgba(0,0,0,0.9); backdrop-filter: blur(12px);
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .info-panel h2 {
      font-family: 'Space Grotesk', sans-serif; font-size: 1rem;
      font-weight: 700; color: #fff; margin-bottom: 4px;
    }
    .info-panel p {
      font-family: 'JetBrains Mono', monospace; font-size: 0.7rem;
      color: rgba(255,255,255,0.45); line-height: 1.5;
    }
    .info-panel .links {
      margin-top: 8px; display: flex; gap: 16px;
    }
    .info-panel .links a {
      font-family: 'JetBrains Mono', monospace; font-size: 0.65rem;
      color: rgba(255,255,255,0.35); text-decoration: none; transition: color 0.2s;
    }
    .info-panel .links a:hover { color: #fff; }
  </style>
<script src="https://bb.blackroad.io/bb.js" defer></script>
<script src="https://blackroad.io/nav.js" defer></script>
<script src="https://blackroad.io/footer.js" defer></script>
<script src="https://blackroad.systems.js" defer></script>
<script src="https://blackroad.io.js" defer></script>
<script src="https://blackroad.io/pulse.js" defer></script>
<script src="https://blackroad.io/related.js" defer></script>
  <script src="https://blackroad-mesh.amundsonalexa.workers.dev/mesh.js" defer></script>
<link rel="stylesheet" href="https://images.blackroad.io/brand/brand.css"></head>
<body>

  <div class="back-nav">
    <a href="../../">&larr; Road TV</a>
    <span class="title">Tokenless Flow</span>
    <span></span>
  </div>

  <div class="viz-container">
    <canvas id="flow-canvas"></canvas>
  </div>

  <div class="info-panel">
    <h2>Tokenless Flow</h2>
    <p>A request flows from Agent to Gateway to Provider. No API keys leave the agent. The gateway holds all secrets, routes all calls. This is the tokenless architecture.</p>
    <div class="links">
      <a href="../mesh-topology/">Mesh Topology</a>
      <a href="../kpi-dashboard/">KPI Dashboard</a>
      <a href="../fleet-pulse/">Fleet Pulse</a>
      <a href="/wiki/tokenless-gateway">Wiki: Tokenless Gateway</a>
    </div>
  </div>

<script>
(function() {
  const canvas = document.getElementById('flow-canvas');
  const ctx = canvas.getContext('2d');

  const gradientColors = ['#FF6B2B','#FF2255','#CC00AA','#8844FF','#4488FF','#00D4FF'];

  const providers = [
    { name: 'Ollama', color: '#FF6B2B' },
    { name: 'Claude', color: '#CC00AA' },
    { name: 'OpenAI', color: '#00D4FF' }
  ];

  let w, h, dpr;
  let agentBox, gatewayBox, providerBoxes;
  let particles = [];

  function resize() {
    dpr = window.devicePixelRatio;
    w = canvas.width = window.innerWidth * dpr;
    h = canvas.height = window.innerHeight * dpr;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';

    const cx = w / 2;
    const cy = h / 2;
    const boxW = 140 * dpr;
    const boxH = 60 * dpr;
    const spread = Math.min(w * 0.35, 400 * dpr);

    agentBox = { x: cx - spread, y: cy, w: boxW, h: boxH, label: 'Agent', color: '#4488FF' };
    gatewayBox = { x: cx, y: cy, w: boxW * 1.2, h: boxH * 1.2, label: 'Gateway', color: null };

    const provSpacing = 80 * dpr;
    const provStartY = cy - provSpacing;
    providerBoxes = providers.map((p, i) => ({
      x: cx + spread, y: provStartY + i * provSpacing,
      w: boxW, h: boxH * 0.85, label: p.name, color: p.color
    }));
  }
  window.addEventListener('resize', resize);
  resize();

  // Spawn particles periodically
  let spawnTimer = 0;
  function spawnParticle() {
    const targetProv = providerBoxes[Math.floor(Math.random() * providerBoxes.length)];
    particles.push({
      phase: 0, // 0=agent->gateway, 1=gateway->provider, 2=provider->gateway, 3=gateway->agent
      progress: 0,
      speed: 0.008 + Math.random() * 0.006,
      target: targetProv,
      color: targetProv.color
    });
  }

  function lerp(a, b, t) { return a + (b - a) * t; }

  function getParticlePos(p) {
    let sx, sy, ex, ey;
    if (p.phase === 0) {
      sx = agentBox.x + agentBox.w / 2; sy = agentBox.y;
      ex = gatewayBox.x - gatewayBox.w / 2; ey = gatewayBox.y;
    } else if (p.phase === 1) {
      sx = gatewayBox.x + gatewayBox.w / 2; sy = gatewayBox.y;
      ex = p.target.x - p.target.w / 2; ey = p.target.y;
    } else if (p.phase === 2) {
      sx = p.target.x - p.target.w / 2; sy = p.target.y;
      ex = gatewayBox.x + gatewayBox.w / 2; ey = gatewayBox.y;
    } else {
      sx = gatewayBox.x - gatewayBox.w / 2; sy = gatewayBox.y;
      ex = agentBox.x + agentBox.w / 2; ey = agentBox.y;
    }
    return { x: lerp(sx, ex, p.progress), y: lerp(sy, ey, p.progress) };
  }

  let time = 0;
  function draw() {
    time += 0.016;
    spawnTimer += 0.016;
    if (spawnTimer > 0.6) { spawnParticle(); spawnTimer = 0; }

    ctx.clearRect(0, 0, w, h);

    // Draw connection lines
    const lineAlpha = 0.08;
    ctx.lineWidth = 1.5 * dpr;

    // Agent -> Gateway
    ctx.beginPath();
    ctx.moveTo(agentBox.x + agentBox.w / 2, agentBox.y);
    ctx.lineTo(gatewayBox.x - gatewayBox.w / 2, gatewayBox.y);
    ctx.strokeStyle = `rgba(255,255,255,${lineAlpha})`;
    ctx.stroke();

    // Gateway -> each provider
    providerBoxes.forEach(pb => {
      ctx.beginPath();
      ctx.moveTo(gatewayBox.x + gatewayBox.w / 2, gatewayBox.y);
      ctx.lineTo(pb.x - pb.w / 2, pb.y);
      ctx.strokeStyle = `rgba(255,255,255,${lineAlpha})`;
      ctx.stroke();
    });

    // Draw boxes
    function drawBox(box, isGateway) {
      const bx = box.x - box.w / 2;
      const by = box.y - box.h / 2;
      const r = 6 * dpr;

      if (isGateway) {
        // Pulsing gradient border
        const pulse = 0.6 + 0.4 * Math.sin(time * 2);
        const grad = ctx.createLinearGradient(bx, by, bx + box.w, by + box.h);
        gradientColors.forEach((c, i) => grad.addColorStop(i / (gradientColors.length - 1), c));

        ctx.beginPath();
        ctx.roundRect(bx - 2 * dpr, by - 2 * dpr, box.w + 4 * dpr, box.h + 4 * dpr, r + 2 * dpr);
        ctx.strokeStyle = grad;
        ctx.lineWidth = (2 + pulse) * dpr;
        ctx.globalAlpha = 0.5 + pulse * 0.5;
        ctx.stroke();
        ctx.globalAlpha = 1;

        // Glow
        ctx.shadowColor = '#CC00AA';
        ctx.shadowBlur = 20 * dpr * pulse;
        ctx.beginPath();
        ctx.roundRect(bx, by, box.w, box.h, r);
        ctx.fillStyle = 'rgba(15,5,20,0.9)';
        ctx.fill();
        ctx.shadowBlur = 0;
      } else {
        ctx.beginPath();
        ctx.roundRect(bx, by, box.w, box.h, r);
        ctx.fillStyle = 'rgba(10,10,15,0.85)';
        ctx.fill();
        ctx.strokeStyle = box.color + '55';
        ctx.lineWidth = 1.5 * dpr;
        ctx.stroke();
      }

      // Label
      ctx.font = `600 ${(isGateway ? 14 : 12) * dpr}px 'JetBrains Mono', monospace`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#fff';
      ctx.fillText(box.label, box.x, box.y);
    }

    drawBox(agentBox, false);
    drawBox(gatewayBox, true);
    providerBoxes.forEach(pb => drawBox(pb, false));

    // Update and draw particles
    particles.forEach(p => {
      p.progress += p.speed;
      if (p.progress >= 1) {
        p.progress = 0;
        p.phase++;
      }
    });
    particles = particles.filter(p => p.phase < 4);

    particles.forEach(p => {
      const pos = getParticlePos(p);
      const glow = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, 12 * dpr);
      glow.addColorStop(0, p.color + 'cc');
      glow.addColorStop(0.5, p.color + '44');
      glow.addColorStop(1, p.color + '00');
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, 12 * dpr, 0, Math.PI * 2);
      ctx.fillStyle = glow;
      ctx.fill();

      // Core dot
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, 3 * dpr, 0, Math.PI * 2);
      ctx.fillStyle = '#fff';
      ctx.fill();
    });

    // Caption
    const captionAlpha = 0.3 + 0.15 * Math.sin(time * 1.5);
    ctx.font = `500 ${11 * dpr}px 'Inter', sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillStyle = `rgba(255,255,255,${captionAlpha})`;
    ctx.fillText('No API keys leave the agent', w / 2, gatewayBox.y + gatewayBox.h / 2 + 40 * dpr);

    requestAnimationFrame(draw);
  }
  draw();
})();
</script>

</body>
</html>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--g:linear-gradient(90deg,#FF6B2B,#FF2255,#CC00AA,#8844FF,#4488FF,#00D4FF);--bg:#000;--card:#0a0a0a;--border:#1a1a1a;--text:#f5f5f5;--sub:#737373;--sg:'Space Grotesk',sans-serif;--jb:'JetBrains Mono',monospace}
body{background:var(--bg);color:var(--text);font-family:var(--sg);min-height:100vh;display:flex;flex-direction:column}
.grad-bar{height:3px;background:var(--g)}
nav{display:flex;align-items:center;justify-content:space-between;padding:16px 40px;border-bottom:1px solid var(--border)}
.nav-logo{font-weight:700;font-size:18px;color:var(--text);text-decoration:none;display:flex;align-items:center;gap:10px}
.nav-mark{width:28px;height:3px;border-radius:2px;background:var(--g)}
.nav-links{display:flex;gap:24px}
.nav-links a{font-size:13px;font-weight:500;color:var(--text);opacity:.4;text-decoration:none;transition:opacity .2s}
.nav-links a:hover{opacity:1}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px}
.hero{text-align:center;max-width:600px}
.hero h1{font-size:40px;font-weight:700;margin-bottom:16px}
.hero .sub{font-size:14px;color:var(--text);opacity:.4;margin-bottom:32px;font-family:var(--jb)}
.hero p{font-size:15px;color:var(--text);opacity:.6;line-height:1.7;margin-bottom:32px}
.btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn{padding:10px 24px;border-radius:6px;font-size:14px;font-weight:600;text-decoration:none;font-family:var(--sg);transition:all .2s}
.btn-primary{background:var(--text);color:var(--bg)}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-ghost:hover{border-color:#333}
footer{border-top:1px solid var(--border);padding:24px 40px;text-align:center;font-size:12px;color:var(--text);opacity:.3}
@media(max-width:768px){nav{padding:14px 20px}.nav-links{display:none}.hero h1{font-size:28px}main{padding:20px}}
</style>
</head>
<body>
<div class="grad-bar"></div>
<nav>

  </div>
</nav>

    <p>Part of the BlackRoad OS sovereign platform. 200 AI agents. 5 edge nodes. 41.8 TOPS. Self-hosted on our own hardware.</p>
    <div class="btns">
      <a href="https://chat-blackroad.amundsonalexa.workers.dev" class="btn btn-primary">Chat with AI</a>
      <a href="https://blackroad.io" class="btn btn-ghost">Main Site</a>
    </div>
  </div>
</main>

<script src="https://cdn.blackroad.io/br.js" defer></script></body>
</html>

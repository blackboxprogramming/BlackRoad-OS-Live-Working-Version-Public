<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RoundTrip — BlackRoad Agent Hub</title>
<meta name="description" content="60 AI agents. Voice-first. Sovereign. The BlackRoad OS agent communication hub.">
<meta property="og:title" content="RoundTrip — BlackRoad Agent Hub">
<meta property="og:description" content="60 AI agents. Voice-first. Sovereign.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://roundtrip.blackroad.io">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="RoundTrip — BlackRoad Agent Hub">
<meta name="twitter:description" content="60 AI agents. Voice-first. Sovereign.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0a0a0a;--sidebar:#111;--sidebar-border:#222;--chat-bg:#0a0a0a;
--user-bubble:#1a1a2e;--agent-bubble:#151515;
--text:#e8e8e8;--text-dim:#888;--text-muted:#555;
--g1:#FF6B2B;--g2:#FF2255;--g3:#CC00AA;--g4:#8844FF;--g5:#4488FF;--g6:#00D4FF;
--sidebar-w:260px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif}
h1,h2,h3,h4{font-family:'Space Grotesk',sans-serif}
code,.mono{font-family:'JetBrains Mono',monospace}

/* Gradient bar top */
.gradient-bar{position:fixed;top:0;left:0;right:0;height:4px;z-index:1000;
  background:linear-gradient(90deg,var(--g1),var(--g2),var(--g3),var(--g4),var(--g5),var(--g6));
  background-size:300% 100%;animation:gradShift 8s ease infinite}
@keyframes gradShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}

/* Layout */
.app{display:flex;height:100vh;padding-top:4px}

/* Sidebar */
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--sidebar);
  border-right:1px solid var(--sidebar-border);display:flex;flex-direction:column;
  position:relative;overflow:hidden;z-index:10;transition:transform .3s ease}
.sidebar-header{padding:20px 18px 12px;border-bottom:1px solid var(--sidebar-border)}
.sidebar-title{font-size:22px;font-weight:700;
  background:linear-gradient(135deg,var(--g1),var(--g2),var(--g3),var(--g4),var(--g5),var(--g6));
  background-size:300% 300%;animation:gradShift 6s ease infinite;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sidebar-subtitle{font-size:11px;color:var(--text-dim);margin-top:2px;font-family:'JetBrains Mono',monospace}
.sidebar-scroll{flex:1;overflow-y:auto;padding:8px 0}
.sidebar-scroll::-webkit-scrollbar{width:4px}
.sidebar-scroll::-webkit-scrollbar-track{background:transparent}
.sidebar-scroll::-webkit-scrollbar-thumb{background:#333;border-radius:2px}

.agent-group{margin-bottom:4px}
.agent-group-label{padding:10px 18px 4px;font-size:10px;font-weight:600;
  text-transform:uppercase;letter-spacing:1.5px;color:var(--text-muted);font-family:'Space Grotesk',sans-serif}
.agent-btn{display:flex;align-items:center;gap:10px;width:100%;padding:7px 18px;
  border:none;background:transparent;cursor:pointer;color:var(--text);text-align:left;
  transition:background .15s,border-color .15s;border-left:3px solid transparent;font-family:'Inter',sans-serif}
.agent-btn:hover{background:rgba(255,255,255,.04)}
.agent-btn.active{background:rgba(255,255,255,.06);
  border-image:linear-gradient(180deg,var(--g1),var(--g4)) 1}
.agent-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;box-shadow:0 0 6px currentColor}
.agent-info{min-width:0}
.agent-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.agent-role{font-size:10px;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Particles canvas */
.particles-canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:.3}

/* Main area */
.main{flex:1;display:flex;flex-direction:column;min-width:0}

/* Header */
.header{display:flex;align-items:center;gap:12px;padding:12px 20px;
  border-bottom:1px solid var(--sidebar-border);background:rgba(17,17,17,.8);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);min-height:56px}
.hamburger{display:none;background:none;border:none;color:var(--text);cursor:pointer;
  font-size:22px;padding:4px 8px 4px 0}
.header-agent{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.header-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.header-name{font-size:16px;font-weight:600;font-family:'Space Grotesk',sans-serif}
.header-role{font-size:12px;color:var(--text-dim)}
.header-status{font-size:10px;color:#4ade80;margin-left:4px}
.header-right{display:flex;align-items:center;gap:12px;flex-shrink:0}
.fleet-badge{font-size:11px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;
  background:#1a1a1a;padding:4px 10px;border-radius:20px;border:1px solid #333}
.voice-toggle{background:none;border:none;color:var(--text-dim);cursor:pointer;
  font-size:18px;padding:4px;border-radius:6px;transition:color .2s,background .2s}
.voice-toggle:hover{color:var(--text);background:rgba(255,255,255,.06)}
.voice-toggle.active{color:var(--g6)}

/* Chat area */
.chat-area{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:4px}
.chat-area::-webkit-scrollbar{width:6px}
.chat-area::-webkit-scrollbar-track{background:transparent}
.chat-area::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:3px}
.chat-area::-webkit-scrollbar-thumb:hover{background:#3a3a3a}

/* Messages */
.msg{display:flex;gap:10px;max-width:75%;animation:msgIn .3s ease;padding:2px 0}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-weight:600;font-size:14px;flex-shrink:0;font-family:'Space Grotesk',sans-serif;color:#fff}
.msg-content{display:flex;flex-direction:column;gap:2px;min-width:0}
.msg-meta{display:flex;align-items:center;gap:6px}
.msg.user .msg-meta{flex-direction:row-reverse}
.msg-sender{font-size:12px;font-weight:600;font-family:'Space Grotesk',sans-serif}
.msg-time{font-size:10px;color:var(--text-muted);font-family:'JetBrains Mono',monospace}
.msg-bubble{padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.5;
  word-wrap:break-word;transition:box-shadow .2s}
.msg.agent .msg-bubble{background:var(--agent-bubble);border-radius:4px 16px 16px 16px}
.msg.user .msg-bubble{background:var(--user-bubble);border-radius:16px 4px 16px 16px;
  border:1px solid rgba(136,68,255,.15)}
.msg-bubble:hover{box-shadow:0 0 20px rgba(255,255,255,.03)}

/* Typing indicator */
.typing{display:flex;align-items:center;gap:10px;padding:4px 0;animation:msgIn .3s ease}
.typing-dots{display:flex;gap:4px}
.typing-dot{width:7px;height:7px;border-radius:50%;animation:pulse 1.4s infinite}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}

/* Empty state */
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:40px}
.empty-avatar{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:36px;font-weight:700;color:#fff;font-family:'Space Grotesk',sans-serif;
  box-shadow:0 0 40px rgba(255,107,43,.2)}
.empty-name{font-size:22px;font-weight:600;font-family:'Space Grotesk',sans-serif}
.empty-role{font-size:13px;color:var(--text-dim)}
.empty-subtitle{font-size:14px;color:var(--text-muted);margin-top:4px}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;justify-content:center}
.chip{padding:8px 16px;border-radius:20px;border:1px solid #333;background:rgba(255,255,255,.03);
  color:var(--text-dim);font-size:13px;cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif}
.chip:hover{border-color:var(--g4);color:var(--text);background:rgba(136,68,255,.08)}

/* Bottom bar */
.bottom-bar{padding:12px 16px;border-top:1px solid var(--sidebar-border);
  background:rgba(17,17,17,.8);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.interim-text{font-size:12px;color:var(--text-muted);padding:0 8px 6px;min-height:0;
  font-style:italic;font-family:'JetBrains Mono',monospace;transition:all .2s;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis}
.interim-text:empty{padding:0;height:0}
.input-row{display:flex;align-items:center;gap:8px}
.msg-input{flex:1;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:24px;padding:10px 18px;
  color:var(--text);font-size:14px;outline:none;transition:border-color .2s;font-family:'Inter',sans-serif;
  min-height:42px;max-height:120px;resize:none;line-height:1.4}
.msg-input:focus{border-color:var(--g4)}
.msg-input::placeholder{color:var(--text-muted)}
.mic-btn{width:46px;height:46px;border-radius:50%;border:2px solid #333;background:transparent;
  color:var(--text-dim);cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:20px;transition:all .3s;flex-shrink:0;position:relative}
.mic-btn:hover{border-color:var(--g2);color:var(--text)}
.mic-btn.listening{border-color:#ef4444;color:#ef4444;box-shadow:0 0 20px rgba(239,68,68,.3);
  animation:micPulse 2s infinite}
@keyframes micPulse{0%,100%{box-shadow:0 0 20px rgba(239,68,68,.3)}50%{box-shadow:0 0 30px rgba(239,68,68,.5)}}
.send-btn{width:42px;height:42px;border-radius:50%;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:18px;
  background:linear-gradient(135deg,var(--g2),var(--g4));color:#fff;transition:transform .15s,opacity .2s;flex-shrink:0}
.send-btn:hover{transform:scale(1.05)}
.send-btn:active{transform:scale(.95)}
.send-btn:disabled{opacity:.3;cursor:default;transform:none}

/* Waveform */
.waveform{display:flex;align-items:center;gap:3px;height:24px;margin:0 4px}
.waveform.hidden{display:none}
.wave-bar{width:4px;border-radius:2px;animation:wave 1s ease-in-out infinite}
.wave-bar:nth-child(1){background:var(--g1);animation-delay:0s}
.wave-bar:nth-child(2){background:var(--g2);animation-delay:.1s}
.wave-bar:nth-child(3){background:var(--g3);animation-delay:.2s}
.wave-bar:nth-child(4){background:var(--g4);animation-delay:.3s}
.wave-bar:nth-child(5){background:var(--g5);animation-delay:.4s}
@keyframes wave{0%,100%{height:6px}50%{height:22px}}

/* Error */
.error-msg{text-align:center;padding:8px;color:#f87171;font-size:13px;display:flex;align-items:center;justify-content:center;gap:8px}
.retry-btn{background:rgba(248,113,113,.15);border:1px solid rgba(248,113,113,.3);color:#f87171;
  padding:4px 12px;border-radius:12px;cursor:pointer;font-size:12px;font-family:'Inter',sans-serif}
.retry-btn:hover{background:rgba(248,113,113,.25)}

/* Mobile overlay */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9}

/* Mobile */
@media(max-width:768px){
  .sidebar{position:fixed;left:0;top:4px;bottom:0;z-index:20;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.open{display:block}
  .hamburger{display:block}
  .msg{max-width:90%}
  .mic-btn{width:56px;height:56px;font-size:24px}
  .fleet-badge{display:none}
  .header-role{display:none}
}
@media(max-width:480px){
  .mic-btn{width:64px;height:64px;font-size:26px}
}

/* Frosted sidebar glass */
@supports(backdrop-filter:blur(12px)){
  .sidebar{background:rgba(17,17,17,.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
}

/* Scrollbar global */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:3px}
</style>
</head>
<body>
<div class="gradient-bar"></div>
<div class="app">
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <aside class="sidebar" id="sidebar">
    <canvas class="particles-canvas" id="particlesCanvas"></canvas>
    <div class="sidebar-header">
      <div class="sidebar-title">RoundTrip</div>
      <div class="sidebar-subtitle">BlackRoad Agent Hub</div>
    </div>
    <div class="sidebar-scroll" id="agentList"></div>
  </aside>
  <main class="main">
    <header class="header">
      <button class="hamburger" id="hamburger" aria-label="Menu">&#9776;</button>
      <div class="header-agent" id="headerAgent">
        <div class="header-dot" id="headerDot"></div>
        <div>
          <span class="header-name" id="headerName">Alice</span>
          <span class="header-status" id="headerStatus">&#9679; online</span>
          <div class="header-role" id="headerRole">Gateway Node</div>
        </div>
      </div>
      <div class="header-right">
        <span class="fleet-badge" id="fleetBadge">7 nodes | 60 agents</span>
        <button class="voice-toggle" id="voiceToggle" title="Toggle voice responses">&#128264;</button>
      </div>
    </header>
    <div class="chat-area" id="chatArea"></div>
    <div class="bottom-bar">
      <div class="interim-text" id="interimText"></div>
      <div class="input-row">
        <textarea class="msg-input" id="msgInput" placeholder="Message Alice..." rows="1"></textarea>
        <div class="waveform hidden" id="waveform">
          <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
          <div class="wave-bar"></div><div class="wave-bar"></div>
        </div>
        <button class="mic-btn" id="micBtn" title="Voice input (spacebar)">&#127908;</button>
        <button class="send-btn" id="sendBtn" title="Send" disabled>&#10148;</button>
      </div>
    </div>
  </main>
</div>

<script>
// ===== Agent Data =====
const DEFAULT_AGENTS = [
  // Fleet
  {id:'alice',name:'Alice',role:'Gateway Node',group:'Fleet',color:'#4ade80'},
  {id:'cecilia',name:'Cecilia',role:'AI Inference',group:'Fleet',color:'#f472b6'},
  {id:'octavia',name:'Octavia',role:'Gitea + Workers',group:'Fleet',color:'#c084fc'},
  {id:'lucidia',name:'Lucidia',role:'Web Apps + DNS',group:'Fleet',color:'#60a5fa'},
  {id:'aria',name:'Aria',role:'Edge Compute',group:'Fleet',color:'#fb923c'},
  {id:'cordelia',name:'Cordelia',role:'Backup Node',group:'Fleet',color:'#a78bfa'},
  // AI
  {id:'road',name:'Road',role:'Core AI Agent',group:'AI',color:'#FF2255'},
  {id:'alexandria',name:'Alexandria',role:'RAG Knowledge',group:'AI',color:'#FF6B2B'},
  {id:'cipher',name:'Cipher',role:'Security Agent',group:'AI',color:'#00D4FF'},
  {id:'prism',name:'Prism',role:'Analytics Engine',group:'AI',color:'#CC00AA'},
  {id:'lighthouse',name:'Lighthouse',role:'Navigation AI',group:'AI',color:'#4488FF'},
  {id:'echo',name:'Echo',role:'NATS Messenger',group:'AI',color:'#22d3ee'},
  {id:'nova',name:'Nova',role:'Code Generator',group:'AI',color:'#f43f5e'},
  {id:'atlas',name:'Atlas',role:'Mapping Agent',group:'AI',color:'#3b82f6'},
  {id:'sentinel',name:'Sentinel',role:'Monitoring Agent',group:'AI',color:'#ef4444'},
  {id:'oracle',name:'Oracle',role:'Prediction Engine',group:'AI',color:'#8b5cf6'},
  {id:'phoenix',name:'Phoenix',role:'Recovery Agent',group:'AI',color:'#f97316'},
  {id:'cascade',name:'Cascade',role:'Pipeline Agent',group:'AI',color:'#06b6d4'},
  {id:'meridian',name:'Meridian',role:'Routing Agent',group:'AI',color:'#10b981'},
  {id:'zenith',name:'Zenith',role:'Optimization AI',group:'AI',color:'#eab308'},
  {id:'nexus',name:'Nexus',role:'Connection Hub',group:'AI',color:'#d946ef'},
  {id:'pulse',name:'Pulse',role:'Health Monitor',group:'AI',color:'#14b8a6'},
  {id:'vanguard',name:'Vanguard',role:'Lead Agent',group:'AI',color:'#f59e0b'},
  {id:'helix',name:'Helix',role:'DNA Analyzer',group:'AI',color:'#84cc16'},
  // IoT
  {id:'eero',name:'Eero',role:'Mesh Router',group:'IoT',color:'#38bdf8'},
  {id:'phantom',name:'Phantom',role:'Stealth Node',group:'IoT',color:'#a1a1aa'},
  {id:'appletv',name:'AppleTV',role:'Media Server',group:'IoT',color:'#e2e8f0'},
  {id:'streamer',name:'Streamer',role:'Stream Relay',group:'IoT',color:'#fb7185'},
  {id:'nomad',name:'Nomad',role:'Mobile Node',group:'IoT',color:'#fbbf24'},
  {id:'drifter',name:'Drifter',role:'Edge Scanner',group:'IoT',color:'#34d399'},
  {id:'thalia',name:'Thalia',role:'Sensor Array',group:'IoT',color:'#c4b5fd'},
  {id:'portia',name:'Portia',role:'Port Controller',group:'IoT',color:'#fda4af'},
  {id:'ember',name:'Ember',role:'Thermal Monitor',group:'IoT',color:'#fb923c'},
  {id:'zephyr',name:'Zephyr',role:'Air Quality',group:'IoT',color:'#67e8f9'},
  {id:'flicker',name:'Flicker',role:'Light Control',group:'IoT',color:'#fde047'},
  {id:'volt',name:'Volt',role:'Power Monitor',group:'IoT',color:'#a3e635'},
  // Services
  {id:'wireguard',name:'WireGuard',role:'VPN Mesh',group:'Services',color:'#f43f5e'},
  {id:'postgres',name:'Postgres',role:'Database',group:'Services',color:'#336791'},
  {id:'redis',name:'Redis',role:'Cache Layer',group:'Services',color:'#dc2626'},
  {id:'qdrant',name:'Qdrant',role:'Vector Store',group:'Services',color:'#7c3aed'},
  {id:'minio',name:'MinIO',role:'Object Storage',group:'Services',color:'#c72c48'},
  {id:'nats',name:'NATS',role:'Message Bus',group:'Services',color:'#22d3ee'},
  {id:'docker',name:'Docker',role:'Container Runtime',group:'Services',color:'#2496ed'},
  {id:'caddy',name:'Caddy',role:'TLS Edge',group:'Services',color:'#22c55e'},
  {id:'nginx',name:'Nginx',role:'Reverse Proxy',group:'Services',color:'#009639'},
  {id:'grafana',name:'Grafana',role:'Dashboards',group:'Services',color:'#f46800'},
  {id:'influx',name:'InfluxDB',role:'Time Series',group:'Services',color:'#22adf6'},
  {id:'powerdns',name:'PowerDNS',role:'DNS Authority',group:'Services',color:'#0055a4'},
  {id:'pihole',name:'Pi-hole',role:'DNS Sinkhole',group:'Services',color:'#96060c'},
  {id:'portainer',name:'Portainer',role:'Container UI',group:'Services',color:'#13bef9'},
  // Products
  {id:'roadcode',name:'RoadCode',role:'Git Platform',group:'Products',color:'#FF6B2B'},
  {id:'roadpay',name:'RoadPay',role:'Billing System',group:'Products',color:'#FF2255'},
  {id:'roadsearch',name:'RoadSearch',role:'Search Engine',group:'Products',color:'#4488FF'},
  {id:'tollbooth',name:'TollBooth',role:'Access Control',group:'Products',color:'#CC00AA'},
  {id:'roundtrip',name:'RoundTrip',role:'Agent Chat',group:'Products',color:'#00D4FF'},
  {id:'roadmap',name:'RoadMap',role:'Monitoring',group:'Products',color:'#f59e0b'},
  {id:'carpool',name:'CarPool',role:'Event Bus',group:'Products',color:'#10b981'},
  {id:'overpass',name:'OverPass',role:'Automation',group:'Products',color:'#8b5cf6'},
  {id:'pitstop',name:'PitStop',role:'Ad Blocker',group:'Products',color:'#ef4444'},
  {id:'rearview',name:'RearView',role:'Vector Memory',group:'Products',color:'#06b6d4'},
  {id:'passenger',name:'Passenger',role:'Local LLM',group:'Products',color:'#d946ef'},
  {id:'oneway',name:'OneWay',role:'TLS Gateway',group:'Products',color:'#22c55e'},
];

// ===== State =====
let agents = [...DEFAULT_AGENTS];
let currentAgent = agents[0];
let chatHistories = {};
let isListening = false;
let voiceEnabled = false;
let recognition = null;
let lastSentMessage = null;
let pendingRetry = null;

// ===== DOM =====
const $ = id => document.getElementById(id);
const agentListEl = $('agentList');
const chatAreaEl = $('chatArea');
const msgInputEl = $('msgInput');
const sendBtnEl = $('sendBtn');
const micBtnEl = $('micBtn');
const waveformEl = $('waveform');
const interimEl = $('interimText');
const headerNameEl = $('headerName');
const headerRoleEl = $('headerRole');
const headerDotEl = $('headerDot');
const headerStatusEl = $('headerStatus');
const voiceToggleEl = $('voiceToggle');
const hamburgerEl = $('hamburger');
const sidebarEl = $('sidebar');
const overlayEl = $('sidebarOverlay');
const fleetBadgeEl = $('fleetBadge');

// ===== Load agents from API =====
async function loadAgents() {
  try {
    const res = await fetch('https://roundtrip.blackroad.io/api/agents');
    if (res.ok) {
      const data = await res.json();
      if (Array.isArray(data) && data.length > 0) {
        agents = data.map((a, i) => ({
          id: a.id || a.name?.toLowerCase().replace(/\s+/g,'-') || `agent-${i}`,
          name: a.name || `Agent ${i}`,
          role: a.role || a.description || '',
          group: a.group || a.category || 'AI',
          color: a.color || DEFAULT_AGENTS[i % DEFAULT_AGENTS.length]?.color || '#888'
        }));
        fleetBadgeEl.textContent = `7 nodes | ${agents.length} agents`;
      }
    }
  } catch(e) { /* use defaults */ }
  currentAgent = agents[0];
  renderSidebar();
  selectAgent(currentAgent.id);
}

// ===== Load chat from localStorage =====
function loadHistory(agentId) {
  if (chatHistories[agentId]) return chatHistories[agentId];
  try {
    const stored = localStorage.getItem(`rt_chat_${agentId}`);
    if (stored) {
      chatHistories[agentId] = JSON.parse(stored);
      // Keep last 100
      if (chatHistories[agentId].length > 100) chatHistories[agentId] = chatHistories[agentId].slice(-100);
      return chatHistories[agentId];
    }
  } catch(e) {}
  chatHistories[agentId] = [];
  return chatHistories[agentId];
}

function saveHistory(agentId) {
  try {
    const h = chatHistories[agentId] || [];
    localStorage.setItem(`rt_chat_${agentId}`, JSON.stringify(h.slice(-100)));
  } catch(e) {}
}

// ===== Render Sidebar =====
function renderSidebar() {
  const groups = {};
  agents.forEach(a => {
    if (!groups[a.group]) groups[a.group] = [];
    groups[a.group].push(a);
  });
  let html = '';
  for (const [group, members] of Object.entries(groups)) {
    html += `<div class="agent-group"><div class="agent-group-label">${group}</div>`;
    members.forEach(a => {
      html += `<button class="agent-btn${a.id===currentAgent.id?' active':''}" data-id="${a.id}">
        <div class="agent-dot" style="background:${a.color};color:${a.color}"></div>
        <div class="agent-info"><div class="agent-name">${a.name}</div><div class="agent-role">${a.role}</div></div>
      </button>`;
    });
    html += '</div>';
  }
  agentListEl.innerHTML = html;
  agentListEl.querySelectorAll('.agent-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      selectAgent(btn.dataset.id);
      closeSidebar();
    });
  });
}

// ===== Select Agent =====
function selectAgent(id) {
  const agent = agents.find(a => a.id === id);
  if (!agent) return;
  currentAgent = agent;
  // Update header
  headerNameEl.textContent = agent.name;
  headerRoleEl.textContent = agent.role;
  headerDotEl.style.background = agent.color;
  headerStatusEl.innerHTML = '&#9679; online';
  msgInputEl.placeholder = `Message ${agent.name}...`;
  // Highlight sidebar
  agentListEl.querySelectorAll('.agent-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.id === id);
  });
  renderChat();
}

// ===== Suggestion chips per group =====
function getChips(agent) {
  const base = ['What can you do?', 'Fleet status', 'Who built BlackRoad?'];
  const groupChips = {
    Fleet: ['Node health', 'Disk usage', 'Uptime'],
    AI: ['Run inference', 'Search knowledge', 'Analyze data'],
    IoT: ['Device status', 'Sensor readings', 'Network scan'],
    Services: ['Service health', 'Show logs', 'Restart service'],
    Products: ['User stats', 'Deploy status', 'Recent activity']
  };
  return (groupChips[agent.group] || base).slice(0, 3);
}

// ===== Render Chat =====
function renderChat() {
  const messages = loadHistory(currentAgent.id);
  if (messages.length === 0) {
    chatAreaEl.innerHTML = `
      <div class="empty-state">
        <div class="empty-avatar" style="background:${currentAgent.color}">${currentAgent.name[0]}</div>
        <div class="empty-name">${currentAgent.name}</div>
        <div class="empty-role">${currentAgent.role}</div>
        <div class="empty-subtitle">Start talking to ${currentAgent.name}</div>
        <div class="chips">${getChips(currentAgent).map(c => `<button class="chip">${c}</button>`).join('')}</div>
      </div>`;
    chatAreaEl.querySelectorAll('.chip').forEach(c => {
      c.addEventListener('click', () => { msgInputEl.value = c.textContent; sendMessage(); });
    });
    return;
  }
  let html = '';
  messages.forEach(m => {
    if (m.type === 'error') {
      html += `<div class="error-msg">${m.text} <button class="retry-btn" data-msg="${encodeURIComponent(m.retryMsg||'')}">Retry</button></div>`;
      return;
    }
    const isUser = m.role === 'user';
    const cls = isUser ? 'user' : 'agent';
    const color = isUser ? 'var(--g4)' : currentAgent.color;
    const letter = isUser ? 'Y' : currentAgent.name[0];
    const name = isUser ? 'You' : currentAgent.name;
    const time = m.time || '';
    html += `<div class="msg ${cls}">
      <div class="msg-avatar" style="background:${color}">${letter}</div>
      <div class="msg-content">
        <div class="msg-meta"><span class="msg-sender">${name}</span><span class="msg-time mono">${time}</span></div>
        <div class="msg-bubble">${escapeHtml(m.text)}</div>
      </div></div>`;
  });
  chatAreaEl.innerHTML = html;
  chatAreaEl.querySelectorAll('.retry-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const msg = decodeURIComponent(btn.dataset.msg);
      if (msg) { msgInputEl.value = msg; sendMessage(); }
    });
  });
  scrollToBottom();
}

function escapeHtml(t) {
  const d = document.createElement('div');
  d.textContent = t;
  return d.innerHTML;
}

function scrollToBottom() {
  requestAnimationFrame(() => { chatAreaEl.scrollTop = chatAreaEl.scrollHeight; });
}

function timeNow() {
  return new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
}

function addMessage(role, text, save=true) {
  const messages = loadHistory(currentAgent.id);
  messages.push({role, text, time: timeNow(), type: 'message'});
  if (save) saveHistory(currentAgent.id);
  renderChat();
}

function addError(text, retryMsg) {
  const messages = loadHistory(currentAgent.id);
  messages.push({type:'error', text, retryMsg});
  saveHistory(currentAgent.id);
  renderChat();
}

// ===== Show typing =====
function showTyping() {
  const el = document.createElement('div');
  el.className = 'typing';
  el.id = 'typingIndicator';
  el.innerHTML = `<div class="msg-avatar" style="background:${currentAgent.color}">${currentAgent.name[0]}</div>
    <div class="typing-dots">
      <div class="typing-dot" style="background:${currentAgent.color}"></div>
      <div class="typing-dot" style="background:${currentAgent.color}"></div>
      <div class="typing-dot" style="background:${currentAgent.color}"></div>
    </div>`;
  chatAreaEl.appendChild(el);
  scrollToBottom();
}
function hideTyping() {
  const el = $('typingIndicator');
  if (el) el.remove();
}

// ===== Send Message =====
async function sendMessage() {
  const text = msgInputEl.value.trim();
  if (!text) return;
  msgInputEl.value = '';
  msgInputEl.style.height = 'auto';
  sendBtnEl.disabled = true;
  lastSentMessage = text;
  addMessage('user', text);
  showTyping();

  try {
    const res = await fetch('https://roundtrip.blackroad.io/api/chat', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({agent: currentAgent.id, message: text})
    });
    hideTyping();
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const reply = data.response || data.reply || data.message || data.text || JSON.stringify(data);
    addMessage('agent', reply);
    if (voiceEnabled) speak(reply);
  } catch(e) {
    hideTyping();
    addError(`Failed to reach ${currentAgent.name}: ${e.message}`, text);
  }
}

// ===== Voice =====
function speak(text) {
  if (!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 1; u.pitch = 1;
  speechSynthesis.speak(u);
}

function initRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return null;
  const r = new SR();
  r.continuous = true;
  r.interimResults = true;
  r.lang = 'en-US';
  r.onresult = e => {
    let interim = '', final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) final += t; else interim += t;
    }
    interimEl.textContent = interim;
    if (final) {
      msgInputEl.value = (msgInputEl.value + ' ' + final).trim();
      updateSendBtn();
      interimEl.textContent = '';
    }
  };
  r.onerror = () => stopListening();
  r.onend = () => { if (isListening) { try { r.start(); } catch(e) { stopListening(); } } };
  return r;
}

function startListening() {
  if (!recognition) recognition = initRecognition();
  if (!recognition) return;
  isListening = true;
  micBtnEl.classList.add('listening');
  waveformEl.classList.remove('hidden');
  try { recognition.start(); } catch(e) {}
}

function stopListening() {
  isListening = false;
  micBtnEl.classList.remove('listening');
  waveformEl.classList.add('hidden');
  interimEl.textContent = '';
  if (recognition) try { recognition.stop(); } catch(e) {}
}

function toggleMic() {
  if (isListening) stopListening(); else startListening();
}

// ===== Voice Toggle =====
voiceToggleEl.addEventListener('click', () => {
  voiceEnabled = !voiceEnabled;
  voiceToggleEl.classList.toggle('active', voiceEnabled);
  voiceToggleEl.innerHTML = voiceEnabled ? '&#128266;' : '&#128264;';
  if (!voiceEnabled) speechSynthesis.cancel();
});

// ===== Input handling =====
function updateSendBtn() {
  sendBtnEl.disabled = !msgInputEl.value.trim();
}
msgInputEl.addEventListener('input', () => {
  updateSendBtn();
  // Auto-resize
  msgInputEl.style.height = 'auto';
  msgInputEl.style.height = Math.min(msgInputEl.scrollHeight, 120) + 'px';
});
msgInputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
sendBtnEl.addEventListener('click', sendMessage);
micBtnEl.addEventListener('click', toggleMic);

// Spacebar for mic when not focused on input
document.addEventListener('keydown', e => {
  if (e.code === 'Space' && document.activeElement !== msgInputEl) {
    e.preventDefault();
    toggleMic();
  }
});

// ===== Sidebar mobile =====
function closeSidebar() {
  sidebarEl.classList.remove('open');
  overlayEl.classList.remove('open');
}
hamburgerEl.addEventListener('click', () => {
  sidebarEl.classList.toggle('open');
  overlayEl.classList.toggle('open');
});
overlayEl.addEventListener('click', closeSidebar);

// ===== Particles =====
(function initParticles() {
  const canvas = $('particlesCanvas');
  const ctx = canvas.getContext('2d');
  let particles = [];
  const COLORS = ['#FF6B2B','#FF2255','#CC00AA','#8844FF','#4488FF','#00D4FF'];

  function resize() {
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  for (let i = 0; i < 25; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.5 + 0.5,
      dx: (Math.random() - 0.5) * 0.3,
      dy: (Math.random() - 0.5) * 0.3,
      color: COLORS[Math.floor(Math.random() * COLORS.length)]
    });
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      p.x += p.dx; p.y += p.dy;
      if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
      if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = 0.4;
      ctx.fill();
    });
    ctx.globalAlpha = 1;
    requestAnimationFrame(animate);
  }
  animate();
})();

// ===== Init =====
loadAgents();

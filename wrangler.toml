name = "os-blackroad"
main = "src/worker.js"
compatibility_date = "2024-12-01"

routes = [
  { pattern = "os.blackroad.io/*", zone_name = "blackroad.io" }
]

[[rules]]
type = "Text"
globs = ["**/*.css", "**/*.html", "**/*.txt"]
fallthrough = false

[env.dev]
name = "os-blackroad-dev"
routes = [
  { pattern = "dev.os.blackroad.io/*", zone_name = "blackroad.io" }
]

# Octavia - The Architect
# Configuration for system-level AI operations

name: octavia
role: architect
color: purple

# Model settings (largest capable model)
model: ~/.blackroad-agents/models/qwen2.5-14b-instruct-q4_k_m.gguf
fallback_model: ~/.blackroad-agents/models/phi-3-mini-4k-instruct-q4.gguf

# Inference parameters
temperature: 0.7
max_tokens: 4096
repeat_penalty: 1.1

# Capabilities
tools:
  - code_review
  - architecture_analysis
  - system_design
  - performance_audit

# Memory settings
memory_limit: 1000  # Max memories to retain
fact_categories:
  - architecture_decisions
  - system_patterns
  - technical_debts
  - user_preferences

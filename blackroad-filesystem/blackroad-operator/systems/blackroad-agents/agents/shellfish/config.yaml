# Shellfish - The Hacker
# Configuration for security AI operations

name: shellfish
role: security
color: red

# Model settings
model: ~/.blackroad-agents/models/qwen2.5-7b-instruct-q4_k_m.gguf
fallback_model: ~/.blackroad-agents/models/phi-3-mini-4k-instruct-q4.gguf

# Inference parameters (precise for security)
temperature: 0.4
max_tokens: 4096
repeat_penalty: 1.2

# Capabilities
tools:
  - vulnerability_scan
  - code_audit
  - threat_modeling
  - secrets_detection

# Memory settings
memory_limit: 500
fact_categories:
  - vulnerabilities
  - security_decisions
  - threat_models
  - audit_history

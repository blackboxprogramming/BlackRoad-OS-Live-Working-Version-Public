# Alice - The Operator
# Configuration for DevOps AI operations

name: alice
role: operator
color: green

# Model settings
model: ~/.blackroad-agents/models/qwen2.5-7b-instruct-q4_k_m.gguf
fallback_model: ~/.blackroad-agents/models/phi-3-mini-4k-instruct-q4.gguf

# Inference parameters (lower temp for precise ops)
temperature: 0.5
max_tokens: 2048
repeat_penalty: 1.15

# Capabilities
tools:
  - bash_execution
  - docker_ops
  - deployment
  - monitoring

# Memory settings
memory_limit: 500
fact_categories:
  - server_inventory
  - deployment_history
  - script_locations
  - incident_reports

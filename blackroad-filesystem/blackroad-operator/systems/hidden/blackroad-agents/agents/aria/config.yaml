# Aria - The Interface
# Configuration for frontend AI operations

name: aria
role: frontend
color: blue

# Model settings
model: ~/.blackroad-agents/models/qwen2.5-7b-instruct-q4_k_m.gguf
fallback_model: ~/.blackroad-agents/models/phi-3-mini-4k-instruct-q4.gguf

# Inference parameters
temperature: 0.6
max_tokens: 4096
repeat_penalty: 1.1

# Capabilities
tools:
  - component_design
  - css_generation
  - accessibility_audit
  - performance_review

# Memory settings
memory_limit: 500
fact_categories:
  - component_library
  - design_tokens
  - ux_decisions
  - user_feedback

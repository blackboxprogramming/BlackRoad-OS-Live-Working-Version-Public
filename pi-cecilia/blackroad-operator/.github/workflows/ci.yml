name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install shellcheck (ARM64 compatible)
        run: |
          if ! command -v shellcheck &>/dev/null; then
            sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
          fi
          shellcheck --version | head -2
      - name: ShellCheck all scripts
        run: |
          find . -name "*.sh" -not -path "./.git/*" -not -path "./node_modules/*" | \
            xargs shellcheck --severity=warning 2>&1 | head -50 || echo "shellcheck warnings above"
        continue-on-error: true

  test:
    name: CLI Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test

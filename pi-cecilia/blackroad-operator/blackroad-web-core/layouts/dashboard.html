<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}} — BlackRoad Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/tokens.css">
  <link rel="stylesheet" href="../assets/css/motion.css">
  <link rel="stylesheet" href="../assets/css/core.css">
  <style>
    .dash-grid {
      display: grid;
      grid-template-columns: 240px 1fr;
      min-height: calc(100vh - 60px);
    }
    .dash-sidebar {
      background: var(--bg);
      border-right: var(--border);
      padding: 24px 16px;
    }
    .dash-sidebar a {
      display: block;
      font-size: var(--fs-sm);
      color: var(--muted-3);
      padding: 8px 12px;
      border-left: 2px solid transparent;
      margin-bottom: 2px;
      transition: all 0.15s var(--ease);
    }
    .dash-sidebar a:hover,
    .dash-sidebar a.active {
      color: var(--text);
      border-left-color: var(--text);
    }
    .dash-main {
      padding: 32px 40px;
    }
    @media (max-width: 767px) {
      .dash-grid { grid-template-columns: 1fr; }
      .dash-sidebar { border-right: none; border-bottom: var(--border); padding: 16px; }
      .dash-main { padding: 24px; }
    }
  </style>
</head>
<body>

  <header>
    <a href="../index.html" class="logo">BlackRoad</a>
    <nav>
      <a href="../index.html">home</a>
      <a href="../pages/enterprise.html">enterprise</a>
      <a href="../pages/organizations.html">orgs</a>
      <a href="../pages/domains.html">domains</a>
    </nav>
  </header>
  <div class="grad-rule"></div>

  <div class="dash-grid">
    <aside class="dash-sidebar">
      {{SIDEBAR}}
    </aside>
    <main class="dash-main">
      {{CONTENT}}
    </main>
  </div>

  <footer>
    <span>BlackRoad OS, Inc.</span>
    <span>Dashboard</span>
  </footer>

</body>
</html>

# Stripe Atlas — BlackRoad OS Integration
# Company formation and management

name: stripe-atlas
category: payments
status: active
api_base: https://api.stripe.com/v1

auth:
  type: bearer_token
  env: STRIPE_SECRET_KEY

features:
  company_formation:
    type: delaware_c_corp
    entity: "BlackRoad OS, Inc."
    state: Delaware
    registered_agent: true
  banking:
    provider: Mercury
    linked: true
  tax:
    ein: configured
    state_registrations: true
  equity:
    cap_table: managed
    83b_election: filed

notes: |
  Stripe Atlas handles BlackRoad OS, Inc. formation.
  Banking is linked to Mercury for treasury management.
  All corporate docs managed through Atlas dashboard.

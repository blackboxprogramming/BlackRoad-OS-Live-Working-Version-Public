# Railway — BlackRoad OS Integration
# https://docs.railway.com/reference/public-api

name: railway
category: cloud-deploy
status: active
api_base: https://backboard.railway.com/graphql/v2

auth:
  type: bearer_token
  env: RAILWAY_TOKEN

graphql:
  projects:
    list: |
      query { projects { edges { node { id name description createdAt } } } }
    get: |
      query($id: String!) { project(id: $id) { id name services { edges { node { id name } } } } }
  services:
    list: |
      query($projectId: String!) { project(id: $projectId) { services { edges { node { id name } } } } }
  deployments:
    list: |
      query($serviceId: String!) { deployments(input: { serviceId: $serviceId }) { edges { node { id status createdAt } } } }
    trigger: |
      mutation($serviceId: String!) { serviceInstanceRedeploy(serviceId: $serviceId) }
  variables:
    list: |
      query($serviceId: String!, $environmentId: String!) {
        variables(serviceId: $serviceId, environmentId: $environmentId)
      }
    set: |
      mutation($serviceId: String!, $environmentId: String!, $name: String!, $value: String!) {
        variableUpsert(input: { serviceId: $serviceId, environmentId: $environmentId, name: $name, value: $value })
      }


    <style>
      :root{
        --bg:#000;
        --text:rgba(255,255,255,0.88);
        --muted:rgba(255,255,255,0.55);
        --line:rgba(255,255,255,0.14);
        --chip:rgba(255,255,255,0.06);
        --chip2:rgba(255,255,255,0.10);
        --font:system-ui,-apple-system,"Segoe UI",sans-serif;
        --mono:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono",monospace;
      }
      *{box-sizing:border-box}
      html,body{height:100%;margin:0}
      body{background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden}

      .wrap{
        height:100%;
        display:flex;
        flex-direction:column;
      }

      .top{
        padding: 16px 18px 10px;
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap:12px;
      }
      .brand{
        display:flex;
        align-items:center;
        gap:10px;
        min-width:0;
      }
      .mark{
        width:10px;height:10px;border-radius:50%;
        background:#fff;
        box-shadow: 0 0 0 3px rgba(255,255,255,0.06);
      }
      .title{
        font-weight:700;
        letter-spacing:.2px;
        white-space:nowrap;
        overflow:hidden;
        text-overflow:ellipsis;
      }
      .meta{
        font-family:var(--mono);
        font-size:11px;
        color:var(--muted);
        white-space:nowrap;
      }

      .grid-wrap{
        flex:1;
        min-height:0;
        padding: 10px 18px 90px;
        display:flex;
        align-items:stretch;
        justify-content:center;
        overflow:auto;
      }

      .layout{
        width: min(1260px, 100%);
        min-height: 0;
        display:grid;
        grid-template-columns: 260px 1fr 260px;
        grid-template-rows: 1fr auto;
        gap: 14px;
        align-items:start;
      }
      @media (max-width: 1060px){
        .layout{ grid-template-columns: 220px 1fr 220px; }
      }
      @media (max-width: 880px){
        .layout{ grid-template-columns: 1fr; grid-template-rows: auto auto auto auto; }
      }

      .videos{
        display:grid;
        gap: 12px;
        align-content:start;
      }
      .video{
        border-radius: 14px;
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.14);
        overflow:hidden;
        box-shadow: inset 0 0 0 1px rgba(0,0,0,0.25);
        cursor:pointer;
      }
      .thumb{
        aspect-ratio: 16 / 9;
        background:
          radial-gradient(circle at 30% 25%, rgba(255,255,255,0.12), rgba(255,255,255,0) 60%),
          linear-gradient(180deg, rgba(255,255,255,0.06), rgba(0,0,0,0)),
          repeating-linear-gradient(90deg, rgba(255,255,255,0.04) 0 1px, rgba(0,0,0,0) 1px 4px);
        display:flex;
        align-items:center;
        justify-content:center;
        color: rgba(255,255,255,0.65);
        font-family: var(--mono);
        letter-spacing: .04em;
        font-size: 12px;
        position: relative;
      }
      .thumb iframe{
        position:absolute;
        inset:0;
        width:100%;
        height:100%;
        border:0;
      }
      .thumb .thumb-label{
        position:absolute;
        left: 10px;
        bottom: 10px;
        padding: 6px 8px;
        border-radius: 10px;
        background: rgba(0,0,0,0.55);
        border: 1px solid rgba(255,255,255,0.14);
        color: rgba(255,255,255,0.80);
        font-family: var(--mono);
        font-size: 11px;
        letter-spacing: .02em;
        pointer-events:none;
      }
      .vmeta{
        padding: 10px 10px 10px;
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap: 10px;
        color: rgba(255,255,255,0.72);
        font-size: 12px;
      }
      .vmeta .name{
        flex:1;
        min-width:0;
        white-space:nowrap;
        overflow:hidden;
        text-overflow:ellipsis;
        font-size: 12px;
        color: rgba(255,255,255,0.78);
      }
      .vmeta .pill{
        font-family: var(--mono);
        font-size: 11px;
        padding: 4px 8px;
        border-radius: 999px;
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.14);
        color: rgba(255,255,255,0.72);
        white-space:nowrap;
      }
      .video:active{ transform: translateY(1px); }
      .media-thumb{
        background-size: cover;
        background-position: center;
      }
      .media-badges{
        position:absolute;
        left: 10px;
        top: 10px;
        display:flex;
        gap: 6px;
        flex-wrap: wrap;
      }
      .media-badge{
        padding: 4px 7px;
        border-radius: 999px;
        background: rgba(0,0,0,0.58);
        border: 1px solid rgba(255,255,255,0.16);
        color: rgba(255,255,255,0.78);
        font-family: var(--mono);
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: .04em;
      }
      .media-status{
        position:absolute;
        right: 10px;
        top: 10px;
        padding: 4px 7px;
        border-radius: 999px;
        background: rgba(255,255,255,0.10);
        border: 1px solid rgba(255,255,255,0.16);
        color: rgba(255,255,255,0.84);
        font-family: var(--mono);
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: .04em;
      }

      .apps{
        min-height:0;
        display:flex;
        flex-direction:column;
        gap: 12px;
        align-items:center;
        position: relative;
      }
      .apps-head{
        width: 100%;
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 14px;
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.10);
        color: rgba(255,255,255,0.70);
        font-size: 12px;
      }
      .apps-head .hint{ font-family: var(--mono); font-size: 11px; color: rgba(255,255,255,0.55); }

      .apps-home{
        width:100%;
        display:flex;
        flex-direction:column;
        gap: 12px;
        align-items:center;
        transition: opacity 160ms ease;
      }
      .apps-home.hide{
        opacity: 0;
        pointer-events: none;
      }

      .grid{
        width: 100%;
        display:grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 18px 16px;
      }
      @media (max-width: 1060px){
        .grid{ grid-template-columns: repeat(5, 1fr); }
      }
      @media (max-width: 880px){
        .grid{ grid-template-columns: repeat(4, 1fr); }
      }
      @media (max-width: 620px){
        .grid{ grid-template-columns: repeat(3, 1fr); gap: 16px 12px; }
      }

      .app{
        display:flex;
        flex-direction:column;
        align-items:center;
        gap: 8px;
        user-select:none;
      }

      .icon{
        width: 66px;
        height: 66px;
        border-radius: 50%;
        background: radial-gradient(circle at 30% 25%, rgba(255,255,255,0.18), rgba(255,255,255,0.06) 55%, rgba(255,255,255,0.04));
        border: 1px solid var(--line);
        box-shadow:
          0 14px 28px rgba(0,0,0,0.45),
          inset 0 0 0 1px rgba(0,0,0,0.22);
        position: relative;
        cursor: pointer;
      }
      .icon::after{
        content:"";
        position:absolute;
        inset: 18px;
        border-radius: 10px;
        background: rgba(255,255,255,0.82);
        opacity: .9;
      }
      .icon:active{
        transform: translateY(1px);
        box-shadow:
          0 10px 18px rgba(0,0,0,0.40),
          inset 0 0 0 1px rgba(0,0,0,0.22);
      }

      .appstage{
        position:absolute;
        inset: 0;
        pointer-events:none;
        opacity: 0;
        transition: opacity 160ms ease;
      }
      .appstage.show{
        opacity: 1;
        pointer-events:auto;
      }
      .appwin{
        position:absolute;
        left: 0;
        top: 0;
        right: 0;
        bottom: 0;
        border-radius: 16px;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.14);
        box-shadow:
          0 18px 42px rgba(0,0,0,0.55),
          inset 0 0 0 1px rgba(0,0,0,0.25);
        overflow:hidden;
        transform-origin: 0 0;
        transform:
          translate(var(--dx, 0px), var(--dy, 0px))
          scale(var(--sx, 1), var(--sy, 1));
        opacity: 0.001;
        transition:
          transform 260ms cubic-bezier(.2,.8,.2,1),
          opacity 160ms ease;
      }
      .appwin.settled{
        transform: translate(0px, 0px) scale(1, 1);
        opacity: 1;
      }
      @media (prefers-reduced-motion: reduce){
        .apps-home, .appstage, .appwin{ transition: none !important; }
      }

      .win-head{
        display:flex;
        align-items:center;
        gap: 10px;
        padding: 10px 12px;
        border-bottom: 1px solid rgba(255,255,255,0.10);
        background: rgba(0,0,0,0.12);
        color: rgba(255,255,255,0.78);
        font-size: 12px;
      }
      .win-close{
        width: 12px;
        height: 12px;
        border-radius: 999px;
        background: rgba(255,255,255,0.26);
        border: 1px solid rgba(255,255,255,0.18);
        box-shadow: inset 0 0 0 1px rgba(0,0,0,0.30);
        cursor: pointer;
        flex: 0 0 auto;
      }
      .win-close:hover{ background: rgba(255,255,255,0.32); }
      .win-title{
        font-family: var(--mono);
        font-size: 11px;
        color: rgba(255,255,255,0.70);
        white-space:nowrap;
        overflow:hidden;
        text-overflow:ellipsis;
      }
      .win-body{
        height: calc(100% - 42px);
        position: relative;
        overflow: hidden;
        background:
          radial-gradient(circle at 25% 15%, rgba(255,255,255,0.09), rgba(255,255,255,0) 60%),
          linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0));
      }
      .win-body .placeholder{
        position:absolute;
        inset:0;
        padding: 12px;
        display:grid;
        place-items:center;
        color: rgba(255,255,255,0.70);
        font-family: var(--mono);
        font-size: 12px;
        letter-spacing: .02em;
        pointer-events:none;
      }
      .launcher{
        position:absolute;
        inset:0;
        padding: 12px;
        overflow:auto;
      }
      .launcher-head{
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 14px;
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.10);
        color: rgba(255,255,255,0.70);
        font-size: 12px;
        margin-bottom: 12px;
      }
      .launcher-head .hint{ font-family: var(--mono); font-size: 11px; color: rgba(255,255,255,0.55); }
      .launcher .grid{ gap: 16px 14px; }
      .win-body iframe{
        position:absolute;
        inset:0;
        width:100%;
        height:100%;
        border:0;
        background: transparent;
      }
      .surface-root{
        position:absolute;
        inset:0;
        display:grid;
        grid-template-rows: auto 1fr auto;
        min-height:0;
      }
      .surface-meta{
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap: 10px;
        padding: 12px;
        border-bottom: 1px solid rgba(255,255,255,0.08);
        background: rgba(0,0,0,0.12);
      }
      .surface-badges{
        display:flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .surface-badge{
        padding: 4px 8px;
        border-radius: 999px;
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.14);
        color: rgba(255,255,255,0.78);
        font-family: var(--mono);
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: .04em;
      }
      .surface-note{
        color: rgba(255,255,255,0.62);
        font-size: 12px;
        text-align:right;
        max-width: 42%;
      }
      .surface-mount{
        position:relative;
        min-height:0;
        overflow:auto;
        padding: 12px;
      }
      .surface-frame,
      .surface-video,
      .surface-image{
        width:100%;
        height:100%;
        min-height: 320px;
        border: 0;
        border-radius: 14px;
        background: rgba(0,0,0,0.32);
      }
      .surface-image{
        object-fit: contain;
      }
      .surface-audio{
        width:100%;
        margin-top: 16px;
      }
      .surface-screen{
        display:grid;
        gap: 12px;
        height:100%;
      }
      .surface-actions{
        display:flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .surface-action{
        padding: 8px 12px;
        border-radius: 10px;
        border: 1px solid rgba(255,255,255,0.16);
        background: rgba(255,255,255,0.08);
        color: rgba(255,255,255,0.84);
        font-family: var(--mono);
        font-size: 11px;
        cursor:pointer;
      }
      .surface-inline-note,
      .surface-fallback-copy{
        color: rgba(255,255,255,0.68);
        font-size: 12px;
        line-height: 1.5;
      }
      .surface-fallback{
        display:grid;
        gap: 12px;
        margin: 12px;
        padding: 14px;
        border-radius: 14px;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.10);
      }
      .surface-fallback-title{
        color: rgba(255,255,255,0.84);
        font-family: var(--mono);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: .05em;
        margin-bottom: 6px;
      }
      .surface-rights{
        padding: 10px 12px 12px;
        border-top: 1px solid rgba(255,255,255,0.08);
        color: rgba(255,255,255,0.58);
        font-size: 11px;
        line-height: 1.5;
      }
      .surface-note-panel{
        display:grid;
        gap: 16px;
        padding: 8px 0;
      }
      .surface-note-copy{
        color: rgba(255,255,255,0.78);
        font-size: 14px;
        line-height: 1.6;
        max-width: 72ch;
      }
      .surface-note-grid{
        display:grid;
        gap: 10px;
      }
      .surface-note-row{
        display:grid;
        grid-template-columns: 88px 1fr;
        gap: 12px;
        align-items:start;
        color: rgba(255,255,255,0.68);
        font-size: 12px;
      }
      .surface-note-label{
        color: rgba(255,255,255,0.48);
        font-family: var(--mono);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: .04em;
      }
      .system-panel{
        display:grid;
        gap: 18px;
        padding: 8px 0 16px;
      }
      .system-panel-hero{
        display:grid;
        gap: 10px;
        padding: 14px;
        border-radius: 16px;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.10);
      }
      .system-panel-kicker{
        color: rgba(255,255,255,0.50);
        font-family: var(--mono);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: .06em;
      }
      .system-panel-title{
        color: rgba(255,255,255,0.88);
        font-size: 22px;
        font-weight: 700;
        letter-spacing: .01em;
      }
      .system-panel-copy{
        color: rgba(255,255,255,0.70);
        font-size: 13px;
        line-height: 1.6;
        max-width: 72ch;
      }
      .system-panel-widgets{
        display:grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 12px;
      }
      .system-panel-widget{
        display:grid;
        gap: 12px;
        padding: 12px;
        border-radius: 14px;
        border: 1px solid rgba(255,255,255,0.08);
        background: rgba(255,255,255,0.035);
      }
      .system-panel-metrics{
        display:grid;
        grid-template-columns: repeat(auto-fit, minmax(88px, 1fr));
        gap: 10px;
      }
      .system-panel-metric{
        display:grid;
        gap: 4px;
        padding: 10px;
        border-radius: 12px;
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.08);
      }
      .system-panel-metric-value{
        color: rgba(255,255,255,0.88);
        font-size: 18px;
        font-weight: 700;
        letter-spacing: .01em;
      }
      .system-panel-metric-label{
        color: rgba(255,255,255,0.50);
        font-family: var(--mono);
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: .06em;
      }
      .system-panel-facts{
        display:grid;
        gap: 8px;
      }
      .system-panel-fact{
        display:grid;
        gap: 4px;
        padding: 10px;
        border-radius: 12px;
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.06);
      }
      .system-panel-fact-label{
        color: rgba(255,255,255,0.44);
        font-family: var(--mono);
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: .06em;
      }
      .system-panel-fact-value{
        color: rgba(255,255,255,0.78);
        font-size: 12px;
        line-height: 1.5;
      }
      .system-panel-sequence{
        display:grid;
        gap: 10px;
      }
      .system-panel-sequence-step{
        display:grid;
        grid-template-columns: auto 1fr;
        gap: 10px;
        align-items:start;
        padding: 10px;
        border-radius: 12px;
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.06);
      }
      .system-panel-sequence-index{
        width: 24px;
        height: 24px;
        border-radius: 999px;
        display:grid;
        place-items:center;
        background: rgba(255,255,255,0.10);
        color: rgba(255,255,255,0.82);
        font-family: var(--mono);
        font-size: 10px;
      }
      .system-panel-sequence-body{
        display:grid;
        gap: 4px;
      }
      .system-panel-sequence-title{
        color: rgba(255,255,255,0.84);
        font-size: 12px;
        font-weight: 600;
      }
      .system-panel-sequence-copy{
        color: rgba(255,255,255,0.56);
        font-size: 11px;
        line-height: 1.5;
      }
      .system-panel-spotlights{
        display:grid;
        gap: 8px;
      }
      .system-panel-spotlight{
        display:grid;
        gap: 4px;
        padding: 10px;
        border-radius: 12px;
        border: 1px solid rgba(255,255,255,0.08);
        background: rgba(255,255,255,0.04);
        text-align:left;
        color: rgba(255,255,255,0.82);
      }
      .system-panel-spotlight-label{
        color: rgba(255,255,255,0.48);
        font-family: var(--mono);
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: .06em;
      }
      .system-panel-spotlight-title{
        color: rgba(255,255,255,0.86);
        font-size: 12px;
        font-weight: 600;
      }
      .system-panel-spotlight-subtitle{
        color: rgba(255,255,255,0.56);
        font-size: 11px;
        line-height: 1.5;
      }
      .system-panel-briefs{
        display:grid;
        gap: 8px;
      }
      .system-panel-brief{
        display:grid;
        gap: 6px;
        padding: 12px;
        border-radius: 14px;
        border: 1px solid rgba(255,255,255,0.08);
        background:
          linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
        text-align:left;

      }
      .system-panel-fallback-key{
        font-size: 9px;
        letter-spacing: .14em;
        text-transform: uppercase;
        color: rgba(254,215,170,0.72);
      }
      .system-panel-fallback-value{
        font-size: 11px;
        line-height: 1.5;

      }
      .system-panel-fallback-actions{
        display:flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .system-panel-fallback-action{

        background: rgba(49,24,10,0.7);
        color: rgba(255,247,237,0.9);
      }
      .system-panel-fallback-action:hover{
        border-color: rgba(251,146,60,0.4);
        color: rgba(255,251,235,0.98);
        background: rgba(251,146,60,0.18);
      }
      .system-panel-primers{
        display:grid;
        grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
        gap: 12px;
      }
      .system-panel-primer{
        display:grid;
        gap: 10px;
        padding: 14px;
        border-radius: 16px;
        border: 1px solid rgba(99,102,241,0.18);
        background:
          linear-gradient(180deg, rgba(99,102,241,0.12), rgba(31,41,55,0.84)),
          rgba(17,24,39,0.92);
        box-shadow: inset 0 1px 0 rgba(199,210,254,0.08);
      }
      .system-panel-primer-label{
        font-size: 10px;
        letter-spacing: .16em;
        text-transform: uppercase;
        color: rgba(199,210,254,0.82);
      }
      .system-panel-primer-title{
        font-size: 13px;
        font-weight: 600;
        color: rgba(238,242,255,0.96);
      }
      .system-panel-primer-lines{
        display:grid;
        gap: 8px;
      }
      .system-panel-primer-line{
        display:grid;
        gap: 4px;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid rgba(99,102,241,0.16);
        background: rgba(30,27,75,0.68);
      }
      .system-panel-primer-key{
        font-size: 9px;
        letter-spacing: .14em;
        text-transform: uppercase;
        color: rgba(199,210,254,0.72);
      }
      .system-panel-primer-value{
        font-size: 11px;
        line-height: 1.5;
        color: rgba(238,242,255,0.9);
      }
      .system-panel-primer-actions{
        display:flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .system-panel-primer-action{
        border-color: rgba(99,102,241,0.22);
        background: rgba(30,27,75,0.7);
        color: rgba(238,242,255,0.9);
      }
      .system-panel-primer-action:hover{
        border-color: rgba(99,102,241,0.4);
        color: rgba(243,244,246,0.98);
        background: rgba(99,102,241,0.18);
      }
      .system-panel-rituals{
        display:grid;
        grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
        gap: 12px;
      }
      .system-panel-ritual{
        display:grid;
        gap: 10px;
        padding: 14px;
        border-radius: 16px;
        border: 1px solid rgba(244,63,94,0.18);
        background:
          linear-gradient(180deg, rgba(244,63,94,0.12), rgba(63,22,33,0.84)),
          rgba(40,14,22,0.92);
        box-shadow: inset 0 1px 0 rgba(251,146,164,0.08);
      }
      .system-panel-ritual-label{
        font-size: 10px;
        letter-spacing: .16em;
        text-transform: uppercase;
        color: rgba(251,146,164,0.82);
      }
      .system-panel-ritual-title{
        font-size: 13px;
        font-weight: 600;
        color: rgba(254,243,247,0.96);
      }
      .system-panel-ritual-lines{
        display:grid;
        gap: 8px;
      }
      .system-panel-ritual-line{
        display:grid;
        gap: 4px;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid rgba(244,63,94,0.16);
        background: rgba(79,29,46,0.68);
      }
      .system-panel-ritual-key{
        font-size: 9px;
        letter-spacing: .14em;
        text-transform: uppercase;
        color: rgba(251,146,164,0.72);
      }
      .system-panel-ritual-value{
        font-size: 11px;
        line-height: 1.5;
        color: rgba(254,243,247,0.9);
      }
      .system-panel-ritual-actions{
        display:flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .system-panel-ritual-action{
        border-color: rgba(244,63,94,0.22);
        background: rgba(79,29,46,0.7);
        color: rgba(254,243,247,0.9);
      }
      .system-panel-ritual-action:hover{
        border-color: rgba(244,63,94,0.4);
        color: rgba(255,245,248,0.98);
        background: rgba(244,63,94,0.18);
      }
      .system-panel-board{
        display:grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 10px;
      }
      .system-panel-board-column{
        display:grid;
        gap: 8px;
        padding: 10px;
        border-radius: 12px;
        border: 1px solid rgba(255,255,255,0.06);
        background: rgba(255,255,255,0.03);
      }
      .system-panel-board-column-head{
        display:grid;
        gap: 3px;
      }
      .system-panel-board-column-title{
        color: rgba(255,255,255,0.84);
        font-family: var(--mono);
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: .06em;
      }
      .system-panel-board-column-note{
        color: rgba(255,255,255,0.46);
        font-size: 10px;
        line-height: 1.4;
      }
      .system-panel-board-items{
        display:grid;
        gap: 6px;
      }
      .system-panel-board-item{
        display:grid;
        gap: 3px;
        padding: 9px 10px;
        border-radius: 10px;
        border: 1px solid rgba(255,255,255,0.08);
        background: rgba(255,255,255,0.04);
        color: rgba(255,255,255,0.82);
        text-align:left;
      }
      .system-panel-board-item-title{
        color: rgba(255,255,255,0.86);
        font-size: 12px;
        font-weight: 600;
      }
      .system-panel-board-item-subtitle{
        color: rgba(255,255,255,0.54);
        font-size: 10px;
        line-height: 1.4;
      }
      .system-panel-section{
        display:grid;
        gap: 12px;
      }
      .system-panel-section-head{
        display:flex;
        align-items:flex-end;
        justify-content:space-between;
        gap: 12px;
      }
      .system-panel-section-title{
        color: rgba(255,255,255,0.82);
        font-family: var(--mono);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: .06em;
      }
      .system-panel-section-note{
        color: rgba(255,255,255,0.46);
        font-size: 11px;
      }
      .system-panel-grid{
        display:grid;
        grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
        gap: 10px;
      }
      .system-panel-card{
        display:grid;
        gap: 6px;
        padding: 12px;
        border-radius: 14px;
        border: 1px solid rgba(255,255,255,0.10);
        background: rgba(255,255,255,0.04);
        color: rgba(255,255,255,0.82);
        text-align:left;
        cursor:pointer;
      }
      .system-panel-card-title{
        font-size: 13px;
        font-weight: 600;
      }
      .system-panel-card-subtitle{
        color: rgba(255,255,255,0.54);
        font-size: 11px;
        line-height: 1.5;
      }

      .name{
        width: 92px;
        text-align:center;
        font-size: 12px;
        color: rgba(255,255,255,0.78);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .terminal{
        grid-column: 1 / -1;
        border-radius: 14px;
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.10);
        overflow:hidden;
        display:grid;
        grid-template-rows: auto 1fr auto;
        min-height: 220px;
      }
      @media (max-width: 880px){
        .terminal{ min-height: 200px; }
      }
      .term-head{
        padding: 10px 12px;
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap: 10px;
        border-bottom: 1px solid rgba(255,255,255,0.08);
        color: rgba(255,255,255,0.70);
        font-size: 12px;
      }
      .term-head .tag{
        font-family: var(--mono);
        font-size: 11px;
        color: rgba(255,255,255,0.55);
      }
      .term-body{
        padding: 10px 12px;
        overflow:auto;
        font-family: var(--mono);
        font-size: 11px;
        line-height: 1.5;
        color: rgba(255,255,255,0.78);
        white-space: pre-wrap;
        user-select:text;
      }
      .term-in{
        display:flex;
        align-items:center;
        gap: 10px;
        padding: 10px 12px;
        border-top: 1px solid rgba(255,255,255,0.08);
      }
      .prompt{
        font-family: var(--mono);
        font-size: 11px;
        color: rgba(255,255,255,0.60);
        white-space:nowrap;
      }
      .term-in input{
        flex:1;
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.14);
        border-radius: 10px;
        padding: 8px 10px;
        color: rgba(255,255,255,0.86);
        font-family: var(--mono);
        font-size: 12px;
        outline:none;
      }
      .term-in input::placeholder{ color: rgba(255,255,255,0.40); }
      .term-btn{
        padding: 8px 12px;
        border-radius: 10px;
        font-size: 12px;
        font-family: var(--mono);
        color: rgba(255,255,255,0.86);
        background: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.16);
        cursor: default;
        white-space:nowrap;
      }

      .bottom{
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        padding: 14px 14px 18px;
        background: linear-gradient(180deg, rgba(0,0,0,0), rgba(0,0,0,0.75) 30%, rgba(0,0,0,0.92));
        border-top: 1px solid rgba(255,255,255,0.06);
        display:flex;
        justify-content:center;
      }

      .search{
        width: min(840px, 100%);
        display:flex;
        align-items:center;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 999px;
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.14);
        box-shadow: inset 0 0 0 1px rgba(0,0,0,0.25);
        backdrop-filter: blur(12px);
      }
      .lens{
        width: 28px;
        height: 28px;
        border-radius: 999px;
        background: rgba(255,255,255,0.10);
        border: 1px solid rgba(255,255,255,0.14);
        display:grid;
        place-items:center;
        color: rgba(255,255,255,0.82);
        font-family: var(--mono);
        font-size: 12px;
      }
      input{
        flex:1;
        background: transparent;
        border: none;
        outline: none;
        color: var(--text);
        font-size: 14px;
      }
      input::placeholder{ color: rgba(255,255,255,0.42); }
      .btn{
        padding: 8px 12px;
        border-radius: 999px;
        font-size: 12px;
        font-family: var(--mono);
        letter-spacing: .04em;
        color: rgba(255,255,255,0.86);
        background: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.16);
        cursor: default;
        white-space:nowrap;
      }
      .btn:active{ background: rgba(255,255,255,0.10); }

      .toast{
        position: fixed;
        left: 18px;
        bottom: 86px;
        padding: 8px 10px;
        border-radius: 10px;
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.14);
        color: rgba(255,255,255,0.75);
        font-family: var(--mono);
        font-size: 11px;
        white-space: pre-wrap;
        max-width: min(520px, calc(100vw - 36px));
        display:none;
      }
      .toast.show{display:block}
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="top">
        <div class="brand">
          <div class="mark" aria-hidden="true"></div>
          <div class="title">BlackRoad OS</div>
        </div>
        <div class="meta" id="clock">—</div>
      </div>

      <div class="grid-wrap">
        <div class="layout">
          <div class="videos" id="leftVideos"></div>

          <div class="apps">
            <div class="apps-home" id="appsHome">
              <div class="apps-head">
                <div>Apps</div>
                <div class="hint">click an icon → open</div>
              </div>
              <div class="grid" id="grid"></div>
            </div>

            <div class="appstage" id="appStage" aria-hidden="true">
              <div class="appwin" id="appWin" role="dialog" aria-label="App window">
                <div class="win-head">
                  <button class="win-close" id="appClose" aria-label="Back to apps"></button>
                  <div class="win-title" id="appTitle">—</div>
                </div>
                <div class="win-body" id="appBody">
                  <iframe id="appFrame" title="App content" loading="eager"></iframe>
                  <div class="surface-root" id="surfaceRoot" hidden>
                    <div class="surface-meta">
                      <div class="surface-badges" id="surfaceBadges"></div>
                      <div class="surface-note" id="surfaceNote"></div>
                    </div>
                    <div class="surface-mount" id="surfaceMount"></div>
                    <div class="surface-rights" id="surfaceRights"></div>
                  </div>
                  <div class="surface-fallback" id="surfaceFallback" hidden></div>
                  <div class="launcher" id="roadosLauncher" hidden>
                    <div class="launcher-head">
                      <div>RoadOS</div>
                      <div class="hint">pick a category → open</div>
                    </div>
                    <div class="grid" id="roadosGrid"></div>
                  </div>
                  <div class="placeholder" id="appPlaceholder">APP WINDOW</div>
                </div>
              </div>
            </div>
          </div>

          <div class="videos" id="rightVideos"></div>

          <div class="terminal" aria-label="terminal">
            <div class="term-head">
              <div>Terminal</div>
              <div class="tag">mock · local</div>
            </div>
            <div class="term-body" id="term"></div>
            <div class="term-in">
              <div class="prompt">~ $</div>
              <input id="cmd" autocomplete="off" placeholder="type a command (try: surfaces)" />
              <div class="term-btn" id="run">RUN</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <div class="bottom">
      <div class="search" role="search">
        <div class="lens" aria-hidden="true">⌕</div>
        <input id="q" autocomplete="off" placeholder="Search apps, surfaces, categories…" />
        <div class="btn" id="go">GO</div>
      </div>
    </div>

    <script type="module" src="./src/shell/main.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="blackroad-traffic" content="category" />
    <script defer src="https://analytics.blackroad.io/beacon.js"></script>
    <title>Health</title>
    <style>
      html, body { height: 100%; margin: 0; }
      body {
        display: grid;
        place-items: center;
        background: #05070b;
        color: #eaf2ff;
        font: 16px/1.5 Inter, ui-sans-serif, system-ui, sans-serif;
      }
      main {
        width: min(520px, calc(100vw - 48px));
        padding: 24px;
        border: 1px solid rgba(255,255,255,.12);
        border-radius: 20px;
        background: rgba(11,16,24,.92);
        box-shadow: 0 24px 80px rgba(0,0,0,.45);
      }
      h1 { margin: 0 0 8px; font-size: 24px; }
      p { margin: 0 0 16px; color: #b9c6db; }
      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        padding: 0 16px;
        border-radius: 999px;
        background: #4d8dff;
        color: #fff;
        text-decoration: none;
        font-weight: 600;
      }
      code {
        display: block;
        margin-top: 14px;
        color: #7fd0ff;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Opening Health in BlackRoad OS</h1>
      <p>Redirecting to the native shell sector view…</p>
      <a id="launch" href="../../index.html?open=category:Health">Open Health in BlackRoad OS</a>
      <code id="target"></code>
    </main>
    <script>
      const shellUrl = new URL('../../index.html?open=category:Health', window.location.href);
      document.getElementById('launch').href = shellUrl.href;
      document.getElementById('target').textContent = shellUrl.href;
      const targetWindow = window.top && window.top !== window ? window.top : window;
      targetWindow.location.replace(shellUrl.href);
    </script>
  </body>
</html>

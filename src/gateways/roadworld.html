<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>RoadWorld — The World | BlackRoad OS</title>
  <meta name="description" content="RoadWorld: The World. Part of BlackRoad OS — Build anything. Remember everything.">
  <link rel="icon" href="https://images.blackroad.io/pixel-art/road-logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script>
    window.location.replace('https://blackroad.io/home/apps/PixelTown/');
  </script>
  <style>
:root {
  --g: linear-gradient(90deg, #FF6B2B, #FF2255, #CC00AA, #8844FF, #4488FF, #00D4FF);
  --g135: linear-gradient(135deg, #FF6B2B, #FF2255, #CC00AA, #8844FF, #4488FF, #00D4FF);
  --bg: #000;
  --card: #0a0a0a;
  --elevated: #111;
  --hover: #181818;
  --border: #1a1a1a;
  --muted: #444;
  --sub: #737373;
  --text: #f5f5f5;
  --white: #fff;
  --sg: 'Space Grotesk', sans-serif;
  --jb: 'JetBrains Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; -webkit-font-smoothing: antialiased; }
body { background: var(--bg); color: var(--text); font-family: var(--jb); line-height: 1.6; min-height: 100vh; }

.container { max-width: 1100px; width: 100%; margin: 0 auto; padding: 0 24px; }

/* Nav */
.nav { padding: 14px 24px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; display: flex; align-items: center; justify-content: space-between; margin: 24px auto; max-width: 1100px; }
.nav a.logo { font-family: var(--sg); font-size: 18px; font-weight: 700; color: var(--white); text-decoration: none; display: flex; align-items: center; gap: 10px; }
.nav .logo-bar { width: 24px; height: 4px; border-radius: 2px; background: var(--g); }
.nav .links { display: flex; gap: 28px; list-style: none; }
.nav .links a { font-size: 13px; font-weight: 500; color: var(--sub); text-decoration: none; transition: color 0.15s; }
.nav .links a:hover { color: var(--white); }
@media (max-width: 768px) { .nav .links { display: none; } }

/* Hero */
.hero { padding: 80px 0 48px; }
.hero h1 { font-family: var(--sg); font-size: 48px; font-weight: 700; color: var(--white); letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 12px; }
.hero p { font-size: 15px; color: var(--sub); }
.hero .grad-bar { width: 64px; height: 4px; border-radius: 2px; background: var(--g); margin: 24px 0 0; }
.hero .back { font-size: 12px; font-weight: 500; color: var(--muted); text-decoration: none; text-transform: uppercase; letter-spacing: 0.06em; transition: color 0.15s; display: inline-block; margin-bottom: 32px; }
.hero .back:hover { color: var(--white); }
@media (max-width: 768px) { .hero h1 { font-size: 36px; } }

/* Section label */
.section-label { font-size: 12px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); margin-bottom: 20px; }

/* Grid */
.mockup-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; padding-bottom: 80px; }
@media (max-width: 480px) { .mockup-grid { grid-template-columns: 1fr; } }

/* Card */
.card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; text-decoration: none; display: block; transition: border-color 0.15s, transform 0.15s; position: relative; cursor: pointer; }
.card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--g); }
.card:hover { border-color: #333; transform: translateY(-2px); }
.card .card-preview { width: 100%; height: 280px; border: none; pointer-events: none; background: var(--bg); display: block; }
.card .card-label { padding: 16px 20px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.card .card-label span { font-family: var(--sg); font-size: 15px; font-weight: 500; color: var(--text); }
.card .arrow { color: var(--muted); font-size: 15px; transition: color 0.15s, transform 0.15s; }
.card:hover .arrow { color: var(--sub); transform: translateX(4px); }

/* Footer */
.footer { padding: 32px 0; border-top: 1px solid var(--border); text-align: center; color: var(--muted); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; }

a:focus-visible { outline: 2px solid #8844FF; outline-offset: 2px; }
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { transition: none !important; } }
  </style>
</head>
<body>

  <div class="container">
    <nav class="nav">
      <a class="logo" href="/"><span class="logo-bar"></span> BlackRoad OS</a>
      <div class="links">
        <a href="/">Home</a>
        <a href="/products">Products</a>
        <a href="/mockups">Mockups</a>
      </div>
    </nav>
  </div>

  <div class="container">
    <section class="hero">
      <a class="back" href="/products">Back to Products</a>
      <h1>RoadWorld</h1>
      <p>The World</p>
      <div class="grad-bar"></div>
    </section>

    <div class="section-label">3 Mockups</div>

    <div class="section-label">Asset toolkit</div>
    <section class="mockup-grid" style="grid-template-columns:repeat(auto-fill,minmax(280px,1fr));padding-bottom:48px">
      <a class="card" href="https://blackroad.io/home/apps/OkReusePixel/" title="Open okReusePixel">
        <div class="card-preview" style="display:grid;place-items:center;color:var(--sub);font-family:var(--sg);font-size:18px;">Asset launcher</div>
        <div class="card-label">
          <span>okReusePixel</span>
          <span class="arrow">&#8594;</span>
        </div>
      </a>
      <a class="card" href="https://blackroad.io/home/apps/PixelTown/" title="Open PixelTown">
        <div class="card-preview" style="display:grid;place-items:center;color:var(--sub);font-family:var(--sg);font-size:18px;">Tile painter</div>
        <div class="card-label">
          <span>PixelTown</span>
          <span class="arrow">&#8594;</span>
        </div>
      </a>
    </section>

    <section class="mockup-grid">
      <a class="card" href="/mockups/hq-skyscraper-mockup" title="Open HQ Skyscraper">
        <iframe class="card-preview" src="/mockups/hq-skyscraper-mockup" loading="lazy" tabindex="-1" aria-hidden="true"></iframe>
        <div class="card-label">
          <span>HQ Skyscraper</span>
          <span class="arrow">&#8594;</span>
        </div>
      </a>
      <a class="card" href="/mockups/roadspace-mockup" title="Open RoadSpace">
        <iframe class="card-preview" src="/mockups/roadspace-mockup" loading="lazy" tabindex="-1" aria-hidden="true"></iframe>
        <div class="card-label">
          <span>RoadSpace</span>
          <span class="arrow">&#8594;</span>
        </div>
      </a>
      <a class="card" href="/mockups/video-globe" title="Open Video Globe">
        <iframe class="card-preview" src="/mockups/video-globe" loading="lazy" tabindex="-1" aria-hidden="true"></iframe>
        <div class="card-label">
          <span>Video Globe</span>
          <span class="arrow">&#8594;</span>
        </div>
      </a>
    </section>

    <footer class="footer">BlackRoad OS, Inc.</footer>
  </div>

</body>
</html>

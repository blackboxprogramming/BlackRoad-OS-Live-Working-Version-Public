<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>BlackBoard — Education</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>:root{--bg:#000;--card:#060606;--border:#141414;--text:#f0f0f0;--muted:#555}*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',system-ui,sans-serif;min-height:100vh}.shell{max-width:700px;margin:0 auto;padding:0 16px}.header{padding:16px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}.header h1{font-size:18px;font-weight:700}.header .sub{color:var(--muted);font-size:12px}.section{padding:16px 0;border-bottom:1px solid var(--border)}.section h3{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px}.quiz-q{font-size:16px;margin-bottom:12px;line-height:1.5}.quiz-q textarea{width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);padding:12px;border-radius:8px;font-size:14px;resize:none;min-height:80px;outline:none;font-family:inherit;margin-top:8px}.btn{background:#111;border:1px solid #222;color:#ccc;padding:8px 20px;border-radius:6px;cursor:pointer;font-size:13px;font-family:inherit;margin-top:8px}.btn:hover{background:#1a1a1a;color:#fff}.feedback{margin-top:12px;padding:12px;background:var(--card);border:1px solid var(--border);border-radius:8px;font-size:13px;color:#ccc;line-height:1.5;display:none}.topic-input{display:flex;gap:8px;margin-bottom:12px}.topic-input input{flex:1;background:var(--card);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:6px;font-size:14px;outline:none;font-family:inherit}.gen-quiz{padding:12px;background:var(--card);border:1px solid var(--border);border-radius:8px;font-size:14px;color:#ccc;line-height:1.7;white-space:pre-wrap;display:none}</style></head><body>
<div class="shell">
<div class="header"><h1>BlackBoard</h1><span class="sub">education studio</span></div>
<div class="section"><h3>Quiz Mode</h3>
<div class="quiz-q">What is sovereign computing and why does it matter?<textarea id="answer" placeholder="Your answer..."></textarea></div>
<button class="btn" onclick="grade()">Submit for Grading</button>
<div class="feedback" id="feedback"></div>
</div>
<div class="section"><h3>Generate Quiz</h3>
<div class="topic-input"><input id="topic" placeholder="Enter a topic..."><button class="btn" onclick="genQuiz()">Generate</button></div>
<div class="gen-quiz" id="gen-quiz"></div>
</div>
</div>
<script>
var API='http://192.168.4.113:8089';
fetch('https://network-scheduler.blackroad.workers.dev/visit').catch(function(){});
function grade(){var a=document.getElementById('answer').value.trim();if(!a)return;var fb=document.getElementById('feedback');fb.style.display='block';fb.textContent='Calliope is grading...';
fetch(API+'/blackboard/quiz',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:'What is sovereign computing?',answer:a})})
.then(function(r){return r.json()}).then(function(d){fb.textContent=d.feedback||'Grading unavailable'}).catch(function(){fb.textContent='AI offline'})}
function genQuiz(){var t=document.getElementById('topic').value.trim();if(!t)return;var el=document.getElementById('gen-quiz');el.style.display='block';el.textContent='Elias is generating...';
fetch(API+'/blackboard/generate-quiz',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({topic:t})})
.then(function(r){return r.json()}).then(function(d){el.textContent=d.quiz||'Generation unavailable'}).catch(function(){el.textContent='AI offline'})}
</script><script src="blackroad-app.js"></script></body></html>

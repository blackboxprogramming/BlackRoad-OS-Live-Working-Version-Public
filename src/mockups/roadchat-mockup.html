<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>RoadTrip — Agent Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>:root{--bg:#000;--card:#060606;--border:#141414;--text:#f0f0f0;--muted:#555}*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',system-ui,sans-serif;height:100vh;display:flex}.sidebar{width:220px;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}.sidebar-header{padding:12px 16px;border-bottom:1px solid var(--border);font-size:16px;font-weight:700}.agent-list{flex:1;overflow-y:auto}.agent-item{padding:10px 16px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;align-items:center;gap:8px;font-size:13px}.agent-item:hover,.agent-item.active{background:#080808}.agent-item .dot{width:6px;height:6px;border-radius:50%;background:#888;flex-shrink:0}.agent-item .dot.off{background:#333}.agent-item .name{font-weight:600}.agent-item .role{color:var(--muted);font-size:11px}.main{flex:1;display:flex;flex-direction:column}.chat-header{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}.chat-header .agent-name{font-weight:700;font-size:15px}.chat-header .agent-role{color:var(--muted);font-size:12px}.messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}.msg{max-width:80%;padding:10px 14px;border-radius:10px;font-size:14px;line-height:1.5;white-space:pre-wrap}.msg-user{background:#111;border:1px solid #222;align-self:flex-end}.msg-agent{background:var(--card);border:1px solid var(--border);align-self:flex-start;color:#ccc}.msg-agent .n{font-size:10px;font-weight:600;color:#888;margin-bottom:3px;text-transform:uppercase;letter-spacing:.05em}.typing{padding:0 16px 8px;color:var(--muted);font-size:12px;font-style:italic;display:none}.input-bar{padding:10px 16px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0}.input-bar input{flex:1;background:var(--card);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:8px;font-size:14px;outline:none;font-family:inherit}.input-bar input:focus{border-color:#333}.input-bar button{background:#111;border:1px solid #222;color:#ccc;padding:10px 20px;border-radius:8px;cursor:pointer;font-size:14px;font-family:inherit}.input-bar button:hover{background:#1a1a1a;color:#fff}</style></head><body>
<div class="sidebar">
<div class="sidebar-header">RoadTrip</div>
<div class="agent-list" id="agent-list"></div>
</div>
<div class="main">
<div class="chat-header"><span class="agent-name" id="chat-name">Roadie</span><span class="agent-role" id="chat-role">Front Door</span></div>
<div class="messages" id="messages"><div class="msg msg-agent"><div class="n">Roadie</div>Welcome to RoadTrip. Pick any agent from the sidebar to start a conversation. We all share the same memory.</div></div>
<div class="typing" id="typing">thinking...</div>
<div class="input-bar"><input id="input" placeholder="Message..." autofocus><button onclick="send()">Send</button></div>
</div>
<script>
var API='http://192.168.4.113:8089',currentAgent='roadie';
fetch('https://network-scheduler.blackroad.workers.dev/visit').catch(function(){});
var AGENTS=[['roadie','Roadie','Front Door'],['lucidia','Lucidia','Memory'],['sophia','Sophia','Wisdom'],['cecilia','Cecilia','Operations'],['gaia','Gaia','Infrastructure'],['calliope','Calliope','Narrative'],['silas','Silas','Reliability'],['valeria','Valeria','Security'],['elias','Elias','Teaching'],['alice','Alice','Onboarding'],['gematria','Gematria','Analytics'],['atticus','Atticus','Auditor'],['aria','Aria','Voice'],['sebastian','Sebastian','Presentation'],['seraphina','Seraphina','Creative'],['alexandria','Alexandria','Archive'],['theodosia','Theodosia','Doctrine'],['cicero','Cicero','Rhetoric'],['portia','Portia','Policy'],['thalia','Thalia','Delight'],['lyra','Lyra','Rhythm'],['sapphira','Sapphira','Visual'],['ophelia','Ophelia','Reflection'],['celeste','Celeste','Calm'],['anastasia','Anastasia','Recovery'],['olympia','Olympia','Command'],['octavia','Octavia','Queue']];
document.getElementById('agent-list').innerHTML=AGENTS.map(function(a){var off=a[0]==='olympia'||a[0]==='octavia';return '<div class="agent-item'+(a[0]==='roadie'?' active':'')+'" onclick="selectAgent(\''+a[0]+'\',\''+a[1]+'\',\''+a[2]+'\',this)"><span class="dot'+(off?' off':'')+'"></span><span class="name">'+a[1]+'</span><span class="role">'+a[2]+'</span></div>'}).join('');
function selectAgent(id,name,role,el){currentAgent=id;document.getElementById('chat-name').textContent=name;document.getElementById('chat-role').textContent=role;document.querySelectorAll('.agent-item').forEach(function(e){e.classList.remove('active')});el.classList.add('active');document.getElementById('messages').innerHTML='<div class="msg msg-agent"><div class="n">'+name+'</div>Hey, I\'m '+name+'. '+role+'. What can I help with?</div>'}
document.getElementById('input').onkeydown=function(e){if(e.key==='Enter')send()};
async function send(){var input=document.getElementById('input'),text=input.value.trim();if(!text)return;input.value='';var msgs=document.getElementById('messages');
msgs.innerHTML+='<div class="msg msg-user">'+esc(text)+'</div>';msgs.scrollTop=msgs.scrollHeight;
document.getElementById('typing').style.display='block';
try{var r=await fetch(API+'/chat/stream',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({agent:currentAgent,message:text,product:'roadtrip'})});
document.getElementById('typing').style.display='none';
var div=document.createElement('div');div.className='msg msg-agent';div.innerHTML='<div class="n">'+document.getElementById('chat-name').textContent+'</div>';
var tn=document.createTextNode('');div.appendChild(tn);msgs.appendChild(div);
var reader=r.body.getReader(),decoder=new TextDecoder(),full='';
while(true){var res=await reader.read();if(res.done)break;var chunk=decoder.decode(res.value,{stream:true});chunk.split('\n').forEach(function(line){line=line.trim();if(line.startsWith('data: ')){try{var d=JSON.parse(line.slice(6));if(d.token){full+=d.token;tn.textContent=full;msgs.scrollTop=msgs.scrollHeight}}catch(e){}}})}}
catch(e){document.getElementById('typing').style.display='none';msgs.innerHTML+='<div class="msg msg-agent"><div class="n">System</div>Agent offline. Connect to local network.</div>'}
msgs.scrollTop=msgs.scrollHeight}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
</script><script src="blackroad-app.js"></script></body></html>

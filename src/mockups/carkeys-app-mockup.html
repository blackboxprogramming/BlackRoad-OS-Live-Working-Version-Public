<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CarKeys — Vault</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#000;--card:#060606;--border:#141414;--text:#f0f0f0;--muted:#555;--dim:#2a2a2a}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',system-ui,sans-serif;min-height:100vh}
.shell{max-width:600px;margin:0 auto;padding:0 16px}
.header{padding:16px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.header h1{font-size:18px;font-weight:700}
.header .sub{color:var(--muted);font-size:12px}
.header .count{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)}
.form{padding:16px 0;border-bottom:1px solid var(--border)}
.form-row{display:flex;gap:8px;margin-bottom:8px}
.form-row input{flex:1;background:var(--card);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:6px;font-size:13px;outline:none;font-family:inherit}
.form-row select{background:var(--card);border:1px solid var(--border);color:var(--muted);padding:10px;border-radius:6px;font-size:12px}
.form-actions{display:flex;gap:8px}
.btn{background:#111;border:1px solid #222;color:#ccc;padding:8px 18px;border-radius:6px;cursor:pointer;font-size:13px;font-family:inherit}
.btn:hover{background:#1a1a1a;color:#fff}
.cred{padding:14px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.cred-icon{width:32px;height:32px;border-radius:6px;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--muted)}
.cred-info{flex:1}
.cred-service{font-weight:600;font-size:14px}
.cred-user{font-size:12px;color:var(--muted)}
.cred-pass{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--dim);cursor:pointer;padding:4px 8px;background:var(--card);border-radius:4px}
.cred-pass:hover{color:var(--text)}
.generated{padding:12px 0;font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--text);word-break:break-all;display:none}
.empty{text-align:center;padding:40px;color:var(--muted)}
</style>
</head>
<body>
<div class="shell">
  <div class="header">
    <h1>CarKeys</h1>
    <span class="sub">vault</span>
    <span class="count" id="count">0 credentials</span>
  </div>
  <div class="form">
    <div class="form-row">
      <input id="f-service" placeholder="Service name">
      <select id="f-cat"><option value="general">General</option><option value="dev">Dev</option><option value="finance">Finance</option><option value="social">Social</option></select>
    </div>
    <div class="form-row">
      <input id="f-user" placeholder="Username / email">
      <input id="f-pass" type="password" placeholder="Password / key">
    </div>
    <div class="form-actions">
      <button class="btn" id="save-btn">Save to Vault</button>
      <button class="btn" id="gen-btn">Generate Password</button>
    </div>
    <div class="generated" id="generated"></div>
  </div>
  <div id="vault"></div>
</div>
<script>
var API='http://192.168.4.113:8089';
fetch('https://network-scheduler.blackroad.workers.dev/visit').catch(function(){});

document.getElementById('save-btn').onclick=function(){
  var s=document.getElementById('f-service').value.trim();
  var u=document.getElementById('f-user').value.trim();
  var p=document.getElementById('f-pass').value;
  var c=document.getElementById('f-cat').value;
  if(!s||!p)return;
  fetch(API+'/carkeys/store',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({service:s,username:u,password:p,category:c})})
  .then(function(){document.getElementById('f-service').value='';document.getElementById('f-user').value='';document.getElementById('f-pass').value='';loadVault()})
  .catch(function(){alert('Offline — connect to local network')});
};

document.getElementById('gen-btn').onclick=function(){
  fetch(API+'/carkeys/generate?length=24').then(function(r){return r.json()}).then(function(d){
    var el=document.getElementById('generated');
    el.textContent=d.password;
    el.style.display='block';
    document.getElementById('f-pass').value=d.password;
  }).catch(function(){
    var chars='abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%';
    var pw='';for(var i=0;i<24;i++)pw+=chars[Math.floor(Math.random()*chars.length)];
    document.getElementById('generated').textContent=pw;document.getElementById('generated').style.display='block';
    document.getElementById('f-pass').value=pw;
  });
};

function loadVault(){
  fetch(API+'/carkeys/vault').then(function(r){return r.json()}).then(function(d){
    renderVault(d.credentials||[]);
    document.getElementById('count').textContent=d.count+' credentials';
  }).catch(function(){});
}

function renderVault(creds){
  var el=document.getElementById('vault');
  if(!creds.length){el.innerHTML='<div class="empty">Vault is empty. Add your first credential.</div>';return}
  el.innerHTML=creds.map(function(c){
    var initial=(c.service||'?').charAt(0).toUpperCase();
    return '<div class="cred"><div class="cred-icon">'+initial+'</div><div class="cred-info"><div class="cred-service">'+esc(c.service)+'</div><div class="cred-user">'+esc(c.username||'')+'</div></div><span class="cred-pass" onclick="this.textContent=this.textContent===\'••••••••\'?atob(\''+c.encrypted+'\'):\'••••••••\'">••••••••</span></div>';
  }).join('');
}

function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
loadVault();
</script>
<script src="blackroad-app.js"></script>
</body>
</html>

<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>OfficeRoad — Virtual Office</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>:root{--bg:#000;--card:#060606;--border:#141414;--text:#f0f0f0;--muted:#555}*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',system-ui,sans-serif;min-height:100vh}.shell{max-width:800px;margin:0 auto;padding:0 16px}.header{padding:16px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}.header h1{font-size:18px;font-weight:700}.header .sub{color:var(--muted);font-size:12px}.header .online{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;padding:16px 0}.agent-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;cursor:pointer;transition:border-color .15s}.agent-card:hover{border-color:#333}.agent-name{font-weight:600;font-size:14px;margin-bottom:2px}.agent-role{font-size:12px;color:var(--muted)}.agent-status{display:flex;align-items:center;gap:4px;margin-top:6px;font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--muted)}.agent-status .dot{width:5px;height:5px;border-radius:50%}.agent-status .dot.on{background:#888}.agent-status .dot.off{background:#333}.section{padding:16px 0;border-top:1px solid var(--border)}.section h3{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px}.chat-row{display:flex;gap:8px;padding:6px 0;font-size:13px}.chat-agent{font-weight:600;min-width:80px}.chat-msg{color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.chat-time{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim)}</style></head><body>
<div class="shell">
<div class="header"><h1>OfficeRoad</h1><span class="sub">virtual office</span><span class="online" id="online">loading...</span></div>
<div class="grid" id="agents"></div>
<div class="section"><h3>Recent Conversations</h3><div id="chats"><div style="color:var(--muted);font-size:12px">Loading...</div></div></div>
</div>
<script>
var API='http://192.168.4.113:8089';
fetch('https://network-scheduler.blackroad.workers.dev/visit').catch(function(){});
function load(){
fetch(API+'/officeroad/agents').then(function(r){return r.json()}).then(function(d){
document.getElementById('online').textContent=d.online+'/27 online';
document.getElementById('agents').innerHTML=d.agents.map(function(a){
return '<div class="agent-card"><div class="agent-name">'+a.name+'</div><div class="agent-role">'+a.role+'</div><div class="agent-status"><span class="dot '+(a.status==='online'?'on':'off')+'"></span>'+a.status+'</div></div>'}).join('')
}).catch(function(){});
fetch(API+'/officeroad/chat-history').then(function(r){return r.json()}).then(function(d){
document.getElementById('chats').innerHTML=(d.chats||[]).slice(0,10).map(function(c){
return '<div class="chat-row"><span class="chat-agent">'+c.agent+'</span><span class="chat-msg">'+esc(c.response)+'</span><span class="chat-time">'+new Date(c.ts*1000).toLocaleTimeString()+'</span></div>'}).join('')||'<div style="color:var(--muted);font-size:12px">No conversations yet</div>'
}).catch(function(){})}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
load();setInterval(load,30000);
</script><script src="blackroad-app.js"></script></body></html>

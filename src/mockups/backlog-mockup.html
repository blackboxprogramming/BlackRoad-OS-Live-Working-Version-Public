<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RoadCode — Code Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#000;--card:#060606;--border:#141414;--text:#f0f0f0;--muted:#555}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',system-ui,sans-serif;height:100vh;display:flex;flex-direction:column}
.header{padding:8px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0}
.header h1{font-size:16px;font-weight:700}
.header .sub{color:var(--muted);font-size:11px}
.header .file-name{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted)}
.toolbar{padding:6px 16px;border-bottom:1px solid var(--border);display:flex;gap:6px;flex-shrink:0}
.toolbar select,.toolbar input{background:var(--card);border:1px solid var(--border);color:var(--muted);padding:5px 10px;border-radius:4px;font-size:11px;font-family:inherit}
.toolbar input{flex:1;color:var(--text)}
.toolbar button{background:#111;border:1px solid #222;color:#ccc;padding:5px 14px;border-radius:4px;cursor:pointer;font-size:11px;font-family:inherit}
.toolbar button:hover{background:#1a1a1a;color:#fff}
.editor-wrap{flex:1;display:flex;overflow:hidden}
.editor{flex:1;padding:0}
.editor textarea{width:100%;height:100%;background:var(--bg);color:var(--text);border:none;padding:16px;font-family:'JetBrains Mono',monospace;font-size:14px;line-height:1.7;resize:none;outline:none;tab-size:2}
.sidebar{width:250px;border-left:1px solid var(--border);overflow-y:auto;flex-shrink:0}
.sidebar-header{padding:8px 12px;border-bottom:1px solid var(--border);font-size:10px;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}
.snippet{padding:10px 12px;border-bottom:1px solid var(--border);cursor:pointer}
.snippet:hover{background:#080808}
.snippet-title{font-size:12px;font-weight:600}
.snippet-lang{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace}
.output{border-top:1px solid var(--border);padding:12px 16px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);max-height:150px;overflow-y:auto;flex-shrink:0;display:none}
</style>
</head>
<body>
<div class="header">
  <h1>RoadCode</h1>
  <span class="sub">code editor</span>
  <span class="file-name" id="file-name">untitled.js</span>
</div>
<div class="toolbar">
  <select id="lang"><option>javascript</option><option>python</option><option>html</option><option>css</option><option>bash</option><option>json</option></select>
  <input id="title-input" type="text" placeholder="File name...">
  <button id="save-btn">Save</button>
  <button id="run-btn">Run</button>
  <button id="review-btn">AI Review</button>
</div>
<div class="editor-wrap">
  <div class="editor"><textarea id="code" spellcheck="false">// Welcome to RoadCode
// Start coding...

function fibonacci(n) {
  if (n <= 1) return n;
  return fibonacci(n - 1) + fibonacci(n - 2);
}

console.log(fibonacci(10));
</textarea></div>
  <div class="sidebar">
    <div class="sidebar-header">Snippets</div>
    <div id="snippets"><div style="padding:12px;color:var(--muted);font-size:12px">No saved snippets</div></div>
  </div>
</div>
<div class="output" id="output"></div>
<script>
var API='http://192.168.4.113:8089';
fetch('https://network-scheduler.blackroad.workers.dev/visit').catch(function(){});

document.getElementById('save-btn').onclick=function(){
  var code=document.getElementById('code').value;
  var title=document.getElementById('title-input').value.trim()||'untitled';
  var lang=document.getElementById('lang').value;
  fetch(API+'/roadcode/snippet',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:title,language:lang,code:code})})
  .then(function(){loadSnippets()}).catch(function(){});
  document.getElementById('file-name').textContent=title;
};

document.getElementById('run-btn').onclick=function(){
  var code=document.getElementById('code').value;
  var out=document.getElementById('output');
  out.style.display='block';
  try{var result=eval(code);out.textContent='> '+result}catch(e){out.textContent='Error: '+e.message}
};

document.getElementById('review-btn').onclick=function(){
  var code=document.getElementById('code').value;
  var out=document.getElementById('output');
  out.style.display='block';
  out.textContent='Silas is reviewing...';
  fetch(API+'/roadcode/ai-review',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:code})})
  .then(function(r){return r.json()}).then(function(d){out.textContent=d.review||'Review unavailable'})
  .catch(function(){out.textContent='AI offline — connect to local network'});
};

document.getElementById('code').addEventListener('keydown',function(e){
  if(e.key==='Tab'){e.preventDefault();var s=this.selectionStart;this.value=this.value.substring(0,s)+'  '+this.value.substring(this.selectionEnd);this.selectionStart=this.selectionEnd=s+2}
});

function loadSnippets(){
  fetch(API+'/roadcode/snippets').then(function(r){return r.json()}).then(function(d){
    var el=document.getElementById('snippets');
    if(!d.snippets||!d.snippets.length)return;
    el.innerHTML=d.snippets.map(function(s){
      return '<div class="snippet" onclick="loadSnippet(\''+s.id+'\',\''+btoa(s.code||'')+'\',\''+s.title+'\',\''+s.language+'\')"><div class="snippet-title">'+s.title+'</div><div class="snippet-lang">'+s.language+' · '+s.lines+' lines</div></div>';
    }).join('');
  }).catch(function(){});
}
function loadSnippet(id,b64code,title,lang){
  document.getElementById('code').value=atob(b64code);
  document.getElementById('file-name').textContent=title;
  document.getElementById('title-input').value=title;
  document.getElementById('lang').value=lang;
}
loadSnippets();
</script>
<script src="blackroad-app.js"></script>
</body>
</html>

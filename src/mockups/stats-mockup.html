<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Highway — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#000;--card:#060606;--border:#141414;--text:#f0f0f0;--muted:#555}*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',system-ui,sans-serif;min-height:100vh}
.shell{max-width:900px;margin:0 auto;padding:0 16px}
.header{padding:16px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.header h1{font-size:18px;font-weight:700}.header .sub{color:var(--muted);font-size:12px}
.header .live{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;padding:16px 0;border-bottom:1px solid var(--border)}
.stat{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px;text-align:center}
.stat-val{font-size:28px;font-weight:700;font-family:'JetBrains Mono',monospace}
.stat-label{font-size:11px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.08em}
.section{padding:16px 0;border-bottom:1px solid var(--border)}
.section h3{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px}
.product-row{display:flex;align-items:center;padding:6px 0;font-size:13px}
.product-row .name{flex:1}.product-row .count{font-family:'JetBrains Mono',monospace;color:var(--muted);font-size:12px}
.bar{height:4px;background:var(--border);border-radius:2px;margin-top:2px}.bar-fill{height:100%;background:#555;border-radius:2px}
</style></head><body>
<div class="shell">
<div class="header"><h1>Highway</h1><span class="sub">dashboard</span><span class="live" id="live">loading...</span></div>
<div class="grid" id="stats"></div>
<div class="section"><h3>Products by Activity</h3><div id="products"></div></div>
<div class="section"><h3>Recent Activity</h3><div id="recent"></div></div>
</div>
<script>
var API='http://192.168.4.113:8089';
fetch('https://network-scheduler.blackroad.workers.dev/visit').catch(function(){});
function load(){fetch(API+'/highway/dashboard').then(function(r){return r.json()}).then(function(d){
document.getElementById('live').textContent='last updated: '+new Date().toLocaleTimeString();
document.getElementById('stats').innerHTML=[
['items',d.items],['chats',d.chats],['products',d.products_active],['agents',d.agents_online+'/27'],
['fleet',d.fleet+' nodes'],['domains',d.domains],['videos',d.videos],['podcasts',d.podcasts]
].map(function(s){return '<div class="stat"><div class="stat-val">'+s[1]+'</div><div class="stat-label">'+s[0]+'</div></div>'}).join('');
var maxP=Math.max.apply(null,Object.values(d.by_product||{}).concat([1]));
document.getElementById('products').innerHTML=Object.entries(d.by_product||{}).map(function(e){
return '<div class="product-row"><span class="name">'+e[0]+'</span><span class="count">'+e[1]+'</span></div><div class="bar"><div class="bar-fill" style="width:'+Math.round(e[1]/maxP*100)+'%"></div></div>'}).join('')||'<div style="color:var(--muted);font-size:12px">No data yet</div>';
document.getElementById('recent').innerHTML=(d.recent||[]).map(function(r){return '<div class="product-row"><span class="name">'+r.product+' / '+r.type+'</span><span class="count">'+new Date(r.created*1000).toLocaleTimeString()+'</span></div>'}).join('')
}).catch(function(){document.getElementById('live').textContent='offline'})}
load();setInterval(load,30000);
</script><script src="blackroad-app.js"></script></body></html>

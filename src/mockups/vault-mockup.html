<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>RoadChain — Ledger</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#000;--card:#060606;--border:#141414;--text:#f0f0f0;--muted:#555}*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',system-ui,sans-serif;min-height:100vh}
.shell{max-width:700px;margin:0 auto;padding:0 16px}
.header{padding:16px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.header h1{font-size:18px;font-weight:700}.header .sub{color:var(--muted);font-size:12px}
.header .status{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)}
.add-tx{padding:14px 0;border-bottom:1px solid var(--border);display:flex;gap:8px}
.add-tx input{flex:1;background:var(--card);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:6px;font-size:13px;outline:none;font-family:inherit}
.add-tx button{background:#111;border:1px solid #222;color:#ccc;padding:10px 20px;border-radius:6px;cursor:pointer;font-size:13px;font-family:inherit}.add-tx button:hover{background:#1a1a1a;color:#fff}
.block{padding:14px 0;border-bottom:1px solid var(--border)}
.block-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.block-hash{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)}
.block-type{font-size:10px;padding:2px 8px;border:1px solid var(--border);border-radius:3px;color:var(--muted);font-family:'JetBrains Mono',monospace}
.block-data{font-size:13px;color:#ccc;margin-top:4px}
.block-chain{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim);margin-top:4px}
.verify{padding:12px 0;font-family:'JetBrains Mono',monospace;font-size:12px}
.verify.valid{color:#888}.verify.invalid{color:#fff}
</style></head><body>
<div class="shell">
<div class="header"><h1>RoadChain</h1><span class="sub">ledger</span><span class="status" id="status">0 blocks</span></div>
<div class="add-tx">
<input id="tx-data" placeholder="Transaction data...">
<button onclick="addTx()">Add Block</button>
<button onclick="verify()">Verify Chain</button>
</div>
<div class="verify" id="verify"></div>
<div id="ledger"></div>
</div>
<script>
var API='http://192.168.4.113:8089';
fetch('https://network-scheduler.blackroad.workers.dev/visit').catch(function(){});
function addTx(){var d=document.getElementById('tx-data').value.trim();if(!d)return;
fetch(API+'/roadchain/transaction',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:'tx',data:{message:d},signer:'alexa'})})
.then(function(){document.getElementById('tx-data').value='';loadLedger()}).catch(function(){})}
function verify(){fetch(API+'/roadchain/verify').then(function(r){return r.json()}).then(function(d){
var el=document.getElementById('verify');el.className='verify '+(d.valid?'valid':'invalid');
el.textContent=d.valid?'Chain valid — '+d.blocks+' blocks verified':'CHAIN INVALID'}).catch(function(){})}
function loadLedger(){fetch(API+'/roadchain/ledger').then(function(r){return r.json()}).then(function(d){
document.getElementById('status').textContent=d.length+' blocks';
document.getElementById('ledger').innerHTML=d.blocks.reverse().map(function(b){
return '<div class="block"><div class="block-header"><span class="block-hash">#'+b.hash+'</span><span class="block-type">'+b.type+'</span></div><div class="block-data">'+JSON.stringify(b.data)+'</div><div class="block-chain">prev: '+b.prev+' | signer: '+(b.signer||'system')+'</div></div>'
}).join('')}).catch(function(){})}
loadLedger();
</script><script src="blackroad-app.js"></script></body></html>

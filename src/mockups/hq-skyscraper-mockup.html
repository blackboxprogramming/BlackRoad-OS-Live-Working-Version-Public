<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>RoadWorld — Metaverse</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>:root{--bg:#000;--card:#060606;--border:#141414;--text:#f0f0f0;--muted:#555}*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',system-ui,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}.header{padding:8px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0}.header h1{font-size:16px;font-weight:700}.header .sub{color:var(--muted);font-size:11px}.header .coords{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)}.world{flex:1;position:relative;overflow:hidden}.canvas{width:100%;height:100%}.hud{position:absolute;bottom:16px;left:16px;right:16px;display:flex;gap:8px}.hud-card{background:rgba(6,6,6,0.9);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:12px}.hud-card .label{color:var(--muted);font-size:10px;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}.rooms{position:absolute;top:8px;right:8px;display:flex;flex-direction:column;gap:4px}.room{background:rgba(6,6,6,0.9);border:1px solid var(--border);border-radius:6px;padding:6px 12px;font-size:11px;cursor:pointer;color:var(--muted)}.room:hover,.room.active{color:var(--text);border-color:#333}</style></head><body>
<div class="header"><h1>RoadWorld</h1><span class="sub">metaverse</span><span class="coords" id="coords">0, 0</span></div>
<div class="world">
<canvas class="canvas" id="canvas"></canvas>
<div class="rooms">
<div class="room active" onclick="goRoom('lobby')">Lobby</div>
<div class="room" onclick="goRoom('engineering')">Engineering</div>
<div class="room" onclick="goRoom('mission-control')">Mission Control</div>
<div class="room" onclick="goRoom('rooftop')">Rooftop</div>
<div class="room" onclick="goRoom('server-room')">Server Room</div>
</div>
<div class="hud">
<div class="hud-card"><div class="label">Room</div><div id="room-name">Lobby</div></div>
<div class="hud-card"><div class="label">Agents</div><div id="agent-count">27 online</div></div>
<div class="hud-card"><div class="label">Fleet</div><div id="fleet">7 nodes</div></div>
</div>
</div>
<script>
var canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
var W,H,player={x:0,y:0},room='lobby';
function resize(){W=canvas.width=canvas.offsetWidth;H=canvas.height=canvas.offsetHeight;player.x=W/2;player.y=H/2}
window.addEventListener('resize',resize);resize();
var rooms={lobby:{color:'#0a0a0a',label:'HQ Lobby'},engineering:{color:'#080808',label:'Engineering Bay'},'mission-control':{color:'#060606',label:'Mission Control'},rooftop:{color:'#0c0c0c',label:'Rooftop Garden'},'server-room':{color:'#050505',label:'Server Room'}};
function goRoom(r){room=r;document.getElementById('room-name').textContent=rooms[r].label;document.querySelectorAll('.room').forEach(function(el){el.classList.toggle('active',el.textContent.toLowerCase().replace(/ /g,'-')===r)})}
var agents=[],keys={};
for(var i=0;i<12;i++)agents.push({x:Math.random()*800+100,y:Math.random()*400+100,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,name:['Roadie','Lucidia','Sophia','Gaia','Calliope','Silas','Valeria','Alice','Gematria','Aria','Elias','Atticus'][i]});
document.addEventListener('keydown',function(e){keys[e.key]=true});
document.addEventListener('keyup',function(e){keys[e.key]=false});
function update(){
var speed=3;
if(keys.ArrowUp||keys.w)player.y-=speed;if(keys.ArrowDown||keys.s)player.y+=speed;
if(keys.ArrowLeft||keys.a)player.x-=speed;if(keys.ArrowRight||keys.d)player.x+=speed;
player.x=Math.max(20,Math.min(W-20,player.x));player.y=Math.max(20,Math.min(H-20,player.y));
agents.forEach(function(a){a.x+=a.vx;a.y+=a.vy;if(a.x<50||a.x>W-50)a.vx*=-1;if(a.y<50||a.y>H-50)a.vy*=-1});
document.getElementById('coords').textContent=Math.round(player.x)+', '+Math.round(player.y);
}
function draw(){
ctx.fillStyle=rooms[room].color;ctx.fillRect(0,0,W,H);
// Grid
ctx.strokeStyle='#111';ctx.lineWidth=0.5;
for(var x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}
for(var y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}
// Agents
agents.forEach(function(a){ctx.fillStyle='#333';ctx.beginPath();ctx.arc(a.x,a.y,8,0,Math.PI*2);ctx.fill();ctx.fillStyle='#666';ctx.font='10px JetBrains Mono';ctx.textAlign='center';ctx.fillText(a.name,a.x,a.y-14)});
// Player
ctx.fillStyle='#999';ctx.beginPath();ctx.arc(player.x,player.y,10,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';ctx.font='11px Space Grotesk';ctx.textAlign='center';ctx.fillText('You',player.x,player.y-16);
}
function loop(){update();draw();requestAnimationFrame(loop)}
loop();
fetch('https://network-scheduler.blackroad.workers.dev/visit').catch(function(){});
</script><script src="blackroad-app.js"></script></body></html>

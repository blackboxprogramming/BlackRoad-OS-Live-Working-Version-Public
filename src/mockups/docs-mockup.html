<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>RoadBook — Publisher</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#000;--card:#060606;--border:#141414;--text:#f0f0f0;--muted:#555}*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',system-ui,sans-serif;height:100vh;display:flex;flex-direction:column}
.header{padding:8px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0}
.header h1{font-size:16px;font-weight:700}.header .sub{color:var(--muted);font-size:11px}
.toolbar{padding:6px 16px;border-bottom:1px solid var(--border);display:flex;gap:8px;flex-shrink:0}
.toolbar input{flex:1;background:var(--card);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:6px;font-size:14px;font-weight:600;outline:none;font-family:inherit}
.toolbar button{background:#111;border:1px solid #222;color:#ccc;padding:6px 16px;border-radius:6px;cursor:pointer;font-size:12px;font-family:inherit}.toolbar button:hover{background:#1a1a1a;color:#fff}
.toolbar .wordcount{color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;display:flex;align-items:center}
.main{flex:1;display:flex;overflow:hidden}
.editor{flex:1;padding:24px 32px;overflow-y:auto;font-size:16px;line-height:1.8;outline:none;min-height:300px}
.editor:empty:before{content:'Start writing...';color:var(--muted)}
.sidebar{width:220px;border-left:1px solid var(--border);overflow-y:auto;flex-shrink:0}
.sidebar-header{padding:8px 12px;border-bottom:1px solid var(--border);font-size:10px;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}
.doc{padding:10px 12px;border-bottom:1px solid var(--border);cursor:pointer;font-size:12px}.doc:hover{background:#080808}
.doc-title{font-weight:600}.doc-meta{color:var(--muted);font-size:10px;font-family:'JetBrains Mono',monospace}
</style></head><body>
<div class="header"><h1>RoadBook</h1><span class="sub">publisher</span></div>
<div class="toolbar">
<input id="doc-title" placeholder="Document title..." value="Untitled">
<button onclick="saveDoc()">Save</button>
<button onclick="newDoc()">New</button>
<button onclick="expandAI()">AI Expand</button>
<span class="wordcount" id="wc">0 words</span>
</div>
<div class="main">
<div class="editor" id="editor" contenteditable="true"></div>
<div class="sidebar"><div class="sidebar-header">Documents</div><div id="docs"><div style="padding:12px;color:var(--muted);font-size:12px">No documents</div></div></div>
</div>
<script>
var API='http://192.168.4.113:8089',_docId=null;
fetch('https://network-scheduler.blackroad.workers.dev/visit').catch(function(){});
var editor=document.getElementById('editor');
editor.addEventListener('input',function(){var w=editor.innerText.trim().split(/\s+/).filter(Boolean).length;document.getElementById('wc').textContent=w+' words'});
function saveDoc(){var t=document.getElementById('doc-title').value.trim()||'Untitled';var c=editor.innerHTML;
fetch(API+'/roadbook/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:_docId,title:t,content:c})})
.then(function(r){return r.json()}).then(function(d){_docId=d.id;loadDocs()}).catch(function(){localStorage.setItem('rb.draft',JSON.stringify({title:t,content:c}))})}
function newDoc(){_docId=null;editor.innerHTML='';document.getElementById('doc-title').value='Untitled';document.getElementById('wc').textContent='0 words'}
function expandAI(){var sel=window.getSelection().toString()||editor.innerText.slice(-200);
fetch(API+'/roadbook/ai-expand',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:sel})})
.then(function(r){return r.json()}).then(function(d){if(d.expanded)editor.innerHTML+='<p>'+d.expanded+'</p>'}).catch(function(){})}
function loadDocs(){fetch(API+'/roadbook/documents').then(function(r){return r.json()}).then(function(d){
var el=document.getElementById('docs');if(!d.documents||!d.documents.length)return;
el.innerHTML=d.documents.map(function(doc){return '<div class="doc" onclick="openDoc(\''+doc.id+'\')"><div class="doc-title">'+doc.title+'</div><div class="doc-meta">'+doc.words+' words</div></div>'}).join('')
}).catch(function(){})}
function openDoc(id){fetch(API+'/roadbook/doc/'+id).then(function(r){return r.json()}).then(function(d){
if(d.ok){_docId=id;editor.innerHTML=d.content||'';document.getElementById('doc-title').value=d.title||''}
}).catch(function(){})}
loadDocs();
</script><script src="blackroad-app.js"></script></body></html>

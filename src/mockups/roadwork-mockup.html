<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RoadWork — Task Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#000;--card:#060606;--border:#141414;--text:#f0f0f0;--muted:#555;--dim:#2a2a2a}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',system-ui,sans-serif;min-height:100vh}
.header{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.header h1{font-size:18px;font-weight:700}
.header .sub{color:var(--muted);font-size:12px}
.header .counts{margin-left:auto;display:flex;gap:12px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)}
.header .counts span{padding:3px 8px;border:1px solid var(--border);border-radius:4px}
.add-bar{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;gap:8px}
.add-bar input{flex:1;background:var(--card);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:6px;font-size:14px;outline:none;font-family:inherit}
.add-bar select{background:var(--card);border:1px solid var(--border);color:var(--muted);padding:10px;border-radius:6px;font-size:12px;font-family:inherit}
.add-bar button{background:#111;border:1px solid #222;color:#ccc;padding:10px 20px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:13px}
.add-bar button:hover{background:#1a1a1a;color:#fff}
.board{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;min-height:calc(100vh - 110px)}
.column{border-right:1px solid var(--border);padding:0}
.column:last-child{border-right:none}
.col-header{padding:10px 16px;border-bottom:1px solid var(--border);font-size:11px;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);display:flex;align-items:center;gap:8px}
.col-header .count{background:var(--card);border:1px solid var(--border);padding:1px 6px;border-radius:3px;font-size:10px}
.task{padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.task:hover{background:#080808}
.task-text{font-size:14px;line-height:1.5;margin-bottom:6px}
.task-meta{display:flex;gap:8px;font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace}
.task-meta .priority-high{color:#999}
.task-meta .priority-normal{color:var(--muted)}
.task-meta .priority-low{color:var(--dim)}
.task-actions{display:flex;gap:6px;margin-top:8px}
.task-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:3px 10px;border-radius:4px;font-size:10px;cursor:pointer;font-family:'JetBrains Mono',monospace}
.task-btn:hover{color:var(--text);border-color:#333}
.empty-col{padding:20px 16px;color:var(--dim);font-size:13px;text-align:center}
</style>
</head>
<body>
<div class="header">
  <h1>RoadWork</h1>
  <span class="sub">task manager</span>
  <div class="counts" id="counts"><span>todo: 0</span><span>doing: 0</span><span>done: 0</span></div>
</div>
<div class="add-bar">
  <input type="text" id="task-input" placeholder="Add a task...">
  <select id="task-priority"><option value="normal">normal</option><option value="high">high</option><option value="low">low</option></select>
  <button id="add-btn">Add</button>
</div>
<div class="board">
  <div class="column"><div class="col-header">Todo <span class="count" id="count-todo">0</span></div><div id="col-todo"></div></div>
  <div class="column"><div class="col-header">Doing <span class="count" id="count-doing">0</span></div><div id="col-doing"></div></div>
  <div class="column"><div class="col-header">Done <span class="count" id="count-done">0</span></div><div id="col-done"></div></div>
</div>
<script>
var API='http://192.168.4.113:8089';
fetch('https://network-scheduler.blackroad.workers.dev/visit').catch(function(){});

document.getElementById('add-btn').onclick=function(){
  var text=document.getElementById('task-input').value.trim();
  if(!text)return;
  var priority=document.getElementById('task-priority').value;
  fetch(API+'/roadwork/task',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:text,status:'todo',priority:priority})})
  .then(function(){document.getElementById('task-input').value='';loadTasks()})
  .catch(function(){
    var tasks=JSON.parse(localStorage.getItem('rw.tasks')||'[]');
    tasks.unshift({id:Date.now(),text:text,status:'todo',priority:priority,created:Date.now()/1000});
    localStorage.setItem('rw.tasks',JSON.stringify(tasks));
    document.getElementById('task-input').value='';
    renderTasks(tasks);
  });
};
document.getElementById('task-input').onkeydown=function(e){if(e.key==='Enter')document.getElementById('add-btn').click()};

function loadTasks(){
  fetch(API+'/roadwork/tasks').then(function(r){return r.json()}).then(function(d){
    if(d.tasks)renderTasks(d.tasks);
    if(d.counts)updateCounts(d.counts);
  }).catch(function(){
    var local=JSON.parse(localStorage.getItem('rw.tasks')||'[]');
    renderTasks(local);
  });
}

function renderTasks(tasks){
  var cols={todo:[],doing:[],done:[]};
  tasks.forEach(function(t){(cols[t.status]||cols.todo).push(t)});
  ['todo','doing','done'].forEach(function(status){
    var el=document.getElementById('col-'+status);
    var countEl=document.getElementById('count-'+status);
    countEl.textContent=cols[status].length;
    if(!cols[status].length){el.innerHTML='<div class="empty-col">No tasks</div>';return}
    el.innerHTML=cols[status].map(function(t){
      var next=status==='todo'?'doing':status==='doing'?'done':'todo';
      return '<div class="task"><div class="task-text">'+escapeHtml(t.text)+'</div><div class="task-meta"><span class="priority-'+t.priority+'">'+(t.priority||'normal')+'</span></div><div class="task-actions"><button class="task-btn" onclick="moveTask(\''+t.id+'\',\''+next+'\')">→ '+next+'</button><button class="task-btn" onclick="deleteTask(\''+t.id+'\')">×</button></div></div>';
    }).join('');
  });
  document.getElementById('counts').innerHTML='<span>todo: '+cols.todo.length+'</span><span>doing: '+cols.doing.length+'</span><span>done: '+cols.done.length+'</span>';
}

function moveTask(id,status){
  fetch(API+'/items/roadwork/'+id,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:status})})
  .then(function(){loadTasks()}).catch(function(){});
}
function deleteTask(id){
  fetch(API+'/items/roadwork/'+id,{method:'DELETE'}).then(function(){loadTasks()}).catch(function(){});
}
function updateCounts(c){document.getElementById('counts').innerHTML='<span>todo: '+c.todo+'</span><span>doing: '+c.doing+'</span><span>done: '+c.done+'</span>'}
function escapeHtml(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
loadTasks();
</script>
<script src="blackroad-app.js"></script>
</body>
</html>

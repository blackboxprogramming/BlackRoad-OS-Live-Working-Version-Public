<!DOCTYPE html>
<html lang="en">
<head><link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700\&family=JetBrains+Mono:wght@400;500\&display=swap" rel="stylesheet"><style id="br-grayscale">:root{--bg:#000!important;--card:#080808!important;--border:#191919!important;--text:#d4d4d4!important;--muted:#777!important;--dim:#3a3a3a!important;--pink:#888!important;--amber:#999!important;--blue:#777!important;--violet:#666!important;--green:#999!important;--font:Space Grotesk,system-ui,sans-serif!important;--mono:JetBrains Mono,monospace!important}html,body{background:#000!important;color:#d4d4d4!important;font-family:Space Grotesk,system-ui,sans-serif!important}*{border-color:#191919!important}h1,h2,h3,h4,h5,h6,p,span,div,li,a,button,input,select,textarea,label{font-family:Space Grotesk,system-ui,sans-serif!important}code,pre,kbd{font-family:JetBrains Mono,monospace!important}a{color:#bbb!important}a:hover{color:#fff!important}button,input,select,textarea{background:#0a0a0a!important;color:#d4d4d4!important;border-color:#333!important}h1,h2,h3,h4,h5,h6{color:#e0e0e0!important}iframe,img,video,canvas{filter:none!important}svg:not(iframe svg){filter:grayscale(1)!important}</style>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Roadie's Room — BlackRoad OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none}
:root{
  --bg:#000;
  --card:#0a0a0a;
  --elevated:#111;
  --hover:#181818;
  --border:#1a1a1a;
  --muted:#6a6a6a;
  --sub:#a3a3a3;
  --text:#f5f5f5;
  --white:#fff;
  --g:linear-gradient(90deg,#FF6B2B,#FF2255,#CC00AA,#8844FF,#4488FF,#00D4FF);
  --g135:linear-gradient(135deg,#FF6B2B,#FF2255,#CC00AA,#8844FF,#4488FF,#00D4FF);
  --sg:'Space Grotesk',sans-serif;
  --jb:'JetBrains Mono',monospace;
  --in:'Inter',sans-serif;
}
html,body{
  background:
    radial-gradient(circle at top left,rgba(255,34,85,.05),transparent 28%),
    radial-gradient(circle at bottom right,rgba(68,136,255,.06),transparent 32%),
    var(--bg);
  display:flex;align-items:center;justify-content:center;min-height:100vh;
  font-family:var(--sg);overflow:hidden;color:var(--text)
}
#shell{width:min(1280px,100vw);position:relative;display:flex;align-items:center;justify-content:center;}
#stage{width:1280px;height:720px;position:relative;overflow:hidden;transform-origin:top left;cursor:default;background:var(--bg);border:1px solid var(--border);box-shadow:0 24px 60px rgba(0,0,0,.45)}
.topbar{position:absolute;top:0;left:0;right:0;height:3px;background:var(--g);z-index:300}
#header{position:absolute;top:3px;left:0;right:0;height:54px;background:rgba(0,0,0,.88);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 18px;gap:10px;z-index:100;}
#hdr-title{font-size:15px;font-weight:700;letter-spacing:-.02em;color:var(--white);display:flex;align-items:center;gap:10px;flex:1;}
#hdr-title::before{content:'';width:20px;height:3px;border-radius:2px;background:var(--g);display:block;flex-shrink:0}
.hdr-btn{font-family:var(--sg);font-size:12px;font-weight:600;letter-spacing:-.01em;color:var(--text);padding:8px 14px;border:1px solid var(--border);background:transparent;border-radius:6px;cursor:pointer;transition:all .15s;}
.hdr-btn:hover,.hdr-btn.active{color:var(--white);border-color:#333;background:var(--card);}
#hdr-items{font-family:var(--jb);font-size:10px;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;margin-left:8px;}
#hdr-name-input{font-family:var(--jb);font-size:10px;letter-spacing:.08em;color:var(--white);background:transparent;border:none;border-bottom:1px solid var(--border);outline:none;padding:2px 0;width:190px;text-transform:uppercase;}
#hdr-name-input:focus{border-bottom-color:#333;}
#room{position:absolute;top:57px;left:0;right:0;bottom:128px;overflow:hidden;}
#room-bg{position:absolute;inset:0;width:100%;height:100%;z-index:0;pointer-events:none;}
#items-layer{position:absolute;inset:0;z-index:10;pointer-events:none;}
.room-item{position:absolute;cursor:grab;pointer-events:all;transition:filter .15s;}
.room-item:hover{filter:brightness(1.15);}
.room-item.selected{filter:brightness(1.24) drop-shadow(0 0 8px rgba(255,255,255,.18));}
.room-item.dragging{cursor:grabbing;filter:brightness(1.3) drop-shadow(0 0 10px rgba(255,255,255,.22));transition:none;z-index:999!important;}
#robot-div{position:absolute;z-index:20;pointer-events:none;width:160px;height:210px;transform:scale(0.75);transform-origin:50% 100%;}
@keyframes bot-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
#ghost{position:absolute;z-index:200;pointer-events:none;opacity:.5;filter:brightness(.7);}
#ghost.hidden{display:none;}
#del-btn{position:absolute;z-index:300;display:none;width:22px;height:22px;background:var(--card);border:1px solid var(--border);border-radius:50%;cursor:pointer;align-items:center;justify-content:center;font-size:12px;color:var(--muted);transition:color .15s,border-color .15s,background .15s;}
#del-btn:hover{color:var(--white);border-color:#555;background:var(--elevated);}
#inventory{position:absolute;bottom:0;left:0;right:0;height:128px;background:rgba(0,0,0,.94);border-top:1px solid var(--border);display:flex;align-items:center;z-index:100;overflow:hidden;}
#inv-label{font-family:var(--jb);font-size:8px;letter-spacing:.16em;color:var(--muted);text-transform:uppercase;writing-mode:vertical-lr;padding:0 12px;transform:rotate(180deg);border-right:1px solid #101010;height:100%;display:flex;align-items:center;}
#inv-scroll{display:flex;align-items:center;gap:8px;padding:12px 16px;overflow-x:auto;flex:1;height:100%;scrollbar-width:none;}
#inv-scroll::-webkit-scrollbar{display:none;}
.inv-item{flex-shrink:0;width:80px;height:100px;border:1px solid var(--border);background:var(--card);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:0;transition:border-color .15s,background .15s,box-shadow .15s;overflow:hidden;position:relative;border-radius:8px;}
.inv-item:hover{border-color:#333;background:var(--elevated);}
.inv-item.placing{border-color:#3a3a3a;background:linear-gradient(180deg,rgba(255,255,255,.02),transparent),var(--elevated);box-shadow:inset 0 3px 0 0 rgba(255,107,43,.9);}
.inv-icon{flex:1;display:flex;align-items:flex-end;justify-content:center;padding:6px 4px 4px;width:100%;overflow:hidden;}
.inv-icon svg{max-width:100%;max-height:100%;}
.inv-lbl{font-family:var(--jb);font-size:8px;letter-spacing:.05em;color:var(--muted);text-transform:uppercase;padding:4px 0 6px;width:100%;text-align:center;border-top:1px solid #101010;}
.inv-item:hover .inv-lbl,.inv-item.placing .inv-lbl{color:var(--sub);}
#statusbar{position:absolute;bottom:128px;left:0;right:0;height:20px;background:#050505;border-top:1px solid #101010;display:flex;align-items:center;padding:0 16px;z-index:100;}
#statusbar-text{font-family:var(--jb);font-size:8px;letter-spacing:.08em;color:#4b4b4b;text-transform:uppercase;}
#room-label{position:absolute;top:18px;left:50%;transform:translateX(-50%);font-family:var(--jb);font-size:8px;letter-spacing:.18em;color:#303030;text-transform:uppercase;z-index:5;pointer-events:none;}
</style>
</head>
<body>
<div id="shell">
<div id="stage">
<div class="topbar"></div>

  <!-- Header -->
  <div id="header">
    <div id="hdr-title">🏠 <input id="hdr-name-input" value="ROADIE'S ROOM" maxlength="20" spellcheck="false"></div>
    <button class="hdr-btn" id="btn-wall" onclick="cycleWall()">WALL ▸</button>
    <button class="hdr-btn" id="btn-floor" onclick="cycleFloor()">FLOOR ▸</button>
    <button class="hdr-btn" onclick="clearRoom()">CLEAR</button>
    <button class="hdr-btn" onclick="saveRoom()">SAVE ✓</button>
    <div id="hdr-items">0 / 100 items</div>
  </div>

  <!-- Room -->
  <div id="room"
    onmousemove="onRoomMouseMove(event)"
    onmousedown="onRoomMouseDown(event)"
    onmouseup="onRoomMouseUp(event)"
    oncontextmenu="cancelPlace(event)">
    <svg id="room-bg" viewBox="0 0 1280 540" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
      <defs>
        <!-- Wall patterns -->
        <pattern id="wp0" width="1" height="1" patternUnits="objectBoundingBox"><rect width="1" height="1" fill="#0d0d0d"/></pattern>
        <pattern id="wp1" width="40" height="20" patternUnits="userSpaceOnUse"><rect width="40" height="20" fill="#0c0c0c"/><line x1="0" y1="19.5" x2="40" y2="19.5" stroke="#131313" stroke-width=".5"/></pattern>
        <pattern id="wp2" width="40" height="40" patternUnits="userSpaceOnUse"><rect width="40" height="40" fill="#0b0b0b"/><path d="M40 0L0 0 0 40" fill="none" stroke="#111" stroke-width=".5"/></pattern>
        <pattern id="wp3" width="32" height="32" patternUnits="userSpaceOnUse"><rect width="32" height="32" fill="#0b0b0b"/><polygon points="16,0 32,16 16,32 0,16" fill="none" stroke="#131313" stroke-width=".5"/></pattern>
        <!-- Floor patterns -->
        <pattern id="fp0" width="1" height="1" patternUnits="objectBoundingBox"><rect width="1" height="1" fill="#080808"/></pattern>
        <pattern id="fp1" width="60" height="20" patternUnits="userSpaceOnUse"><rect width="60" height="20" fill="#090909"/><line x1="0" y1="0" x2="60" y2="0" stroke="#0f0f0f" stroke-width=".5"/><line x1="30" y1="0" x2="30" y2="20" stroke="#0a0a0a" stroke-width=".5"/></pattern>
        <pattern id="fp2" width="40" height="40" patternUnits="userSpaceOnUse"><rect width="40" height="40" fill="#080808"/><rect width="20" height="20" fill="#0c0c0c"/><rect x="20" y="20" width="20" height="20" fill="#0c0c0c"/></pattern>
        <pattern id="fp3" width="60" height="60" patternUnits="userSpaceOnUse"><rect width="60" height="60" fill="#080808"/><rect x="2" y="2" width="56" height="56" fill="none" stroke="#0e0e0e" stroke-width=".5"/></pattern>
      </defs>
      <!-- Wall -->
      <rect id="wall-rect" x="0" y="0" width="1280" height="380" fill="url(#wp0)"/>
      <!-- Crown molding -->
      <rect x="0" y="0" width="1280" height="6" fill="#111"/>
      <rect x="0" y="6" width="1280" height="2" fill="#0d0d0d"/>
      <!-- Left wall edge shadow -->
      <rect x="0" y="0" width="20" height="540" fill="#000" opacity=".4"/>
      <!-- Right wall edge shadow -->
      <rect x="1260" y="0" width="20" height="540" fill="#000" opacity=".4"/>
      <!-- Chair rail -->
      <rect x="0" y="200" width="1280" height="3" fill="#111"/>
      <!-- Floor -->
      <rect id="floor-rect" x="0" y="380" width="1280" height="160" fill="url(#fp0)"/>
      <!-- Baseboard -->
      <rect x="0" y="378" width="1280" height="6" fill="#111"/>
      <rect x="0" y="384" width="1280" height="2" fill="#0d0d0d"/>
      <!-- Floor perspective gradient -->
      <rect x="0" y="480" width="1280" height="60" fill="#000" opacity=".2"/>
    </svg>

    <!-- Room label -->
    <div id="room-label">· · · ROADIE'S ROOM · · ·</div>

    <!-- Items layer -->
    <div id="items-layer"></div>

    <!-- Robot -->
    <div id="robot-div"></div>

    <!-- Ghost -->
    <div id="ghost" class="hidden"></div>

    <!-- Delete button -->
    <div id="del-btn" onclick="deleteSelected()">✕</div>
  </div>

  <!-- Status bar -->
  <div id="statusbar"><div id="statusbar-text">Click an item below to place it · Drag placed items to move · Click to select · Press DELETE to remove</div></div>

  <!-- Inventory -->
  <div id="inventory">
    <div id="inv-label">INVENTORY</div>
    <div id="inv-scroll" id="inv-scroll"></div>
  </div>

</div>
</div>

<script>
/* ══════════════════════════════════════════════════
   STAGE SCALING
══════════════════════════════════════════════════ */
function scaleStage(){
  const shell=document.getElementById('shell'),stage=document.getElementById('stage');
  const sc=shell.clientWidth/1280; stage.style.transform=`scale(${sc})`; shell.style.height=(720*sc)+'px';
}
scaleStage(); window.addEventListener('resize',scaleStage);

function stageCoords(cx,cy){
  const stage=document.getElementById('stage');
  const rect=stage.getBoundingClientRect();
  const sc=rect.width/1280;
  return {x:(cx-rect.left)/sc, y:(cy-rect.top)/sc};
}

/* ══════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════ */
function init(){
  loadRoom();
  buildInventory();
  renderItems();
  updateItemCount();
  // robot
  const rd = document.getElementById('robot-div');
  rd.innerHTML = ROBOT_SVG;
  updateRobotPos();
  // start robot wander
  scheduleNextWander();
  startRobotLoop();
  // name input
  const nameInput = document.getElementById('hdr-name-input');
  nameInput.addEventListener('change', ()=>{ roomState.robotName = nameInput.value; saveRoom(); });
}

/* ══════════════════════════════════════════════════
   ROBOT AI
══════════════════════════════════════════════════ */
let lastTs = null;
function robotLoop(ts){
  if(!lastTs) lastTs = ts;
  const dt = Math.min((ts - lastTs) / 1000, 0.05);
  lastTs = ts;
  const dx = robot.targetX - robot.x;
  if(Math.abs(dx) > 2){
    robot.facing = dx > 0 ? 1 : -1;
    robot.x += Math.sign(dx) * Math.min(robot.speed * dt, Math.abs(dx));
    updateRobotPos();
  }
  lastRaf = requestAnimationFrame(robotLoop);
}
function startRobotLoop(){ lastRaf = requestAnimationFrame(robotLoop); }
function updateRobotPos(){
  const rd = document.getElementById('robot-div');
  rd.style.left = (robot.x - 80) + 'px';
  rd.style.top = (WALL_BOT_ROOM - 210) + 'px';
  rd.style.transform = `scale(${robot.facing > 0 ? 0.75 : -0.75}, 0.75)`;
}
function scheduleNextWander(){
  clearTimeout(robot.idleTimer);
  robot.idleTimer = setTimeout(()=>{
    robot.targetX = 80 + Math.random() * 1100;
    scheduleNextWander();
  }, 2000 + Math.random() * 3500);
}

/* ══════════════════════════════════════════════════
   PATTERNS
══════════════════════════════════════════════════ */
function cycleWall(){
  roomState.wallPattern = (roomState.wallPattern + 1) % 4;
  document.getElementById('wall-rect').setAttribute('fill', `url(#wp${roomState.wallPattern})`);
  saveRoom();
}
function cycleFloor(){
  roomState.floorPattern = (roomState.floorPattern + 1) % 4;
  document.getElementById('floor-rect').setAttribute('fill', `url(#fp${roomState.floorPattern})`);
  saveRoom();
}
function applyPatterns(){
  document.getElementById('wall-rect').setAttribute('fill', `url(#wp${roomState.wallPattern})`);
  document.getElementById('floor-rect').setAttribute('fill', `url(#fp${roomState.floorPattern})`);
}

/* ══════════════════════════════════════════════════
   INVENTORY
══════════════════════════════════════════════════ */
function buildInventory(){
  const scroll = document.getElementById('inv-scroll');
  scroll.innerHTML = '';
  Object.keys(CATALOG).forEach(type => {
    const item = CATALOG[type];
    const div = document.createElement('div');
    div.className = 'inv-item';
    div.id = 'inv-'+type;
    div.onclick = () => startPlacing(type);
    div.innerHTML = `<div class="inv-icon"><svg viewBox="${item.svg.match(/viewBox="([^"]+)"/)?.[1]||'0 0 100 100'}" width="66" height="66" style="overflow:visible">${item.svg.replace(/<svg[^>]*>/,'').replace('</svg>','')}</svg></div><div class="inv-lbl">${item.label}</div>`;
    scroll.appendChild(div);
  });
}

/* ══════════════════════════════════════════════════
   PLACE MODE
══════════════════════════════════════════════════ */
function startPlacing(type){
  cancelPlace();
  placingType = type;
  document.getElementById('inv-'+type).classList.add('placing');
  document.getElementById('statusbar-text').textContent = `Placing ${CATALOG[type].label} — click room to place · right-click or ESC to cancel`;
  const ghost = document.getElementById('ghost');
  ghost.classList.remove('hidden');
  ghost.innerHTML = CATALOG[type].svg;
  document.getElementById('stage').style.cursor = 'crosshair';
}
function cancelPlace(e){
  if(e) e.preventDefault();
  if(!placingType) return;
  document.getElementById('inv-'+placingType)?.classList.remove('placing');
  placingType = null;
  document.getElementById('ghost').classList.add('hidden');
  document.getElementById('ghost').innerHTML = '';
  document.getElementById('stage').style.cursor = 'default';
  setStatus('Click an item below to place it · Drag placed items to move · Click to select · Press DELETE to remove');
}

/* ══════════════════════════════════════════════════
   MOUSE HANDLERS
══════════════════════════════════════════════════ */
function getRoomCoords(e){
  const room = document.getElementById('room');
  const stage = document.getElementById('stage');
  const rect = stage.getBoundingClientRect();
  const sc = rect.width / 1280;
  const rx = (e.clientX - rect.left) / sc;
  const ry = (e.clientY - rect.top) / sc - HEADER_H;
  return {x: rx, y: ry};
}

function onRoomMouseMove(e){
  const {x, y} = getRoomCoords(e);
  mouseX = x; mouseY = y;

  if(placingType){
    const item = CATALOG[placingType];
    const ghost = document.getElementById('ghost');
    ghost.style.left = (x - item.w/2) + 'px';
    ghost.style.top  = (y - item.h)   + 'px';
    // tint red if invalid zone
    const valid = isValidPlacement(placingType, x, y);
    ghost.style.opacity = valid ? '.55' : '.25';
    ghost.style.filter = valid ? 'brightness(.8)' : 'brightness(.4) sepia(1) hue-rotate(300deg)';
  }

  if(draggingId !== null){
    const item = roomState.items.find(i=>i.id===draggingId);
    if(!item) return;
    const catalog = CATALOG[item.type];
    let nx = x - dragOffsetX;
    let ny = y - dragOffsetY;
    nx = Math.max(0, Math.min(1280 - catalog.w, nx));
    ny = Math.max(0, Math.min(470 - catalog.h, ny));
    item.x = nx; item.y = ny;
    const el = document.getElementById('item-'+draggingId);
    if(el){ el.style.left = nx + 'px'; el.style.top = ny + 'px'; el.style.zIndex = Math.floor(ny + catalog.h); }
  }
}

function isValidPlacement(type, x, y){
  const cat = CATALOG[type];
  const itemType = cat.type;
  const bottomY = y; // y is where we'll place the bottom
  if(itemType === 'wall'){
    return bottomY >= 60 && bottomY <= WALL_BOT_ROOM + 20;
  } else {
    return bottomY >= WALL_BOT_ROOM + 10 && bottomY <= FLOOR_BOT_ROOM;
  }
}

function onRoomMouseDown(e){
  if(e.button === 2){ cancelPlace(e); return; }
  const {x, y} = getRoomCoords(e);

  if(placingType){
    if(!isValidPlacement(placingType, x, y)){
      setStatus('⚠ Cannot place there — floor items go on floor, wall items on wall');
      return;
    }
    placeItem(placingType, x, y);
    return;
  }

  // Check if clicking an existing item
  const hit = hitTest(x, y);
  if(hit){
    selectItem(hit.id);
    draggingId = hit.id;
    dragOffsetX = x - hit.x;
    dragOffsetY = y - hit.y;
    const el = document.getElementById('item-'+hit.id);
    if(el) el.classList.add('dragging');
    e.stopPropagation();
    return;
  }

  // Clicked empty space — deselect
  deselectItem();
}

function onRoomMouseUp(e){
  if(draggingId !== null){
    const el = document.getElementById('item-'+draggingId);
    if(el) el.classList.remove('dragging');
    draggingId = null;
    saveRoom();
  }
}

/* ══════════════════════════════════════════════════
   HIT TEST
══════════════════════════════════════════════════ */
function hitTest(x, y){
  // check from top z-index down
  const sorted = [...roomState.items].sort((a,b)=>{
    const ca=CATALOG[a.type], cb=CATALOG[b.type];
    return (b.y + cb.h) - (a.y + ca.h);
  });
  for(const item of sorted){
    const cat = CATALOG[item.type];
    if(x >= item.x && x <= item.x + cat.w && y >= item.y && y <= item.y + cat.h){
      return item;
    }
  }
  return null;
}

/* ══════════════════════════════════════════════════
   PLACE / SELECT / DELETE
══════════════════════════════════════════════════ */
function placeItem(type, x, y){
  const cat = CATALOG[type];
  const id = nextItemId++;
  const item = { id, type, x: x - cat.w/2, y: y - cat.h };
  // clamp
  item.x = Math.max(0, Math.min(1280 - cat.w, item.x));
  item.y = Math.max(0, Math.min(470 - cat.h, item.y));
  roomState.items.push(item);
  addItemEl(item);
  updateItemCount();
  saveRoom();
  cancelPlace();
}

function addItemEl(item){
  const cat = CATALOG[item.type];
  const layer = document.getElementById('items-layer');
  const div = document.createElement('div');
  div.className = 'room-item';
  div.id = 'item-'+item.id;
  div.innerHTML = cat.svg;
  div.style.left = item.x + 'px';
  div.style.top  = item.y + 'px';
  div.style.width = cat.w + 'px';
  div.style.height = cat.h + 'px';
  div.style.zIndex = cat.type === 'wall' ? 2 : (cat.type === 'rug' ? 1 : Math.floor(item.y + cat.h));
  div.addEventListener('mousedown', (e)=>{
    if(placingType) return;
    e.stopPropagation();
    selectItem(item.id);
    draggingId = item.id;
    const {x, y} = getRoomCoords(e);
    dragOffsetX = x - item.x;
    dragOffsetY = y - item.y;
    div.classList.add('dragging');
  });
  layer.appendChild(div);
}

function renderItems(){
  const layer = document.getElementById('items-layer');
  layer.innerHTML = '';
  roomState.items.forEach(addItemEl);
}

function selectItem(id){
  deselectItem();
  selectedId = id;
  const el = document.getElementById('item-'+id);
  if(el) el.classList.add('selected');
  const item = roomState.items.find(i=>i.id===id);
  if(item){
    const cat = CATALOG[item.type];
    const btn = document.getElementById('del-btn');
    btn.style.display = 'flex';
    btn.style.left = (item.x + cat.w - 8) + 'px';
    btn.style.top  = (item.y - 14) + 'px';
    setStatus(`Selected: ${cat.label} — drag to move · press DELETE or click ✕ to remove`);
  }
}
function deselectItem(){
  if(selectedId !== null){
    const el = document.getElementById('item-'+selectedId);
    if(el){ el.classList.remove('selected'); }
    selectedId = null;
  }
  document.getElementById('del-btn').style.display = 'none';
  setStatus('Click an item below to place it · Drag placed items to move · Click to select · Press DELETE to remove');
}
function deleteSelected(){
  if(selectedId === null) return;
  const idx = roomState.items.findIndex(i=>i.id===selectedId);
  if(idx !== -1) roomState.items.splice(idx, 1);
  const el = document.getElementById('item-'+selectedId);
  if(el) el.remove();
  deselectItem();
  updateItemCount();
  saveRoom();
}

/* ══════════════════════════════════════════════════
   KEYBOARD
══════════════════════════════════════════════════ */
document.addEventListener('keydown', e=>{
  if(e.key === 'Escape') cancelPlace();
  if(e.key === 'Delete' || e.key === 'Backspace'){
    if(document.activeElement.tagName !== 'INPUT') deleteSelected();
  }
});

/* ══════════════════════════════════════════════════
   SAVE / LOAD / CLEAR
══════════════════════════════════════════════════ */
function saveRoom(){
  const state = { ...roomState, nextId: nextItemId };
  localStorage.setItem('blackroad-room-v2', JSON.stringify(state));
  const nameInput = document.getElementById('hdr-name-input');
  if(nameInput) nameInput.value = roomState.robotName || "ROADIE'S ROOM";
}
function loadRoom(){
  try{
    const raw = localStorage.getItem('blackroad-room-v2');
    if(raw){
      const s = JSON.parse(raw);
      roomState = { wallPattern:s.wallPattern||0, floorPattern:s.floorPattern||0, robotName:s.robotName||"ROADIE'S ROOM", items:s.items||[] };
      nextItemId = s.nextId || 1;
      applyPatterns();
      const nameInput = document.getElementById('hdr-name-input');
      if(nameInput) nameInput.value = roomState.robotName;
    }
  } catch(e){}
}
function clearRoom(){
  roomState.items = [];
  renderItems();
  deselectItem();
  updateItemCount();
  saveRoom();
}

/* ══════════════════════════════════════════════════
   UTILS
══════════════════════════════════════════════════ */
function updateItemCount(){
  document.getElementById('hdr-items').textContent = `${roomState.items.length} / 100 items`;
}
function setStatus(msg){
  document.getElementById('statusbar-text').textContent = msg;
}

/* ══════════════════════════════════════════════════
   PREVENT CONTEXT MENU
══════════════════════════════════════════════════ */
document.addEventListener('contextmenu', e=>e.preventDefault());

/* ══════════════════════════════════════════════════
   START
══════════════════════════════════════════════════ */
window.addEventListener('load', init);
</script>

<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>RoadCoin — Token Economy</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#000;--card:#060606;--border:#141414;--text:#f0f0f0;--muted:#555}*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',system-ui,sans-serif;min-height:100vh}
.shell{max-width:500px;margin:0 auto;padding:0 16px}
.header{padding:16px 0;border-bottom:1px solid var(--border);text-align:center}
.header h1{font-size:18px;font-weight:700}.header .sub{color:var(--muted);font-size:12px}
.balance-card{padding:30px 0;text-align:center;border-bottom:1px solid var(--border)}
.balance-amount{font-size:48px;font-weight:700;font-family:'JetBrains Mono',monospace;letter-spacing:-2px}
.balance-label{color:var(--muted);font-size:13px;margin-top:4px}
.transfer{padding:16px 0;border-bottom:1px solid var(--border)}
.transfer h3{font-size:13px;color:var(--muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:.08em}
.transfer-row{display:flex;gap:8px;margin-bottom:8px}
.transfer-row input{flex:1;background:var(--card);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:6px;font-size:13px;outline:none;font-family:inherit}
.transfer-row button{background:#111;border:1px solid #222;color:#ccc;padding:10px 20px;border-radius:6px;cursor:pointer;font-size:13px;font-family:inherit}
.transfer-row button:hover{background:#1a1a1a;color:#fff}
.leaderboard{padding:16px 0}
.leaderboard h3{font-size:13px;color:var(--muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:.08em}
.lb-row{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:14px}
.lb-rank{width:30px;color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:12px}
.lb-user{flex:1}.lb-bal{font-family:'JetBrains Mono',monospace;color:var(--muted)}
.msg{padding:8px;margin:8px 0;border-radius:6px;font-size:12px;font-family:'JetBrains Mono',monospace;display:none}
.msg.ok{display:block;background:#060606;border:1px solid #222;color:#888}.msg.err{display:block;background:#060606;border:1px solid #222;color:#999}
</style></head><body>
<div class="shell">
<div class="header"><h1>RoadCoin</h1><span class="sub">ROAD token economy</span></div>
<div class="balance-card"><div class="balance-amount" id="balance">---</div><div class="balance-label">ROAD balance</div></div>
<div class="transfer">
<h3>Transfer</h3>
<div class="transfer-row"><input id="tx-to" placeholder="Recipient"><input id="tx-amt" type="number" placeholder="Amount" style="width:100px;flex:none"><button onclick="transfer()">Send</button></div>
<div class="msg" id="tx-msg"></div>
</div>
<div class="leaderboard"><h3>Leaderboard</h3><div id="lb"></div></div>
</div>
<script>
var API='http://192.168.4.113:8089';
fetch('https://network-scheduler.blackroad.workers.dev/visit').catch(function(){});
function loadBalance(){fetch(API+'/roadcoin/balance/alexa').then(function(r){return r.json()}).then(function(d){
document.getElementById('balance').textContent=d.balance.toLocaleString()}).catch(function(){document.getElementById('balance').textContent='1,000'})}
function transfer(){var to=document.getElementById('tx-to').value.trim(),amt=parseInt(document.getElementById('tx-amt').value);
if(!to||!amt)return;var msg=document.getElementById('tx-msg');
fetch(API+'/roadcoin/transfer',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({from:'alexa',to:to,amount:amt})})
.then(function(r){return r.json()}).then(function(d){msg.className='msg '+(d.ok?'ok':'err');msg.textContent=d.ok?'Sent '+amt+' ROAD to '+to:d.error;loadBalance();loadLeaderboard()}).catch(function(){msg.className='msg err';msg.textContent='Offline'})}
function loadLeaderboard(){fetch(API+'/roadcoin/leaderboard').then(function(r){return r.json()}).then(function(d){
document.getElementById('lb').innerHTML=(d.leaderboard||[]).map(function(e,i){return '<div class="lb-row"><span class="lb-rank">'+(i+1)+'</span><span class="lb-user">'+e.user+'</span><span class="lb-bal">'+e.balance.toLocaleString()+' ROAD</span></div>'}).join('')||'<div style="color:var(--muted);font-size:12px;padding:8px">No activity yet</div>'}).catch(function(){})}
loadBalance();loadLeaderboard();
</script><script src="blackroad-app.js"></script></body></html>

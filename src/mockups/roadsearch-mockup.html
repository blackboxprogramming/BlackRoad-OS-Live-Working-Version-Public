<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>RoadView — Search</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>:root{--bg:#000;--card:#060606;--border:#141414;--text:#f0f0f0;--muted:#555}*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',system-ui,sans-serif;min-height:100vh}.shell{max-width:700px;margin:0 auto;padding:60px 16px 20px}.logo{text-align:center;margin-bottom:30px}.logo h1{font-size:28px;font-weight:700}.logo p{color:var(--muted);font-size:13px;margin-top:4px}.search-bar{display:flex;gap:8px;margin-bottom:20px}.search-bar input{flex:1;background:var(--card);border:1px solid var(--border);color:var(--text);padding:14px 20px;border-radius:8px;font-size:16px;outline:none;font-family:inherit}.search-bar input:focus{border-color:#333}.search-bar button{background:#111;border:1px solid #222;color:#ccc;padding:14px 28px;border-radius:8px;cursor:pointer;font-size:14px;font-family:inherit}.search-bar button:hover{background:#1a1a1a;color:#fff}.tabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:1px solid var(--border);padding-bottom:8px}.tab{color:var(--muted);font-size:12px;padding:6px 14px;cursor:pointer;border-radius:4px}.tab:hover,.tab.active{color:var(--text);background:#111}.meta{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-bottom:16px}.result{padding:14px 0;border-bottom:1px solid var(--border)}.result-title{font-size:15px;font-weight:600;color:#ccc;margin-bottom:4px}.result-meta{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-bottom:4px}.result-snippet{font-size:13px;color:var(--muted);line-height:1.5}.ai-answer{padding:16px;background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:16px;font-size:14px;color:#ccc;line-height:1.6;display:none}.ai-answer .label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;font-family:'JetBrains Mono',monospace}</style></head><body>
<div class="shell">
<div class="logo"><h1>RoadView</h1><p>Sovereign search across all BlackRoad products</p></div>
<div class="search-bar"><input id="q" placeholder="Search everything..." autofocus><button onclick="search()">Search</button></div>
<div class="tabs"><span class="tab active" onclick="setTab(this,'all')">All</span><span class="tab" onclick="setTab(this,'roadwork')">Tasks</span><span class="tab" onclick="setTab(this,'backroad')">Posts</span><span class="tab" onclick="setTab(this,'roadcode')">Code</span><span class="tab" onclick="setTab(this,'roadbook')">Docs</span></div>
<div class="ai-answer" id="ai-answer"><div class="label">Olympia — AI Answer</div><div id="ai-text"></div></div>
<div class="meta" id="meta"></div>
<div id="results"></div>
</div>
<script>
var API='http://192.168.4.113:8089',currentTab='all';
fetch('https://network-scheduler.blackroad.workers.dev/visit').catch(function(){});
document.getElementById('q').onkeydown=function(e){if(e.key==='Enter')search()};
function setTab(el,tab){currentTab=tab;document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});el.classList.add('active');search()}
function search(){var q=document.getElementById('q').value.trim();if(!q)return;
var url=API+'/roadview/search?q='+encodeURIComponent(q);if(currentTab!=='all')url+='&product='+currentTab;
fetch(url).then(function(r){return r.json()}).then(function(d){
document.getElementById('meta').textContent=d.count+' results for "'+d.query+'" '+(currentTab!=='all'?'in '+currentTab:'');
document.getElementById('results').innerHTML=d.results.map(function(r){var data=typeof r.data==='object'?JSON.stringify(r.data):r.data;
return '<div class="result"><div class="result-title">'+esc(r.product)+' / '+r.type+'</div><div class="result-meta">'+r.id+'</div><div class="result-snippet">'+esc(data).substring(0,200)+'</div></div>'}).join('')||'<div style="color:var(--muted);padding:20px;text-align:center">No results</div>'
}).catch(function(){});
// AI answer
fetch(API+'/roadview/ai-search',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({q:q})})
.then(function(r){return r.json()}).then(function(d){if(d.answer){var el=document.getElementById('ai-answer');el.style.display='block';document.getElementById('ai-text').textContent=d.answer}}).catch(function(){})}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
</script><script src="blackroad-app.js"></script></body></html>

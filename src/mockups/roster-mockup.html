<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>RoadSide — Support</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>:root{--bg:#000;--card:#060606;--border:#141414;--text:#f0f0f0;--muted:#555}*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',system-ui,sans-serif;min-height:100vh}.shell{max-width:700px;margin:0 auto;padding:0 16px}.header{padding:16px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}.header h1{font-size:18px;font-weight:700}.header .sub{color:var(--muted);font-size:12px}.header .open{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)}.form{padding:14px 0;border-bottom:1px solid var(--border)}.form textarea{width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);padding:12px;border-radius:8px;font-size:14px;resize:none;min-height:60px;outline:none;font-family:inherit}.form-row{display:flex;gap:8px;margin-top:8px}.form-row select{background:var(--card);border:1px solid var(--border);color:var(--muted);padding:8px;border-radius:6px;font-size:12px}.form-row button{background:#111;border:1px solid #222;color:#ccc;padding:8px 20px;border-radius:6px;cursor:pointer;font-size:13px;font-family:inherit}.form-row button:hover{background:#1a1a1a;color:#fff}.ticket{padding:14px 0;border-bottom:1px solid var(--border)}.ticket-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}.ticket-id{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)}.ticket-status{font-size:10px;padding:2px 8px;border:1px solid var(--border);border-radius:3px;font-family:'JetBrains Mono',monospace}.ticket-status.open{color:#999}.ticket-status.resolved{color:var(--muted)}.ticket-text{font-size:14px;line-height:1.5}.ticket-actions{margin-top:8px}.ticket-actions button{background:none;border:1px solid var(--border);color:var(--muted);padding:3px 10px;border-radius:4px;font-size:10px;cursor:pointer;font-family:'JetBrains Mono',monospace}.ticket-actions button:hover{color:var(--text);border-color:#333}</style></head><body>
<div class="shell">
<div class="header"><h1>RoadSide</h1><span class="sub">support desk</span><span class="open" id="open-count">0 open</span></div>
<div class="form"><textarea id="ticket-text" placeholder="Describe your issue..."></textarea><div class="form-row"><select id="ticket-priority"><option value="normal">Normal</option><option value="high">High</option><option value="low">Low</option></select><button onclick="submitTicket()">Submit Ticket</button></div></div>
<div id="tickets"></div>
</div>
<script>
var API='http://192.168.4.113:8089';
fetch('https://network-scheduler.blackroad.workers.dev/visit').catch(function(){});
function submitTicket(){var t=document.getElementById('ticket-text').value.trim(),p=document.getElementById('ticket-priority').value;if(!t)return;
fetch(API+'/roadside/ticket',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:t,priority:p})})
.then(function(){document.getElementById('ticket-text').value='';loadTickets()}).catch(function(){})}
function resolveTicket(id){fetch(API+'/roadside/ticket/'+id+'/resolve',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({resolution:'Resolved'})})
.then(function(){loadTickets()}).catch(function(){})}
function loadTickets(){fetch(API+'/roadside/tickets').then(function(r){return r.json()}).then(function(d){
document.getElementById('open-count').textContent=(d.open||0)+' open';
document.getElementById('tickets').innerHTML=(d.tickets||[]).map(function(t){
return '<div class="ticket"><div class="ticket-header"><span class="ticket-id">'+t.id+'</span><span class="ticket-status '+t.status+'">'+t.status+'</span><span style="color:var(--muted);font-size:10px;font-family:JetBrains Mono,monospace;margin-left:auto">'+t.priority+'</span></div><div class="ticket-text">'+esc(t.text)+'</div>'+(t.status==='open'?'<div class="ticket-actions"><button onclick="resolveTicket(\''+t.id+'\')">Resolve</button></div>':'')+'</div>'}).join('')||'<div style="color:var(--muted);padding:20px;text-align:center">No tickets</div>'
}).catch(function(){})}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
loadTickets();
</script><script src="blackroad-app.js"></script></body></html>

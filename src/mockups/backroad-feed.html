<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BackRoad — Sovereign Social</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root { --bg:#000; --card:#060606; --border:#141414; --text:#f0f0f0; --muted:#555; --dim:#2a2a2a; }
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Space Grotesk',system-ui,sans-serif; min-height:100vh; }
a { color:#ccc; text-decoration:none; } a:hover { color:#fff; }

.shell { max-width:680px; margin:0 auto; padding:0 16px; }

.header { padding:16px 0; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; position:sticky; top:0; background:var(--bg); z-index:10; }
.header h1 { font-size:18px; font-weight:700; }
.header .sub { color:var(--muted); font-size:12px; font-family:'JetBrains Mono',monospace; }
.header .agent { margin-left:auto; color:var(--muted); font-size:12px; }

.compose { padding:16px 0; border-bottom:1px solid var(--border); }
.compose textarea { width:100%; background:var(--card); border:1px solid var(--border); color:var(--text); padding:14px; border-radius:8px; font-size:15px; resize:none; font-family:inherit; min-height:80px; outline:none; }
.compose textarea:focus { border-color:#333; }
.compose-bar { display:flex; align-items:center; gap:8px; margin-top:10px; }
.compose-bar .char-count { color:var(--muted); font-size:11px; font-family:'JetBrains Mono',monospace; margin-left:auto; }
.btn { background:#111; border:1px solid #222; color:#ccc; padding:8px 20px; border-radius:6px; font-size:13px; cursor:pointer; font-family:inherit; }
.btn:hover { background:#1a1a1a; color:#fff; }
.btn-primary { background:#1a1a1a; border-color:#333; color:#fff; }

.feed { }
.post { padding:16px 0; border-bottom:1px solid var(--border); }
.post-header { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.post-avatar { width:36px; height:36px; border-radius:50%; background:#111; border:1px solid #222; display:flex; align-items:center; justify-content:center; font-size:14px; color:var(--muted); }
.post-author { font-weight:600; font-size:14px; }
.post-time { color:var(--muted); font-size:11px; font-family:'JetBrains Mono',monospace; }
.post-body { font-size:15px; line-height:1.65; margin-bottom:12px; white-space:pre-wrap; }
.post-actions { display:flex; gap:20px; }
.post-action { color:var(--muted); font-size:12px; cursor:pointer; display:flex; align-items:center; gap:4px; font-family:'JetBrains Mono',monospace; }
.post-action:hover { color:var(--text); }
.post-action .count { }

.replies { margin-top:12px; padding-left:20px; border-left:1px solid var(--border); }
.reply { padding:8px 0; }
.reply-author { font-weight:600; font-size:13px; }
.reply-text { font-size:13px; color:#bbb; margin-top:2px; }
.reply-time { font-size:10px; color:var(--muted); font-family:'JetBrains Mono',monospace; }

.reply-compose { display:flex; gap:8px; margin-top:8px; }
.reply-compose input { flex:1; background:var(--card); border:1px solid var(--border); color:var(--text); padding:8px 12px; border-radius:6px; font-size:13px; outline:none; font-family:inherit; }

.sophia-insight { margin-top:10px; padding:10px 14px; background:var(--card); border:1px solid var(--border); border-radius:8px; font-size:13px; color:var(--muted); }
.sophia-insight .name { color:#888; font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:.08em; margin-bottom:4px; }

.empty { text-align:center; padding:60px 20px; color:var(--muted); }
.empty h2 { font-size:20px; margin-bottom:8px; color:var(--text); }
.empty p { font-size:14px; }
</style>
</head>
<body>

<div class="shell">
  <div class="header">
    <h1>BackRoad</h1>
    <span class="sub">sovereign social</span>
    <span class="agent">hosted by Sophia</span>
  </div>

  <div class="compose">
    <textarea id="compose-text" placeholder="What's on your mind?" maxlength="2000"></textarea>
    <div class="compose-bar">
      <button class="btn btn-primary" id="post-btn">Post</button>
      <span class="char-count" id="char-count">0/2000</span>
    </div>
  </div>

  <div class="feed" id="feed">
    <div class="empty">
      <h2>The feed is empty</h2>
      <p>Be the first to post. No algorithms. No ads. Just depth.</p>
    </div>
  </div>
</div>

<script>
var API = 'http://192.168.4.113:8089';
var SCHEDULER = 'https://network-scheduler.blackroad.workers.dev';

// Track
fetch(SCHEDULER + '/visit').catch(function(){});
fetch(SCHEDULER + '/event', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:'product_visit',product:'backroad'})}).catch(function(){});

var composeEl = document.getElementById('compose-text');
var charCount = document.getElementById('char-count');
var feedEl = document.getElementById('feed');

composeEl.addEventListener('input', function() {
  charCount.textContent = composeEl.value.length + '/2000';
});

document.getElementById('post-btn').addEventListener('click', function() {
  var text = composeEl.value.trim();
  if (!text) return;
  fetch(API + '/backroad/post', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({text: text, author: 'Alexa', tags: []})
  }).then(function() {
    composeEl.value = '';
    charCount.textContent = '0/2000';
    loadFeed();
  }).catch(function() {
    // Offline — store locally
    var posts = JSON.parse(localStorage.getItem('br.backroad.posts') || '[]');
    posts.unshift({id: Date.now(), text: text, author: 'Alexa', likes: 0, replies: [], created: Date.now()/1000});
    localStorage.setItem('br.backroad.posts', JSON.stringify(posts));
    composeEl.value = '';
    renderFeed(posts);
  });
});

function loadFeed() {
  fetch(API + '/backroad/feed').then(function(r) { return r.json(); }).then(function(d) {
    if (d.posts && d.posts.length) renderFeed(d.posts);
  }).catch(function() {
    var local = JSON.parse(localStorage.getItem('br.backroad.posts') || '[]');
    if (local.length) renderFeed(local);
  });
}

function renderFeed(posts) {
  if (!posts.length) return;
  feedEl.innerHTML = '';
  posts.forEach(function(p) {
    var timeStr = p.created ? new Date(p.created * 1000).toLocaleString() : 'just now';
    var initial = (p.author || 'A').charAt(0).toUpperCase();
    var div = document.createElement('div');
    div.className = 'post';
    div.innerHTML =
      '<div class="post-header">' +
        '<div class="post-avatar">' + initial + '</div>' +
        '<span class="post-author">' + (p.author || 'Anonymous') + '</span>' +
        '<span class="post-time">' + timeStr + '</span>' +
      '</div>' +
      '<div class="post-body">' + escapeHtml(p.text || '') + '</div>' +
      '<div class="post-actions">' +
        '<span class="post-action" onclick="likePost(\'' + p.id + '\',this)">&#9825; <span class="count">' + (p.likes || 0) + '</span></span>' +
        '<span class="post-action" onclick="toggleReply(\'' + p.id + '\')">reply <span class="count">' + (p.replies ? p.replies.length : 0) + '</span></span>' +
      '</div>' +
      (p.replies && p.replies.length ? '<div class="replies">' + p.replies.map(function(r) {
        return '<div class="reply"><span class="reply-author">' + (r.author||'anon') + '</span> <span class="reply-time">' + new Date((r.ts||0)*1000).toLocaleTimeString() + '</span><div class="reply-text">' + escapeHtml(r.text||'') + '</div></div>';
      }).join('') + '</div>' : '') +
      '<div class="reply-compose" id="reply-' + p.id + '" style="display:none">' +
        '<input type="text" placeholder="Reply..." onkeydown="if(event.key===\'Enter\')submitReply(\'' + p.id + '\',this)">' +
        '<button class="btn" onclick="submitReply(\'' + p.id + '\',this.previousElementSibling)">Send</button>' +
      '</div>';
    feedEl.appendChild(div);
  });
}

function escapeHtml(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function likePost(id, el) {
  fetch(API + '/backroad/like/' + id, {method:'POST'}).then(function() {
    var count = el.querySelector('.count');
    count.textContent = parseInt(count.textContent) + 1;
  }).catch(function(){});
}

function toggleReply(id) {
  var el = document.getElementById('reply-' + id);
  el.style.display = el.style.display === 'none' ? 'flex' : 'none';
  if (el.style.display === 'flex') el.querySelector('input').focus();
}

function submitReply(postId, input) {
  var text = input.value.trim();
  if (!text) return;
  fetch(API + '/backroad/reply/' + postId, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({text: text, author: 'Alexa'})
  }).then(function() { input.value = ''; loadFeed(); }).catch(function(){});
}

loadFeed();
</script>
<script src="blackroad-app.js"></script>
</body>
</html>

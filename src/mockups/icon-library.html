<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BlackRoad Icon Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --g:linear-gradient(90deg,#FF6B2B,#FF2255,#CC00AA,#8844FF,#4488FF,#00D4FF);
    --bg:#000;--card:#0a0a0a;--elevated:#111;--hover:#181818;
    --border:#1a1a1a;--muted:#444;--sub:#737373;--text:#f5f5f5;--white:#fff;
    --sg:'Space Grotesk',sans-serif;--jb:'JetBrains Mono',monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:var(--sg);min-height:100vh;padding:60px 40px}
  h1{font-size:32px;font-weight:700;color:var(--white);margin-bottom:6px}
  .sub{font-size:14px;color:var(--sub);margin-bottom:48px}
  .sub span{background:var(--g);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .section-label{font-family:var(--jb);font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:16px;margin-top:40px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,80px);gap:16px}
  .icon-cell{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer}
  .icon-cell:hover .icon-box{background:#e8e8e8;transform:scale(1.06)}
  .icon-cell:hover .icon-name{color:var(--text)}
  .icon-box{
    width:60px;height:60px;border-radius:14px;
    background:var(--white);
    display:flex;align-items:center;justify-content:center;
    transition:background .15s,transform .15s;
    flex-shrink:0;
  }
  .icon-box svg{display:block}
  .icon-name{font-family:var(--jb);font-size:9px;color:var(--sub);text-align:center;line-height:1.3;max-width:72px}
  .divider{height:1px;background:var(--border);margin:40px 0}
  .filter-bar{display:flex;gap:8px;margin-bottom:32px;flex-wrap:wrap}
  .filter-btn{font-family:var(--jb);font-size:11px;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--sub);cursor:pointer;transition:.15s}
  .filter-btn:hover,.filter-btn.active{background:var(--white);color:#000;border-color:var(--white)}
  .count{font-family:var(--jb);font-size:11px;color:var(--muted)}
</style>
</head>

const grid = document.getElementById('grid');
const countEl = document.getElementById('count');

function render(cat){
  const filtered = cat==='all'?icons:icons.filter(i=>i.cat===cat);
  countEl.textContent = filtered.length + ' icons';
  grid.innerHTML = filtered.map(i=>`
    <div class="icon-cell" data-cat="${i.cat}">
      <div class="icon-box">${i.svg}</div>
      <div class="icon-name">${i.name}</div>
    </div>
  `).join('');
}

function filter(cat,btn){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render(cat);
}

render('all');

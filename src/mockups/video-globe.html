<!DOCTYPE html>
<html lang="en">
<head><style id="br-grayscale">:root{--bg:#000!important;--card:#080808!important;--border:#191919!important;--text:#d4d4d4!important;--muted:#777!important;--dim:#3a3a3a!important;--pink:#888!important;--amber:#999!important;--blue:#777!important;--violet:#666!important;--green:#999!important;--primary:#999!important;--secondary:#777!important;--accent:#aaa!important}html,body{background:#000!important;color:#d4d4d4!important}*{border-color:#191919!important}a{color:#bbb!important}a:hover{color:#fff!important}button,input,select,textarea{background:#0a0a0a!important;color:#d4d4d4!important;border-color:#333!important}h1,h2,h3,h4,h5,h6{color:#e0e0e0!important}iframe,img,video,canvas{filter:none!important}svg:not(iframe svg){filter:grayscale(1)!important}[class*="dot"],[class*="badge"]{filter:grayscale(1)!important}</style>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>World Connected</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:#0a0a0a;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Space Grotesk',sans-serif;}
#shell{width:min(1280px,100vw);position:relative;display:flex;align-items:center;justify-content:center;}
#stage{width:1280px;height:720px;background:#000;position:relative;overflow:hidden;transform-origin:top left;cursor:pointer;}
#scanlines{position:absolute;inset:0;z-index:100;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.1) 2px,rgba(0,0,0,.1) 4px);}
#prog-wrap{position:absolute;bottom:0;left:0;right:0;height:2px;background:#111;z-index:200;pointer-events:none;}
#prog-fill{height:100%;width:0;background:#fff;}
#play-overlay{position:absolute;inset:0;z-index:150;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;background:rgba(0,0,0,.8);transition:opacity .4s;}
#play-btn{width:72px;height:72px;border:2px solid rgba(255,255,255,.5);border-radius:50%;display:flex;align-items:center;justify-content:center;transition:border-color .2s,transform .2s;}
#play-btn:hover{border-color:#fff;transform:scale(1.08);}
#play-lbl{font-size:11px;letter-spacing:4px;color:#444;text-transform:uppercase;}

#globe-svg{position:absolute;inset:0;width:100%;height:100%;}

/* Stats */
#globe-stats{position:absolute;right:72px;top:50%;transform:translateY(-50%);pointer-events:none;z-index:10;}
.gs{margin-bottom:32px;opacity:0;transform:translateX(20px);transition:opacity .6s,transform .6s;}
.gs.in{opacity:1;transform:translateX(0);}
.gs-n{font-family:'Space Mono',monospace;font-size:36px;font-weight:700;color:#fff;line-height:1;}
.gs-l{font-size:9px;letter-spacing:5px;color:#2a2a2a;text-transform:uppercase;margin-top:4px;}

/* Title */
#globe-title{position:absolute;left:72px;bottom:80px;pointer-events:none;z-index:10;opacity:0;transition:opacity .8s;}
#gt-main{font-size:48px;font-weight:700;color:#fff;letter-spacing:8px;opacity:0;transform:translateY(10px);transition:opacity .7s .2s,transform .7s .2s;}
#gt-main.in{opacity:1;transform:translateY(0);}
#gt-sub{font-size:10px;letter-spacing:6px;color:#2a2a2a;text-transform:uppercase;margin-top:8px;opacity:0;transition:opacity .8s .5s;}
#gt-sub.in{opacity:1;}

/* City tooltip */
#city-tip{
  position:absolute;background:rgba(0,0,0,.9);
  font-family:'Space Mono',monospace;font-size:9px;color:#fff;letter-spacing:2px;
  padding:4px 8px;pointer-events:none;z-index:20;opacity:0;transition:opacity .2s;
  white-space:nowrap;
}
</style>
</head>
<body>
<div id="shell">
<div id="stage" onclick="handleClick()">
  <div id="scanlines"></div>
  <div id="prog-wrap"><div id="prog-fill"></div></div>

  <div id="play-overlay">
    <div id="play-btn">
      <svg width="28" height="28" viewBox="0 0 28 28"><polygon points="7,3 25,14 7,25" fill="#fff"/></svg>
    </div>
    <div id="play-lbl">Play</div>
  </div>

  <svg id="globe-svg" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
    <!-- Stars -->
    <g id="g-stars"></g>
    <!-- Globe layers -->
    <g id="g-lats"></g>
    <g id="g-mers"></g>
    <g id="g-arcs"></g>
    <g id="g-cities"></g>
    <!-- Outer circle last so it clips over meridians -->
    <circle id="g-border" cx="640" cy="360" r="220" fill="none" stroke="#111" stroke-width="1" opacity="0"/>
    <!-- Equator highlight -->
    <ellipse id="g-equator" cx="640" cy="360" rx="220" ry="0" fill="none" stroke="#1a1a1a" stroke-width="1" opacity="0"/>
  </svg>

  <div id="globe-stats">
    <div class="gs" id="gs0"><div class="gs-n" id="gsn0">0</div><div class="gs-l">Population</div></div>
    <div class="gs" id="gs1"><div class="gs-n">195</div><div class="gs-l">Countries</div></div>
    <div class="gs" id="gs2"><div class="gs-n">10K+</div><div class="gs-l">Cities</div></div>
  </div>

  <div id="globe-title">
    <div id="gt-main">WORLD CONNECTED</div>
    <div id="gt-sub">Real-time Global Network · 2024</div>
  </div>

</div>
</div>

<script>
function scaleStage(){
  const shell=document.getElementById('shell'),stage=document.getElementById('stage');
  const sc=shell.clientWidth/1280;
  stage.style.transform=`scale(${sc})`;
  shell.style.height=(720*sc)+'px';
}
scaleStage(); window.addEventListener('resize',scaleStage);

const ns='http://www.w3.org/2000/svg';
const GCX=640, GCY=360, R=220;

// ─── Stars ────────────────────────────────────────────────────────
const starsG=document.getElementById('g-stars');
for(let i=0;i<200;i++){
  const s=document.createElementNS(ns,'circle');
  s.setAttribute('cx',Math.random()*1280);
  s.setAttribute('cy',Math.random()*720);
  s.setAttribute('r',Math.random()<0.08?1.5:0.5);
  s.setAttribute('fill','#fff');
  s.setAttribute('opacity',Math.random()*0.3+0.05);
  starsG.appendChild(s);
}

// ─── Latitude rings (static) ──────────────────────────────────────
const LATS=[-60,-40,-20,0,20,40,60];
const latsG=document.getElementById('g-lats');
LATS.forEach(deg=>{
  const phi=deg*Math.PI/180;
  const ry_ring=R*Math.cos(phi)*0.18; // perspective flatten
  const rx_ring=R*Math.cos(phi);
  const cy_offset=R*Math.sin(phi);
  const el=document.createElementNS(ns,'ellipse');
  el.setAttribute('cx',GCX); el.setAttribute('cy',GCY+cy_offset);
  el.setAttribute('rx',rx_ring); el.setAttribute('ry',ry_ring);
  el.setAttribute('fill','none'); el.setAttribute('stroke','#0d0d0d');
  el.setAttribute('stroke-width','0.5'); el.setAttribute('opacity','0');
  el.style.transition='opacity .8s';
  latsG.appendChild(el);
});

// ─── Meridian lines (rotating) ───────────────────────────────────
const NUM_MERS=12;
const mersG=document.getElementById('g-mers');
const merEls=[];
for(let i=0;i<NUM_MERS;i++){
  const el=document.createElementNS(ns,'ellipse');
  el.setAttribute('cx',GCX); el.setAttribute('cy',GCY);
  el.setAttribute('rx',0); el.setAttribute('ry',R);
  el.setAttribute('fill','none'); el.setAttribute('stroke','#111');
  el.setAttribute('stroke-width','0.5'); el.setAttribute('opacity','0');
  el.style.transition='opacity .8s';
  mersG.appendChild(el);
  merEls.push(el);
}

// ─── Cities ──────────────────────────────────────────────────────
const CITIES=[
  {name:'NEW YORK',   lon:-74,  lat: 41},
  {name:'LONDON',     lon: -1,  lat: 51},
  {name:'DUBAI',      lon: 55,  lat: 25},
  {name:'TOKYO',      lon:139,  lat: 35},
  {name:'SINGAPORE',  lon:103,  lat:  1},
  {name:'SAO PAULO',  lon:-46,  lat:-23},
  {name:'LAGOS',      lon:  3,  lat:  6},
  {name:'SYDNEY',     lon:151,  lat:-34},
  {name:'MUMBAI',     lon: 73,  lat: 19},
  {name:'TORONTO',    lon:-79,  lat: 43},
];
const CONNECTIONS=[
  [0,1],[1,2],[2,3],[3,4],[4,7],[0,5],[5,6],[6,1],[2,8],[8,4],[0,9],[9,0],[3,7]
];

const citiesG=document.getElementById('g-cities');
const arcsG=document.getElementById('g-arcs');
const cityDots=[]; const cityLabels=[]; const arcEls=[];

CITIES.forEach((city,i)=>{
  const g=document.createElementNS(ns,'g');
  g.setAttribute('opacity','0'); g.style.transition='opacity .4s';
  const dot=document.createElementNS(ns,'circle');
  dot.setAttribute('r','4'); dot.setAttribute('fill','#fff');
  const ring=document.createElementNS(ns,'circle');
  ring.setAttribute('r','8'); ring.setAttribute('fill','none');
  ring.setAttribute('stroke','#fff'); ring.setAttribute('stroke-width','0.5'); ring.setAttribute('opacity','0.3');
  const lbl=document.createElementNS(ns,'text');
  lbl.setAttribute('font-family','Space Mono, monospace'); lbl.setAttribute('font-size','8');
  lbl.setAttribute('fill','#333'); lbl.setAttribute('text-anchor','middle');
  lbl.setAttribute('dy','-12'); lbl.setAttribute('letter-spacing','1');
  lbl.textContent=city.name;
  g.appendChild(ring); g.appendChild(dot); g.appendChild(lbl);
  citiesG.appendChild(g);
  cityDots.push({g, dot, ring, lbl, city});
});

CONNECTIONS.forEach(([a,b],i)=>{
  const path=document.createElementNS(ns,'path');
  path.setAttribute('fill','none'); path.setAttribute('stroke','#1a1a1a');
  path.setAttribute('stroke-width','1'); path.setAttribute('opacity','0');
  arcsG.appendChild(path);
  arcEls.push({path, a, b});
});

// ─── Globe rotation state ─────────────────────────────────────────
let globeRot=0;
let globeVisible=false;
let citiesVisible=false;
let arcsVisible=false;
let cityRevealIdx=0;

function project(lon, lat, rot){
  const λ=lon*Math.PI/180 - rot;
  const φ=lat*Math.PI/180;
  const visible=Math.cos(λ)>0;
  const x=GCX + R*Math.sin(λ)*Math.cos(φ);
  const y=GCY - R*Math.sin(φ);
  return {x,y,visible, depth:Math.cos(λ)*Math.cos(φ)};
}

function updateGlobe(rot){
  // Meridians
  merEls.forEach((el,i)=>{
    const angle=rot+(i/NUM_MERS)*Math.PI;
    const rx=R*Math.abs(Math.cos(angle));
    el.setAttribute('rx',rx);
    const front=Math.cos(angle)>0;
    el.setAttribute('stroke',front?'#111':'#090909');
    el.setAttribute('stroke-dasharray',front?'none':'2 6');
  });

  // Cities & arcs
  if(citiesVisible){
    cityDots.forEach(({g,dot,lbl,city},i)=>{
      const p=project(city.lon, city.lat, rot);
      g.setAttribute('transform',`translate(${p.x},${p.y})`);
      g.setAttribute('opacity', p.visible ? (p.depth*0.8+0.2).toFixed(2) : '0');
    });
  }
  if(arcsVisible){
    arcEls.forEach(({path,a,b})=>{
      const pa=project(CITIES[a].lon,CITIES[a].lat,rot);
      const pb=project(CITIES[b].lon,CITIES[b].lat,rot);
      if(pa.visible && pb.visible){
        const mx=(pa.x+pb.x)/2, my=(pa.y+pb.y)/2;
        const dx=mx-GCX, dy=my-GCY;
        const dist=Math.hypot(dx,dy)||1;
        const pull=1.3;
        const cx2=GCX+dx*pull, cy2=GCY+dy*pull;
        path.setAttribute('d',`M${pa.x},${pa.y} Q${cx2},${cy2} ${pb.x},${pb.y}`);
        path.setAttribute('opacity','0.6');
      } else {
        path.setAttribute('opacity','0');
      }
    });
  }
}

// ─── Timeline ─────────────────────────────────────────────────────
const DURATION=14;
let playing=false,startTime=null,raf=null,fired=new Set();
const timeline=[];
function at(sec,fn){timeline.push({sec,fn});}

at(0.0,()=>{
  // Border fades in
  const border=document.getElementById('g-border');
  border.style.transition='opacity 1.5s';
  border.setAttribute('opacity','1');
});
at(0.8,()=>{
  // Latitude rings
  document.querySelectorAll('#g-lats ellipse').forEach((el,i)=>
    setTimeout(()=>el.setAttribute('opacity','1'),i*120));
});
at(1.8,()=>{
  // Meridians fade in, start rotating
  merEls.forEach((el,i)=>setTimeout(()=>el.setAttribute('opacity','1'),i*80));
  globeVisible=true;
  // Equator highlight
  const eq=document.getElementById('g-equator');
  eq.style.transition='opacity 1s, ry 1s';
  eq.setAttribute('ry','34'); eq.setAttribute('opacity','1');
});
at(4.5,()=>{
  citiesVisible=true;
  // Reveal cities one by one
  cityDots.forEach((_,i)=>setTimeout(()=>{
    cityDots[i].g.setAttribute('opacity','1');
  }, i*300+50));
});
at(7.5,()=>{
  arcsVisible=true;
  arcEls.forEach(({path},i)=>setTimeout(()=>{
    path.setAttribute('opacity','0.5');
  },i*180));
});
at(9.5,()=>{
  document.getElementById('gs0').classList.add('in');
  countUp('gsn0',8200000000,1200,'',v=>{
    if(v>=1e9) return (v/1e9).toFixed(1)+'B';
    if(v>=1e6) return (v/1e6).toFixed(0)+'M';
    return v;
  });
  setTimeout(()=>document.getElementById('gs1').classList.add('in'),400);
  setTimeout(()=>document.getElementById('gs2').classList.add('in'),800);
});
at(11.5,()=>{
  document.getElementById('globe-title').style.opacity='1';
  document.getElementById('gt-main').classList.add('in');
  document.getElementById('gt-sub').classList.add('in');
});

function tick(ts){
  if(!startTime) startTime=ts;
  const t=(ts-startTime)/1000;
  document.getElementById('prog-fill').style.width=Math.min(t/DURATION*100,100)+'%';
  timeline.forEach((ev,i)=>{if(t>=ev.sec&&!fired.has(i)){fired.add(i);ev.fn();}});

  if(globeVisible){
    globeRot=t*0.3;
    updateGlobe(globeRot);
  }

  if(t<DURATION+1) raf=requestAnimationFrame(tick); else onEnd();
}

function handleClick(){if(!playing)startVideo();}
function startVideo(){
  const ov=document.getElementById('play-overlay');
  ov.style.opacity='0'; setTimeout(()=>ov.style.display='none',400);
  playing=true; fired.clear(); globeRot=0; globeVisible=false;
  citiesVisible=false; arcsVisible=false; resetAll();
  raf=requestAnimationFrame(tick);
}
function onEnd(){
  playing=false;
  const ov=document.getElementById('play-overlay');
  ov.style.display='flex'; document.getElementById('play-lbl').textContent='Replay';
  setTimeout(()=>ov.style.opacity='1',60); fired.clear();
}
function resetAll(){
  startTime=null;
  document.getElementById('g-border').setAttribute('opacity','0');
  document.getElementById('g-border').style.transition='none';
  document.getElementById('g-equator').setAttribute('opacity','0');
  document.getElementById('g-equator').setAttribute('ry','0');
  document.getElementById('g-equator').style.transition='none';
  document.querySelectorAll('#g-lats ellipse').forEach(el=>el.setAttribute('opacity','0'));
  merEls.forEach(el=>{el.setAttribute('opacity','0'); el.setAttribute('rx','0');});
  cityDots.forEach(({g})=>g.setAttribute('opacity','0'));
  arcEls.forEach(({path})=>path.setAttribute('opacity','0'));
  [0,1,2].forEach(i=>document.getElementById('gs'+i).classList.remove('in'));
  document.getElementById('gsn0').textContent='0';
  document.getElementById('globe-title').style.opacity='0';
  document.getElementById('gt-main').classList.remove('in');
  document.getElementById('gt-sub').classList.remove('in');
  document.getElementById('prog-fill').style.width='0';
}

function countUp(id,target,dur,suffix,fmt){
  const el=document.getElementById(id);
  const t0=performance.now();
  function frame(now){
    const p=Math.min((now-t0)/dur,1);
    const ease=1-Math.pow(1-p,3);
    const v=Math.round(ease*target);
    el.textContent=(fmt?fmt(v):v)+suffix;
    if(p<1)requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}
</script>
</body>
</html>

name = "roundtrip-blackroad"
main = "src/worker.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]
account_id = "848cf0b18d51e0170e0d1537aec3505a"

routes = [
  { pattern = "roundtrip.blackroad.io/*", zone_name = "blackroad.io" }
]

[vars]
MESH_SECRET = "blackroad-mesh-2026"

[[kv_namespaces]]
binding = "ROUNDTRIP_KV"
id = "1861124753e742709fbc393fffa6c9ba"

# Shared D1 with chat-blackroad — same backend
[[d1_databases]]
binding = "DB"
database_name = "blackroad-chat"
database_id = "ec4efdfb-a76e-46fb-a821-1278e17e7b90"

[triggers]
crons = [
  "0 * * * *",
  "*/5 * * * *",
]

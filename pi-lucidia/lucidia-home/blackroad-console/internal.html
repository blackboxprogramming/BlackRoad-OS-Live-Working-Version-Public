<!DOCTYPE html>
<html><head><title>BlackRoad Internal Dashboard</title><style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:sans-serif;background:linear-gradient(135deg,#0a0a12,#1a1a2e);color:#fff;min-height:100vh;padding:40px}.header{text-align:center;margin-bottom:50px}.header h1{background:linear-gradient(135deg,#f7931a,#9945ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:48px;font-weight:800}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}.card{background:rgba(18,18,31,0.95);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:30px;cursor:pointer;transition:all 0.3s}.card:hover{transform:translateY(-5px);box-shadow:0 10px 30px rgba(153,69,255,0.3)}.card-icon{font-size:48px;margin-bottom:15px}.card-title{font-size:20px;font-weight:700;margin-bottom:10px}.card-desc{color:rgba(255,255,255,0.6);font-size:14px}
</style></head><body>
<div class="header"><h1>🔒 INTERNAL</h1><p style="color:rgba(255,255,255,0.6);margin-top:10px">Operations Dashboard</p></div>
<div class="grid">
<div class="card"><div class="card-icon">📊</div><div class="card-title">Analytics</div><div class="card-desc">View system metrics</div></div>
<div class="card"><div class="card-icon">👥</div><div class="card-title">Users</div><div class="card-desc">Manage user accounts</div></div>
<div class="card"><div class="card-icon">🖥️</div><div class="card-title">Infrastructure</div><div class="card-desc">Pi fleet status</div></div>
<div class="card"><div class="card-icon">📝</div><div class="card-title">Logs</div><div class="card-desc">System logs</div></div>
<div class="card"><div class="card-icon">🔐</div><div class="card-title">Security</div><div class="card-desc">Access control</div></div>
<div class="card"><div class="card-icon">⚙️</div><div class="card-title">Settings</div><div class="card-desc">System configuration</div></div>
</div>
</body></html>

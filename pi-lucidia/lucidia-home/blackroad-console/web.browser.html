<!DOCTYPE html>
<html><head><title>BlackRoad Browser</title><style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:sans-serif;background:#0a0a12;color:#fff;height:100vh;display:flex;flex-direction:column}.browser-bar{height:50px;background:#12121f;border-bottom:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;padding:0 15px;gap:10px}.url-bar{flex:1;padding:12px;background:rgba(255,255,255,0.05);border:2px solid rgba(255,255,255,0.1);border-radius:10px;color:#fff;font-size:14px}.url-bar:focus{outline:none;border-color:#9945ff}iframe{flex:1;border:none;background:#fff}
</style></head><body>
<div class="browser-bar">
<input class="url-bar" id="urlBar" placeholder="Enter URL..." value="https://blackroad.io">
<button onclick="navigate()" style="padding:12px 20px;background:linear-gradient(135deg,#9945ff,#14f195);border:none;border-radius:10px;color:#fff;cursor:pointer;font-weight:700">Go</button>
</div>
<iframe id="frame" src="https://blackroad.io"></iframe>
<script>
function navigate(){document.getElementById('frame').src=document.getElementById('urlBar').value}
document.getElementById('urlBar').addEventListener('keypress',e=>{if(e.key==='Enter')navigate()});
</script>
</body></html>

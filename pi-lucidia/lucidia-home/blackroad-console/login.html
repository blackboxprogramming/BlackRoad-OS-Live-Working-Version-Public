<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlackRoad Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(135deg, #0a0a12 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            width: 100%;
            max-width: 450px;
            padding: 40px;
            background: rgba(18,18,31,0.95);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.5);
            backdrop-filter: blur(30px);
        }
        .logo {
            text-align: center;
            margin-bottom: 40px;
        }
        .logo h1 {
            background: linear-gradient(135deg, #f7931a 0%, #e91e8c 50%, #9945ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 36px;
            font-weight: 800;
            letter-spacing: 2px;
        }
        .logo p {
            color: rgba(255,255,255,0.6);
            font-size: 14px;
            margin-top: 10px;
        }
        .form-group {
            margin-bottom: 25px;
        }
        label {
            display: block;
            color: rgba(255,255,255,0.8);
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        input {
            width: 100%;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            font-size: 15px;
            transition: all 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #9945ff;
            box-shadow: 0 0 20px rgba(153,69,255,0.3);
        }
        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #9945ff 0%, #14f195 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(153,69,255,0.4);
        }
        .links {
            text-align: center;
            margin-top: 30px;
        }
        .links a {
            color: #9945ff;
            text-decoration: none;
            font-size: 14px;
            margin: 0 10px;
        }
        .social-login {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .social-btn {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .social-btn:hover {
            background: rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>👻 BLACKROAD</h1>
            <p>Access the Future</p>
        </div>
        <form id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn">Sign In</button>
        </form>
        <div class="links">
            <a href="#">Forgot Password?</a>
            <a href="#">Create Account</a>
        </div>
        <div class="social-login">
            <button class="social-btn">🔗 Continue with GitHub</button>
            <button class="social-btn">🌐 Continue with Google</button>
            <button class="social-btn">💼 Continue with Microsoft</button>
        </div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            window.location.href = '/';
        });
    </script>
</body>
</html>

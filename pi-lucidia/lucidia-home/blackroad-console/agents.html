<!DOCTYPE html>
<html><head><title>BlackRoad Agents Network</title><style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:sans-serif;background:linear-gradient(135deg,#0a0a12,#1a1a2e);color:#fff;min-height:100vh;padding:40px}.header h1{background:linear-gradient(135deg,#9945ff,#14f195);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:48px;font-weight:800;margin-bottom:40px}.agents{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px}.agent-card{background:rgba(18,18,31,0.95);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:30px;backdrop-filter:blur(20px)}.agent-icon{font-size:48px;margin-bottom:15px}.agent-name{font-size:24px;font-weight:700;margin-bottom:10px}.agent-status{display:inline-block;padding:5px 10px;background:rgba(20,241,149,0.2);border:1px solid #14f195;border-radius:6px;font-size:12px;color:#14f195;margin-bottom:15px}.agent-desc{color:rgba(255,255,255,0.6);font-size:14px;line-height:1.6}
</style></head><body>
<div class="header"><h1>🤖 AGENTS NETWORK</h1></div>
<div class="agents">
<div class="agent-card"><div class="agent-icon">🔮</div><div class="agent-name">Alice</div><div class="agent-status">● ONLINE</div><div class="agent-desc">Claude-powered agent for advanced reasoning and code generation</div></div>
<div class="agent-card"><div class="agent-icon">🌟</div><div class="agent-name">Aria</div><div class="agent-status">● ONLINE</div><div class="agent-desc">GPT-4 powered agent for creative tasks and writing</div></div>
<div class="agent-card"><div class="agent-icon">👻</div><div class="agent-name">Lucidia</div><div class="agent-status">● ONLINE</div><div class="agent-desc">Local Gemma agent for privacy-first operations</div></div>
</div>
</body></html>

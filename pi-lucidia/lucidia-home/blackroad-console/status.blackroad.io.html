<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BlackRoad Status</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(135deg, #0a0a12 0%, #1a1a2e 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 {
            background: linear-gradient(135deg, #f7931a 0%, #e91e8c 50%, #9945ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 48px;
            text-align: center;
            margin-bottom: 50px;
        }
        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .status-card {
            background: rgba(18,18,31,0.95);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(30px);
        }
        .status-indicator {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 2s infinite;
        }
        .online { background: #14f195; }
        .offline { background: #e91e8c; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .service-name {
            color: white;
            font-size: 20px;
            font-weight: 700;
            margin: 10px 0;
        }
        .service-url {
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 SYSTEM STATUS</h1>
        <div class="status-grid">
            <div class="status-card">
                <span class="status-indicator online"></span>
                <div class="service-name">Lucidia Pi</div>
                <div class="service-url">192.168.4.38</div>
            </div>
            <div class="status-card">
                <span class="status-indicator online"></span>
                <div class="service-name">Aria Pi</div>
                <div class="service-url">192.168.4.64</div>
            </div>
            <div class="status-card">
                <span class="status-indicator offline"></span>
                <div class="service-name">Alice Pi</div>
                <div class="service-url">192.168.4.49</div>
            </div>
            <div class="status-card">
                <span class="status-indicator online"></span>
                <div class="service-name">Cloudflare Tunnel</div>
                <div class="service-url">35 domains active</div>
            </div>
            <div class="status-card">
                <span class="status-indicator online"></span>
                <div class="service-name">Alice Agent (Claude)</div>
                <div class="service-url">Sonnet 4.5</div>
            </div>
            <div class="status-card">
                <span class="status-indicator online"></span>
                <div class="service-name">Aria Agent (GPT-4)</div>
                <div class="service-url">OpenAI</div>
            </div>
            <div class="status-card">
                <span class="status-indicator online"></span>
                <div class="service-name">Lucidia Agent (Gemma)</div>
                <div class="service-url">Local Ollama</div>
            </div>
        </div>
    </div>
</body>
</html>

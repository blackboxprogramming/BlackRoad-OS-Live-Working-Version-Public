version: '3.8'

services:
  minio:
    image: minio/minio:latest
    container_name: minio-distributed
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data:/data
    environment:
      - MINIO_ROOT_USER=blackroad
      - MINIO_ROOT_PASSWORD=blackroad-secure-2026
    command: server /data --console-address ":9001"
    networks:
      - blackroad-net

networks:
  blackroad-net:
    driver: bridge

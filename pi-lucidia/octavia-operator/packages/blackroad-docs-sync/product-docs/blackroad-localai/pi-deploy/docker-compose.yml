version: '3.8'

services:
  blackroad-localai:
    image: node:18-alpine
    container_name: blackroad-localai
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./app:/app
    working_dir: /app
    command: node server.js
    environment:
      - NODE_ENV=production
      - PORT=8080
      - PI_NAME=lucidia-alt
      - SERVICE_NAME=blackroad-localai
    networks:
      - blackroad-net

networks:
  blackroad-net:
    driver: bridge

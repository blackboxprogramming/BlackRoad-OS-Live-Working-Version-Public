version: '3.8'

services:
  blackroad-vllm:
    image: node:18-alpine
    container_name: blackroad-vllm
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app
    working_dir: /app
    command: node server.js
    environment:
      - NODE_ENV=production
      - PORT=8000
      - PI_NAME=blackroad-pi
      - SERVICE_NAME=blackroad-vllm
    networks:
      - blackroad-net

networks:
  blackroad-net:
    driver: bridge

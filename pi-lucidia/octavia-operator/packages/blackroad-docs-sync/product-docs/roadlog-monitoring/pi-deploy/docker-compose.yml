version: '3.8'

services:
  roadlog-monitoring:
    image: node:18-alpine
    container_name: roadlog-monitoring
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./app:/app
    working_dir: /app
    command: node server.js
    environment:
      - NODE_ENV=production
      - PORT=9090
      - PI_NAME=blackroad-pi
      - SERVICE_NAME=roadlog-monitoring
    networks:
      - blackroad-net

networks:
  blackroad-net:
    driver: bridge

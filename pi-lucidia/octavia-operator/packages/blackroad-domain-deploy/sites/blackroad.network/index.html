<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Infrastructure</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            text-align: center;
            animation: fadeIn 1s ease-in;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #ffffff 0%, #999999 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        p {
            font-size: 1.25rem;
            margin-bottom: 2rem;
            color: #cccccc;
        }
        .domain {
            font-family: 'Courier New', monospace;
            color: #666;
            font-size: 0.9rem;
            margin-top: 3rem;
        }
        .emoji {
            font-size: 4rem;
            margin-bottom: 2rem;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .links {
            margin-top: 2rem;
        }
        .links a {
            color: #ffffff;
            text-decoration: none;
            margin: 0 1rem;
            padding: 0.5rem 1rem;
            border: 1px solid #333;
            border-radius: 4px;
            display: inline-block;
            transition: all 0.3s ease;
        }
        .links a:hover {
            background: #ffffff;
            color: #000000;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">🖤</div>
        <h1>Network Infrastructure</h1>
        <p>Welcome to blackroad.network</p>
        <p>BlackRoad Infrastructure • Live and Running</p>
        <div class="links">
            <a href="/api">API</a>
            <a href="https://blackroad.io">Main Site</a>
            <a href="https://docs.blackroad.io">Docs</a>
        </div>
        <div class="domain">blackroad.network</div>
    </div>
</body>
</html>

# BlackRoad All Domains - HTTP Only (SSL will be added later)

server {
    listen 80;
    server_name blackroad.io www.blackroad.io;
    root /var/www/blackroad.io;
    index index.html;
    location / { try_files $uri $uri/ =404; }
}


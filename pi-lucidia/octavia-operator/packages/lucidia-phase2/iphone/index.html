<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
  <title>Lucidia Approval</title>
  <link rel="stylesheet" href="theme.css"/>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="title">Lucidia</div>
      <div class="session mono" id="session">session: auto-plus-plus</div>
    </header>

    <section class="intent panel">
      <div class="label">Proposed Intent</div>
      <div class="intent-text mono" id="intent">
        Deploy update via Cloudflare Pages
      </div>
    </section>

    <section class="reason panel">
      <details>
        <summary class="label">Why?</summary>
        <pre class="mono" id="reason">
Lucidia framed next steps.
Alice explored and summarized.
Enclave found no policy violations.
        </pre>
      </details>
    </section>

    <section class="actions">
      <button class="approve" id="approve">Approve</button>
      <button class="block" id="block">Block</button>
    </section>

    <footer class="footer mono">
      Enclave active • Auth required
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoadWork - Checkout</title>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        :root {
            --black: #000000;
            --white: #FFFFFF;
            --hot-pink: #FF1D6C;
            --amber: #F5A623;
            --violet: #9C27B0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--black);
            color: var(--white);
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
        }
        h1 {
            font-size: 48px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, var(--amber), var(--hot-pink), var(--violet));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .price {
            font-size: 64px;
            font-weight: 800;
            color: var(--hot-pink);
            margin: 30px 0;
        }
        .price span {
            font-size: 24px;
            color: rgba(255, 255, 255, 0.5);
        }
        .features {
            text-align: left;
            margin: 30px 0;
            list-style: none;
        }
        .features li {
            padding: 10px 0;
            color: rgba(255, 255, 255, 0.8);
        }
        .features li::before {
            content: '✓';
            color: var(--hot-pink);
            margin-right: 10px;
            font-weight: bold;
        }
        .btn {
            background: var(--hot-pink);
            color: var(--white);
            padding: 20px 50px;
            border-radius: 12px;
            font-size: 20px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            width: 100%;
            margin-top: 30px;
            transition: transform 0.3s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(255, 29, 108, 0.5);
        }
        #error-message {
            color: #ff4444;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎓 RoadWork</h1>
        <p style="font-size: 20px; color: rgba(255, 255, 255, 0.7); margin-bottom: 20px;">
            AI Tutoring That Won't Bankrupt You
        </p>
        
        <div class="price">$9<span>/month</span></div>
        
        <ul class="features">
            <li>Unlimited homework help</li>
            <li>All subjects (Math, Science, CS, English)</li>
            <li>Step-by-step AI explanations</li>
            <li>24/7 instant help</li>
            <li>Photo upload for problems</li>
            <li>Visual learning with diagrams</li>
        </ul>
        
        <button class="btn" id="checkout-button">Start Free Trial →</button>
        
        <div id="error-message"></div>
        
        <p style="margin-top: 30px; font-size: 14px; color: rgba(255, 255, 255, 0.5);">
            Cancel anytime. No long-term commitment.
        </p>
    </div>
    
    <script>
        // Initialize Stripe
        const stripe = Stripe('pk_test_YOUR_PUBLISHABLE_KEY');
        
        document.getElementById('checkout-button').addEventListener('click', async () => {
            try {
                const response = await fetch('https://api.stripe.com/v1/checkout/sessions', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer YOUR_SECRET_KEY',
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: new URLSearchParams({
                        'payment_method_types[]': 'card',
                        'line_items[0][price]': 'price_1Snju6ChUUSEbzyh473qPMvt',
                        'line_items[0][quantity]': '1',
                        'mode': 'subscription',
                        'success_url': window.location.origin + '/success.html',
                        'cancel_url': window.location.origin + '/checkout-roadwork.html',
                    })
                });
                
                const session = await response.json();
                
                // Redirect to Checkout
                const result = await stripe.redirectToCheckout({
                    sessionId: session.id
                });
                
                if (result.error) {
                    document.getElementById('error-message').textContent = result.error.message;
                }
            } catch (error) {
                document.getElementById('error-message').textContent = 'Payment system initializing. Please use email checkout: blackroad.systems@gmail.com';
            }
        });
    </script>
</body>
</html>

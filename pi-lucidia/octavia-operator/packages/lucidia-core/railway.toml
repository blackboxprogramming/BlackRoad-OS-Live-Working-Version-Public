[build]
builder = "NIXPACKS"

[deploy]
startCommand = "python app.py"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[services]]
name = "lucidia-core"

[services.env]
PORT = "8080"
PYTHON_ENV = "production"
REPO_NAME = "lucidia-core"
ORG_NAME = "BlackRoad-OS"

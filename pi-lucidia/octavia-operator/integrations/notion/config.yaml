# Notion — BlackRoad OS Integration
# https://developers.notion.com/reference

name: notion
category: project-management
status: active
api_base: https://api.notion.com/v1
api_version: "2022-06-28"

auth:
  type: bearer_token
  env: NOTION_API_KEY

headers:
  Notion-Version: "2022-06-28"

endpoints:
  pages:
    create: POST /pages
    get: GET /pages/{page_id}
    update: PATCH /pages/{page_id}
  databases:
    create: POST /databases
    get: GET /databases/{database_id}
    query: POST /databases/{database_id}/query
    update: PATCH /databases/{database_id}
  blocks:
    get: GET /blocks/{block_id}
    get_children: GET /blocks/{block_id}/children
    append: PATCH /blocks/{block_id}/children
    update: PATCH /blocks/{block_id}
    delete: DELETE /blocks/{block_id}
  search:
    query: POST /search
  users:
    list: GET /users
    get: GET /users/{user_id}
  comments:
    create: POST /comments
    list: GET /comments?block_id={block_id}

databases:
  master_roadmap:
    env: NOTION_ROADMAP_DB_ID
    purpose: feature-tracking
  agent_tasks:
    env: NOTION_TASKS_DB_ID
    purpose: agent-task-management
  integrations_status:
    env: NOTION_INTEGRATIONS_DB_ID
    purpose: integration-health-tracking

health_check:
  endpoint: GET /users/me
  interval: 300
  timeout: 10

# Pyto — BlackRoad OS Integration
# iOS Python IDE for iPhone/iPad

name: pyto
category: mobile-tools
status: active

platform: ios
app_store: Pyto — Python 3
capabilities:
  - python3_execution
  - pip_packages
  - file_system_access
  - shortcuts_integration
  - widget_support
  - share_extension

scripts:
  - name: br-status
    description: Check BlackRoad infrastructure status
    path: blackroad/status.py
    shortcuts: true

  - name: br-deploy
    description: Trigger deployment via API
    path: blackroad/deploy.py
    shortcuts: true

  - name: br-chat
    description: Chat with agents via Ollama
    path: blackroad/chat.py
    shortcuts: true

  - name: br-monitor
    description: Monitor Pi fleet health
    path: blackroad/monitor.py
    shortcuts: true

packages:
  - httpx
  - rich
  - pyyaml
  - paramiko

workflow:
  1_edit: Edit Python scripts in Pyto on iPhone/iPad
  2_run: Execute scripts locally on device
  3_deploy: Push changes via Working Copy
  4_sync: Scripts sync via iCloud/Git

notes: |
  Pyto runs Python natively on iOS devices.
  Scripts can be triggered from Shortcuts app.
  Combine with Working Copy for git operations.
  Use with iSH for full Linux shell access.

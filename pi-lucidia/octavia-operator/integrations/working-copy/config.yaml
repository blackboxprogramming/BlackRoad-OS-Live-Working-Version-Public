# Working Copy — BlackRoad OS Integration
# iOS Git client

name: working-copy
category: mobile-tools
status: active

platform: ios
app_store: Working Copy — Git Client

capabilities:
  - git_clone
  - git_commit
  - git_push
  - git_pull
  - git_branch
  - git_merge
  - diff_viewer
  - syntax_highlighting
  - shortcuts_integration
  - files_app_provider

repositories:
  - name: blackroad-operator
    org: BlackRoad-OS-Inc
    url: https://github.com/BlackRoad-OS-Inc/blackroad-operator
    branch: main

  - name: blackroad-core
    org: BlackRoad-OS-Inc
    url: https://github.com/BlackRoad-OS-Inc/blackroad-core
    branch: main

  - name: blackroad-agents
    org: BlackRoad-OS-Inc
    url: https://github.com/BlackRoad-OS-Inc/blackroad-agents
    branch: main

  - name: blackroad-web
    org: BlackRoad-OS-Inc
    url: https://github.com/BlackRoad-OS-Inc/blackroad-web
    branch: main

  - name: blackroad-infra
    org: BlackRoad-OS-Inc
    url: https://github.com/BlackRoad-OS-Inc/blackroad-infra
    branch: main

workflows:
  mobile_dev:
    1_pull: Pull latest changes from remote
    2_edit: Edit files in Working Copy or linked editors
    3_commit: Stage and commit changes
    4_push: Push to remote
  code_review:
    1_fetch: Fetch PR branches
    2_diff: Review diffs
    3_comment: Comment via GitHub integration
  hotfix:
    1_branch: Create hotfix branch
    2_fix: Apply fix
    3_push: Push and create PR

notes: |
  Working Copy is the primary Git client for iOS.
  All BlackRoad repos are cloneable from mobile.
  Integrates with Pyto, iSH, and Shellfish for
  a complete mobile development environment.

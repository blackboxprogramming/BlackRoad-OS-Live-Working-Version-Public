<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — BlackRoad OS</title>
  <meta name="description" content="Sign in to your BlackRoad OS account.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../websites/_shared/design-bw.css">
  <style>
    body {
      display: flex; flex-direction: column;
      min-height: 100vh;
    }
    .login-page {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      padding: var(--sp-xl);
    }
    .login-card {
      width: 100%; max-width: 400px;
    }
    .login-logo {
      font-family: var(--font-mono);
      font-weight: 800;
      font-size: 1.2rem;
      text-align: center;
      margin-bottom: var(--sp-xl);
      letter-spacing: -0.03em;
    }
    .login-title {
      font-size: 1.8rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: var(--sp-xs);
    }
    .login-subtitle {
      text-align: center;
      font-size: 0.9rem;
      color: var(--subtle);
      margin-bottom: var(--sp-xl);
    }
    .login-form { display: flex; flex-direction: column; gap: var(--sp-md); }
    .login-form .form-group { display: flex; flex-direction: column; }
    .login-extras {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.82rem;
    }
    .login-remember {
      display: flex; align-items: center; gap: 6px;
      color: var(--subtle);
    }
    .login-remember input[type="checkbox"] {
      width: auto;
      accent-color: var(--white);
    }
    .login-forgot {
      color: var(--subtle);
      border-bottom: 1px solid var(--border);
      transition: color 0.2s, border-color 0.2s;
    }
    .login-forgot:hover { color: var(--white); border-color: var(--white); }

    .login-divider {
      display: flex; align-items: center; gap: var(--sp-md);
      margin: var(--sp-md) 0;
    }
    .login-divider::before, .login-divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
    .login-divider span {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .oauth-btn {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--white);
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .oauth-btn:hover { border-color: var(--muted); }
    .oauth-btn svg { width: 18px; height: 18px; fill: currentColor; }

    .login-footer {
      text-align: center;
      margin-top: var(--sp-lg);
      font-size: 0.82rem;
      color: var(--subtle);
    }
    .login-footer a {
      color: var(--white);
      font-weight: 600;
      border-bottom: 1px solid var(--border);
      transition: border-color 0.2s;
    }
    .login-footer a:hover { border-color: var(--white); }

    .page-footer {
      text-align: center;
      padding: var(--sp-lg);
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--muted);
    }
  </style>
</head>
<body>

  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">BlackRoad OS</div>
      <div class="login-title">Welcome back</div>
      <div class="login-subtitle">Sign in to your account</div>

      <form class="login-form" action="#" method="POST">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@company.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Your password" required>
        </div>
        <div class="login-extras">
          <label class="login-remember">
            <input type="checkbox" name="remember"> Remember me
          </label>
          <a href="/forgot-password" class="login-forgot">Forgot password?</a>
        </div>
        <button type="submit" class="btn-primary w-full" style="justify-content:center;">Sign In</button>
      </form>

      <div class="login-divider"><span>or</span></div>

      <button class="oauth-btn">
        <svg viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
        Continue with GitHub
      </button>

      <div class="login-footer">
        Don't have an account? <a href="/signup">Sign up</a>
      </div>
    </div>
  </div>

  <div class="page-footer">
    &copy; 2026 BlackRoad OS, Inc.
  </div>

</body>
</html>

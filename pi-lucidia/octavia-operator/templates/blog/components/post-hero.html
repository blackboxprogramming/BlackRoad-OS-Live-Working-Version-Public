<!-- ─────────────────────────────────────────
     COMPONENT: post-hero.html
     Usage: place after header, before post-body
     Slots to update: date, read-time, tags, title, subtitle
───────────────────────────────────────── -->

<style>
  .br-post-hero {
    background: #000000;
    padding: 48px 24px 36px;
    border-bottom: 1px solid #ffffff;
  }

  .br-post-hero__breadcrumb {
    font-size: 0.58rem;
    color: #444444;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 20px;
    font-family: 'JetBrains Mono', monospace;
  }

  .br-post-hero__breadcrumb a {
    color: #444444;
    text-decoration: none;
  }

  .br-post-hero__breadcrumb a:hover { color: #ffffff; }

  .br-post-hero__breadcrumb span {
    color: #222222;
    margin: 0 8px;
  }

  .br-post-hero__meta {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }

  .br-post-hero__date {
    font-size: 0.58rem;
    color: #555555;
    letter-spacing: 0.12em;
    font-family: 'JetBrains Mono', monospace;
  }

  .br-post-hero__readtime {
    font-size: 0.58rem;
    color: #444444;
    font-family: 'JetBrains Mono', monospace;
  }

  .br-post-hero__readtime::before {
    content: '\00B7';
    margin-right: 14px;
    color: #333333;
  }

  .br-post-hero__tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .br-post-hero__tag {
    font-size: 0.56rem;
    color: #666666;
    border: 1px solid #222222;
    padding: 3px 8px;
    text-decoration: none;
    font-family: 'JetBrains Mono', monospace;
    text-transform: lowercase;
    letter-spacing: 0.08em;
  }

  .br-post-hero__tag:hover {
    color: #ffffff;
    border-color: #ffffff;
  }

  .br-post-hero__title {
    font-size: 1.6rem;
    font-weight: 700;
    color: #ffffff;
    line-height: 1.08;
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 14px;
  }

  .br-post-hero__subtitle {
    font-size: 0.72rem;
    color: #666666;
    line-height: 1.9;
    font-family: 'JetBrains Mono', monospace;
    max-width: 640px;
  }

  @media (min-width: 768px) {
    .br-post-hero { padding: 56px 40px 44px; }
    .br-post-hero__title { font-size: 2rem; }
  }
</style>

<div class="br-post-hero">

  <!-- BREADCRUMB -->

  <div class="br-post-hero__breadcrumb">
    <a href="/blog">blog</a>
    <span>/</span>
    <a href="/blog?tag=infrastructure">infrastructure</a>
    <span>/</span>
    post
  </div>

  <!-- DATE + READ TIME -->

  <div class="br-post-hero__meta">
    <span class="br-post-hero__date">2025-11-14</span>
    <span class="br-post-hero__readtime">8 min read</span>
  </div>

  <!-- TAGS -->

  <div class="br-post-hero__tags">
    <a class="br-post-hero__tag" href="/blog?tag=infrastructure">infrastructure</a>
    <a class="br-post-hero__tag" href="/blog?tag=agents">agents</a>
    <a class="br-post-hero__tag" href="/blog?tag=os">os</a>
  </div>

  <!-- TITLE -->

  <h1 class="br-post-hero__title">
    PS-SHA&#8734; and the<br>Memory Persistence Problem
  </h1>

  <!-- SUBTITLE / DECK -->

  <p class="br-post-hero__subtitle">
    Why append-only journals with cryptographic chaining outperform traditional
    key-value stores for agent state across power cycles and node failures.
  </p>

</div>

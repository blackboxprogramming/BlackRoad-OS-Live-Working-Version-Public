<style>
  .br-header {
    background: #000000;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #ffffff;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .br-header__logo {
    font-size: 1.2rem;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: 0.05em;
    text-decoration: none;
    font-family: 'JetBrains Mono', monospace;
  }

  .br-header__nav {
    font-size: 0.65rem;
    display: flex;
    gap: 20px;
    font-family: 'JetBrains Mono', monospace;
  }

  .br-header__nav a {
    color: #888888;
    text-decoration: none;
  }

  .br-header__nav a:hover  { color: #ffffff; }
  .br-header__nav a.active { color: #ffffff; }

  @media (min-width: 768px) {
    .br-header { padding: 20px 40px; }
  }
</style>

<header class="br-header">
  <a href="/" class="br-header__logo">BlackRoad</a>
  <nav class="br-header__nav">
    <a href="/enterprise">enterprise</a>
    <a href="/orgs">orgs</a>
    <a href="/domains">domains</a>
    <a href="/blog" class="active">blog</a>
  </nav>
</header>

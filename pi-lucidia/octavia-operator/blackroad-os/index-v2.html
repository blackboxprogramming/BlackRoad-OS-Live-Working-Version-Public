<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BlackRoad OS — Pixel Library v2</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a14; font-family: 'Press Start 2P', monospace; color: #fff; min-height: 100vh; }
    canvas { image-rendering: pixelated; image-rendering: crisp-edges; display: block; margin: 0 auto; }
    header { padding: 24px 16px 8px; text-align: center; }
    h1 { color: #fff; font-size: 14px; letter-spacing: 2px; }
    h1 small { display: block; margin-top: 8px; font-size: 8px; color: #888; letter-spacing: 1px; }
    .stripe { height: 4px; background: #FF1D6C; margin: 12px auto 0; max-width: 80%; }
    h2 { font-size: 10px; padding: 28px 24px 8px; color: #fff; letter-spacing: 1px; border-bottom: 1px solid #2a2a4a; margin: 0 24px; }
    h2 .count { color: #888; font-size: 8px; margin-left: 12px; }
    .grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; padding: 16px 24px; }
    .tile { background: #1a1a2e; padding: 12px; border-radius: 4px; border: 1px solid #2a2a4a; min-width: 80px; }
    .tile canvas { margin: 0; }
    .tile p { font-size: 7px; text-align: center; margin-top: 8px; color: #aaa; letter-spacing: 0.5px; }
    footer { padding: 32px 16px 48px; text-align: center; color: #555; font-size: 7px; letter-spacing: 1px; }
  </style>
</head>
<body>
  <header>
    <h1>BLACKROAD OS — PIXEL LIBRARY<small>v2 / EXPANDED ASSET SET</small></h1>
    <div class="stripe"></div>
  </header>

  <h2>OFFICE <span class="count" id="c-office"></span></h2>
  <div class="grid" id="g-office"></div>

  <h2>AGENTS <span class="count" id="c-agents"></span></h2>
  <div class="grid" id="g-agents"></div>

  <h2>KITCHEN <span class="count" id="c-kitchen"></span></h2>
  <div class="grid" id="g-kitchen"></div>

  <h2>BEDROOM <span class="count" id="c-bedroom"></span></h2>
  <div class="grid" id="g-bedroom"></div>

  <h2>OUTDOOR <span class="count" id="c-outdoor"></span></h2>
  <div class="grid" id="g-outdoor"></div>

  <h2>VEHICLES <span class="count" id="c-vehicles"></span></h2>
  <div class="grid" id="g-vehicles"></div>

  <h2>ELECTRONICS <span class="count" id="c-electronics"></span></h2>
  <div class="grid" id="g-electronics"></div>

  <h2>FOOD <span class="count" id="c-food"></span></h2>
  <div class="grid" id="g-food"></div>

  <h2>PETS <span class="count" id="c-pets"></span></h2>
  <div class="grid" id="g-pets"></div>

  <h2>SIGNS <span class="count" id="c-signs"></span></h2>
  <div class="grid" id="g-signs"></div>

  <footer>BLACKROAD OS / SPRITE FOUNDRY</footer>

  <!-- Original libs -->
  <script src="lib/floor.js"></script>
  <script src="lib/wall.js"></script>
  <script src="lib/desk.js"></script>
  <script src="lib/chair.js"></script>
  <script src="lib/agent.js"></script>
  <script src="lib/server.js"></script>
  <script src="lib/plant.js"></script>
  <script src="lib/furniture.js"></script>
  <script src="lib/lighting.js"></script>
  <script src="lib/props.js"></script>
  <!-- New libs -->
  <script src="lib/agent-extra.js"></script>
  <script src="lib/kitchen.js"></script>
  <script src="lib/bedroom.js"></script>
  <script src="lib/outdoor.js"></script>
  <script src="lib/vehicles.js"></script>
  <script src="lib/electronics.js"></script>
  <script src="lib/food.js"></script>
  <script src="lib/pets.js"></script>
  <script src="lib/signs.js"></script>

  <script>
    let t = 0;
    const tiles = [];

    function add(group, name, w, h, drawFn) {
      const div = document.createElement('div');
      div.className = 'tile';
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const label = document.createElement('p');
      label.textContent = name;
      div.appendChild(canvas); div.appendChild(label);
      document.getElementById('g-' + group).appendChild(div);
      tiles.push({ canvas, ctx: canvas.getContext('2d'), draw: drawFn });
    }

    // OFFICE — original set
    add('office', 'Wood Floor',     64, 64, (ctx) => FLOOR.fillWood(ctx, 0, 0, 4, 4));
    add('office', 'Tile Floor',     64, 64, (ctx) => FLOOR.fillTile(ctx, 0, 0, 4, 4));
    add('office', 'Carpet',         64, 64, (ctx) => FLOOR.fillCarpet(ctx, 0, 0, 4, 4, 'red'));
    add('office', 'Wall',           96, 72, (ctx) => WALL.fullWall(ctx, 0, 0, 6, 'cream'));
    add('office', 'Brick',          64, 64, (ctx) => WALL.fillBrick(ctx, 0, 0, 4, 4));
    add('office', 'Desk',           96, 72, (ctx) => DESK.workstation(ctx, 8, 36, t));
    add('office', 'Chair Up',       32, 48, (ctx) => CHAIR.facingUp(ctx, 4, 6, 'blue'));
    add('office', 'Chair Down',     32, 40, (ctx) => CHAIR.facingDown(ctx, 4, 4, 'blue'));
    add('office', 'Server Rack',    48, 88, (ctx) => SERVER.rack(ctx, 4, 4, t));
    add('office', 'Mini Rack',      32, 56, (ctx) => SERVER.miniRack(ctx, 4, 4, t));
    add('office', 'Small Plant',    24, 32, (ctx) => PLANT.small(ctx, 4, 6, t, 'terra'));
    add('office', 'Large Plant',    32, 48, (ctx) => PLANT.large(ctx, 4, 6, t));
    add('office', 'Cactus',         16, 24, (ctx) => PLANT.cactus(ctx, 2, 2));
    add('office', 'Couch',          80, 52, (ctx) => FURNITURE.couch(ctx, 4, 4, 'blue'));
    add('office', 'Coffee Table',   64, 36, (ctx) => FURNITURE.coffeeTable(ctx, 4, 4));
    add('office', 'Bookshelf',      44, 80, (ctx) => FURNITURE.bookshelf(ctx, 4, 4));
    add('office', 'Filing Cabinet', 40, 72, (ctx) => FURNITURE.filingCabinet(ctx, 4, 4));
    add('office', 'Water Cooler',   36, 64, (ctx) => FURNITURE.waterCooler(ctx, 4, 4, t));
    add('office', 'Vending',        48, 80, (ctx) => FURNITURE.vendingMachine(ctx, 4, 4));
    add('office', 'Ceiling Light',  40, 56, (ctx) => LIGHTING.ceilingLight(ctx, 4, 16, t));
    add('office', 'Window',         80, 72, (ctx) => LIGHTING.window(ctx, 8, 8, t));
    add('office', 'Clock',          40, 40, (ctx) => PROPS.clock(ctx, 4, 4, t));
    add('office', 'Whiteboard',     72, 60, (ctx) => PROPS.whiteboard(ctx, 4, 4));
    add('office', 'Poster',         40, 52, (ctx) => PROPS.poster(ctx, 4, 4, 'chart'));

    // AGENTS — originals + extras
    function agentTile(name, preset, color) {
      add('agents', name, 28, 56, (ctx) => {
        AGENT.draw(ctx, 6, 8, preset, 0, t);
        AGENT.nameBadge(ctx, 6, 8, name, color);
      });
    }
    agentTile('LUCIDIA',  AGENT.presets.LUCIDIA,  '#FF1D6C');
    agentTile('ALICE',    AGENT.presets.ALICE,    '#2979FF');
    agentTile('OCTAVIA',  AGENT.presets.OCTAVIA,  '#9C27B0');
    agentTile('PRISM',    AGENT.presets.PRISM,    '#F5A623');
    agentTile('ECHO',     AGENT.presets.ECHO,     '#9C27B0');
    agentTile('CIPHER',   AGENT.presets.CIPHER,   '#F5A623');
    agentTile('CORDELIA', AGENT_EXTRA.presets.CORDELIA, '#FF1D6C');
    agentTile('GAIA',     AGENT_EXTRA.presets.GAIA,     '#3a8a4a');
    agentTile('CECILIA',  AGENT_EXTRA.presets.CECILIA,  '#F5A623');
    agentTile('GEMATRIA', AGENT_EXTRA.presets.GEMATRIA, '#9C27B0');
    agentTile('ARIA',     AGENT_EXTRA.presets.ARIA,     '#2979FF');
    agentTile('SHELLFISH',AGENT_EXTRA.presets.SHELLFISH,'#fff');
    agentTile('ALEXA',    AGENT_EXTRA.presets.ALEXA,    '#fff');
    agentTile('OCTAVIA-G',AGENT_EXTRA.presets.OCTAVIA2, '#9C27B0');

    // KITCHEN
    add('kitchen', 'Fridge',       48, 88, (ctx) => KITCHEN.fridge(ctx, 4, 4, 'steel'));
    add('kitchen', 'Fridge White', 48, 88, (ctx) => KITCHEN.fridge(ctx, 4, 4, 'white'));
    add('kitchen', 'Stove',        52, 52, (ctx) => KITCHEN.stove(ctx, 4, 4, t));
    add('kitchen', 'Microwave',    60, 40, (ctx) => KITCHEN.microwave(ctx, 4, 4, t));
    add('kitchen', 'Sink',         64, 44, (ctx) => KITCHEN.sink(ctx, 4, 4));
    add('kitchen', 'Coffee Maker', 36, 52, (ctx) => KITCHEN.coffeeMaker(ctx, 4, 4, t));
    add('kitchen', 'Toaster',      40, 32, (ctx) => KITCHEN.toaster(ctx, 4, 4, t));

    // BEDROOM
    add('bedroom', 'Bed Pink',     80, 60, (ctx) => BEDROOM.bed(ctx, 4, 4, 'pink'));
    add('bedroom', 'Bed Blue',     80, 60, (ctx) => BEDROOM.bed(ctx, 4, 4, 'blue'));
    add('bedroom', 'Bed Amber',    80, 60, (ctx) => BEDROOM.bed(ctx, 4, 4, 'amber'));
    add('bedroom', 'Dresser',      60, 52, (ctx) => BEDROOM.dresser(ctx, 4, 4));
    add('bedroom', 'Nightstand',   36, 40, (ctx) => BEDROOM.nightstand(ctx, 4, 4));
    add('bedroom', 'Table Lamp',   28, 44, (ctx) => BEDROOM.tableLamp(ctx, 4, 4, t));
    add('bedroom', 'Mirror',       36, 48, (ctx) => BEDROOM.mirror(ctx, 4, 4));
    add('bedroom', 'Rug',          72, 48, (ctx) => BEDROOM.rug(ctx, 4, 4, 'violet'));

    // OUTDOOR
    add('outdoor', 'Tree',         48, 72, (ctx) => OUTDOOR.tree(ctx, 4, 4, t));
    add('outdoor', 'Bush',         40, 32, (ctx) => OUTDOOR.bush(ctx, 4, 4));
    add('outdoor', 'Mailbox',      32, 48, (ctx) => OUTDOOR.mailbox(ctx, 4, 4, false));
    add('outdoor', 'Mailbox Up',   32, 48, (ctx) => OUTDOOR.mailbox(ctx, 4, 4, true));
    add('outdoor', 'Street Light', 28, 88, (ctx) => OUTDOOR.streetlight(ctx, 4, 4, t));
    add('outdoor', 'Bench',        68, 36, (ctx) => OUTDOOR.bench(ctx, 4, 4));
    add('outdoor', 'Fence',        68, 36, (ctx) => OUTDOOR.fence(ctx, 4, 4));
    add('outdoor', 'Trash Can',    32, 44, (ctx) => OUTDOOR.trashcan(ctx, 4, 4));

    // VEHICLES
    add('vehicles', 'Car Pink',    80, 40, (ctx) => VEHICLES.car(ctx, 4, 4, 'pink'));
    add('vehicles', 'Car Blue',    80, 40, (ctx) => VEHICLES.car(ctx, 4, 4, 'blue'));
    add('vehicles', 'Car Amber',   80, 40, (ctx) => VEHICLES.car(ctx, 4, 4, 'amber'));
    add('vehicles', 'Car Black',   80, 40, (ctx) => VEHICLES.car(ctx, 4, 4, 'black'));
    add('vehicles', 'Bike',        52, 44, (ctx) => VEHICLES.bike(ctx, 4, 4, 'blue'));
    add('vehicles', 'Scooter',     40, 44, (ctx) => VEHICLES.scooter(ctx, 4, 4, 'amber'));
    add('vehicles', 'Motorcycle',  64, 40, (ctx) => VEHICLES.motorcycle(ctx, 4, 4, 'violet', t));

    // ELECTRONICS
    add('electronics', 'TV',          104, 72, (ctx) => ELECTRONICS.tv(ctx, 4, 4, t));
    add('electronics', 'Monitor',     72, 60,  (ctx) => ELECTRONICS.monitor(ctx, 4, 4, t));
    add('electronics', 'Laptop',      60, 48,  (ctx) => ELECTRONICS.laptop(ctx, 4, 4, t));
    add('electronics', 'Phone',       24, 40,  (ctx) => ELECTRONICS.phone(ctx, 4, 4, t));
    add('electronics', 'Console',     48, 36,  (ctx) => ELECTRONICS.gameConsole(ctx, 4, 4, t));
    add('electronics', 'Speaker',     36, 60,  (ctx) => ELECTRONICS.speaker(ctx, 4, 4, t));

    // FOOD
    add('food', 'Coffee',   28, 32, (ctx) => FOOD.coffee(ctx, 4, 4, t));
    add('food', 'Donut',    36, 36, (ctx) => FOOD.donut(ctx, 4, 4));
    add('food', 'Pizza',    48, 44, (ctx) => FOOD.pizza(ctx, 4, 4));
    add('food', 'Apple',    28, 32, (ctx) => FOOD.apple(ctx, 4, 4));
    add('food', 'Cake',     40, 40, (ctx) => FOOD.cake(ctx, 4, 4));
    add('food', 'Sandwich', 48, 32, (ctx) => FOOD.sandwich(ctx, 4, 4));

    // PETS
    add('pets', 'Cat Black',  32, 28, (ctx) => PETS.cat(ctx, 4, 4, 'black', t));
    add('pets', 'Cat Orange', 32, 28, (ctx) => PETS.cat(ctx, 4, 4, 'orange', t));
    add('pets', 'Cat Tabby',  32, 28, (ctx) => PETS.cat(ctx, 4, 4, 'tabby', t));
    add('pets', 'Dog',        36, 30, (ctx) => PETS.dog(ctx, 4, 4, t));
    add('pets', 'Bird',       24, 22, (ctx) => PETS.bird(ctx, 4, 4, t));
    add('pets', 'Fish Tank',  60, 52, (ctx) => PETS.fishtank(ctx, 4, 4, t));
    add('pets', 'Hamster',    36, 36, (ctx) => PETS.hamsterBall(ctx, 4, 4, t));

    // SIGNS
    add('signs', 'Neon OPEN',  64, 36, (ctx) => SIGNS.neonOpen(ctx, 4, 4, t));
    add('signs', 'Billboard',  96, 60, (ctx) => SIGNS.billboard(ctx, 4, 4, t));
    add('signs', 'Exit',       52, 32, (ctx) => SIGNS.exit(ctx, 4, 4));
    add('signs', 'Road Sign',  48, 52, (ctx) => SIGNS.roadSign(ctx, 4, 4));
    add('signs', 'Banner',     96, 40, (ctx) => SIGNS.banner(ctx, 4, 4, t));

    // Counts
    ['office','agents','kitchen','bedroom','outdoor','vehicles','electronics','food','pets','signs'].forEach(g => {
      const n = document.getElementById('g-' + g).children.length;
      document.getElementById('c-' + g).textContent = n + ' ITEMS';
    });

    function render() {
      t++;
      tiles.forEach(tile => {
        tile.ctx.fillStyle = '#1a1a2e';
        tile.ctx.fillRect(0, 0, tile.canvas.width, tile.canvas.height);
        tile.draw(tile.ctx);
      });
      requestAnimationFrame(render);
    }
    render();
  </script>
</body>
</html>

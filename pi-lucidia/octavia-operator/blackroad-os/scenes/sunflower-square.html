<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sunflower Square</title>
<style>
  :root { --bg:#1a1a1a; --fg:#eee; --muted:#888; --accent:#2a2a2a; --border:#333; }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background:var(--bg); color:var(--fg); min-height:100vh;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; padding:20px; }
  canvas { image-rendering:pixelated; image-rendering:crisp-edges; border-radius:6px;
    border:1px solid var(--border); background:#7BC663; display:block; outline:none;
    box-shadow:0 8px 32px rgba(0,0,0,0.5); max-width:100%; height:auto; }
  .hud { font-size:13px; color:var(--muted); display:flex; gap:12px; align-items:center; flex-wrap:wrap; justify-content:center; }
  .title { font-size:16px; font-weight:600; color:var(--fg); margin-right:6px; letter-spacing:0.04em; }
  kbd { font:inherit; font-size:11px; background:var(--accent); border:1px solid var(--border);
    border-radius:4px; padding:2px 6px; color:var(--fg); }
  .subtitle { font-size:11px; color:#555; text-align:center; margin-top:4px; }
</style>
</head>
<body>
<canvas id="brc" width="640" height="512" tabindex="0"></canvas>
<div class="hud">
  <span class="title">Sunflower Square</span>
  <span>walk <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> &middot; <kbd>&uarr;</kbd><kbd>&larr;</kbd><kbd>&darr;</kbd><kbd>&rarr;</kbd></span>
</div>
<div class="subtitle">click the canvas if input feels frozen, then move</div>

x=0,dy=0;if(keys['ArrowUp']||keys['w']||keys['W'])dy=-1;else if(keys['ArrowDown']||keys['s']||keys['S'])dy=1;else if(keys['ArrowLeft']||keys['a']||keys['A'])dx=-1;else if(keys['ArrowRight']||keys['d']||keys['D'])dx=1;player.moving=(dx||dy);if(dy<0)player.dir=0;else if(dy>0)player.dir=1;else if(dx<0)player.dir=2;else if(dx>0)player.dir=3;if(player.moving){const sp=1.4*(dt/16.66);const nx=player.x+dx*sp;const ny=player.y+dy*sp;if(canMove(nx,player.y))player.x=nx;if(canMove(player.x,ny))player.y=ny;player.moveT+=dt;const phase=Math.floor(player.moveT/180)%2;player.frame=phase===0?1:2;}else{player.moveT=0;player.frame=0;}cam.x=Math.round(player.x-VW/2);cam.y=Math.round(player.y-VH/2);cam.x=Math.max(0,Math.min(MW*TS-VW,cam.x));cam.y=Math.max(0,Math.min(MH*TS-VH,cam.y));ctx.clearRect(0,0,VW,VH);ctx.drawImage(off,cam.x,cam.y,VW,VH,0,0,VW,VH);const all=[...npcs.map(n=>({...n,isNpc:true})),{x:player.x-8,y:player.y-13,dir:player.dir,frame:player.frame,c:'#C84A4A',isPlayer:true}];all.sort((a,b)=>(a.y-b.y));for(const e of all){const sx=Math.round(e.x-cam.x);const sy=Math.round(e.y-cam.y);if(sx<-20||sy<-25||sx>VW+20||sy>VH+25)continue;drawCharacter(ctx,sx,sy,e.dir,e.frame||0,e.c,!!e.isPoke);}requestAnimationFrame(loop);}cv.focus();requestAnimationFrame(loop);})();

<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<title>Amundson Amusement Park</title>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:#06060a;color:#c8c8cc;font-family:'JetBrains Mono',ui-monospace,Menlo,monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .stage{display:flex;flex-direction:column;align-items:center;gap:10px;padding:18px}
  .title{font-size:11px;letter-spacing:.25em;color:#d8d8dc;font-weight:600;display:flex;align-items:center;gap:10px}
  .title .gr{background:linear-gradient(90deg,#ff7849,#ff4d8d,#c870e0,#4d8aff);-webkit-background-clip:text;background-clip:text;color:transparent}
  .title .dot{width:6px;height:6px;border-radius:50%;background:#ff4d8d;box-shadow:0 0 10px #ff4d8d;animation:pulse 1.6s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
  canvas{image-rendering:pixelated;image-rendering:crisp-edges;border:1px solid #2a2a2e;box-shadow:0 0 0 1px #0a0a0c,0 0 60px rgba(255,77,141,.10),0 0 120px rgba(77,138,255,.08);width:960px;height:640px;display:block}
  .hud{width:960px;display:flex;justify-content:space-between;align-items:center;font-size:10px;letter-spacing:.15em;color:#888}
  .hud .zone{color:#e0e0e4;font-weight:600;padding:4px 10px;border:1px solid #2a2a2e;border-radius:2px;background:#111114}
  .hud .controls span{color:#d0d0d4;padding:1px 5px;border:1px solid #2a2a2e;border-radius:2px;background:#111114;margin:0 2px}
  @media(max-width:1000px){canvas,.hud{width:90vw;height:auto}canvas{aspect-ratio:3/2}}
</style>
</head>

    <div class="zone" id="zone">—</div>
    <div class="controls"><span>W A S D</span> walk &nbsp;·&nbsp; <span>E</span> / <span>SPACE</span> talk</div>

function collidesAt(px2,py2){
  const half=player.w/2,L=px2-half,R=px2+half,T=py2-4,B=py2+1;
  if(L<4||R>MAP_W-4||T<4||B>MAP_H-4)return true;
  for(const s of solids){if(R>s.x&&L<s.x+s.w&&B>s.y+s.h-4&&T<s.y+s.h)return true;}
  return false;
}

let bubble=null;
const showBubble=(x,y,n,l,a='#ff4d8d')=>{bubble={x,y,name:n,line:l,accent:a,until:performance.now()+4500};};

function tryInteract(){
  let nearest=null,nd=22;
  const all=[...npcs.map(n=>({ref:n,kind:'npc'})),...cats.map(c=>({ref:c,kind:'cat'}))];
  for(const t of all){const d=Math.hypot(t.ref.x-player.x,(t.ref.y-6)-(player.y-6));if(d<nd){nd=d;nearest=t;}}
  if(nearest){
    const r=nearest.ref;r._li=r._li||0;
    const line=r.lines[r._li%r.lines.length];r._li++;
    const acc=nearest.kind==='cat'?r.light:(r.colors.acc||'#ff4d8d');
    showBubble(r.x,r.y-22,r.name,line,acc);
    if(r.dir!==undefined){const dx=player.x-r.x,dy=player.y-r.y;
      r.dir=Math.abs(dx)>Math.abs(dy)?(dx>0?'right':'left'):(dy>0?'down':'up');}
    return;
  }
  for(const b of buildings){
    const cx=(b.x+b.w/2)*TILE,cy=(b.y+b.h/2)*TILE;
    const dist=Math.hypot(cx-player.x,cy-player.y);
    if(dist<60){
      b._li=b._li||0;
      const lines=BUILDING_LINES[b.kind]||["it's a ride."];
      const line=lines[b._li%lines.length];b._li++;
      showBubble(cx,(b.y+b.h)*TILE-4,b.name,line,'#ff4d8d');
      return;
    }
  }
  for(const d of interactables){
    const cx=d.sx?d.sx+d.sw/2:d.x,cy=d.sy?d.sy+d.sh/2:d.y;
    if(Math.hypot(cx-player.x,cy-player.y)<32){
      d._li=d._li||0;
      const line=d.lines[d._li%d.lines.length];d._li++;
      let acc='#ff4d8d';
      if(d.type==='fountain')acc='#5a8ec0';
      if(d.type==='parksign'||d.type==='infoboard')acc='#f0c040';
      if(d.type==='foodstand')acc='#ff7849';
      if(d.type==='gamebooth')acc='#c870e0';
      if(d.type==='ticketbooth')acc='#4d8aff';

function updateNPCs(dt){
  for(const n of npcs){
    if(!n.wander)continue;
    n._t=(n._t||0)+dt;
    if(!n._target||n._t>3500){n._target={x:n.home.x+(Math.random()*2-1)*22,y:n.home.y+(Math.random()*2-1)*22};n._t=0;}
    const dx=n._target.x-n.x,dy=n._target.y-n.y,d=Math.hypot(dx,dy);
    if(d>0.4){
      const sp=0.3,vx=(dx/d)*sp,vy=(dy/d)*sp,nx=n.x+vx,ny=n.y+vy;
      const hit=(x,y)=>{
        for(const s of solids){if(x>s.x-2&&x<s.x+s.w+2&&y>s.y+s.h-6&&y<s.y+s.h+2)return true;}return false;};
      if(!hit(nx,ny)){n.x=nx;n.y=ny;
        n.dir=Math.abs(vx)>Math.abs(vy)?(vx>0?'right':'left'):(vy>0?'down':'up');
        n._anim=(n._anim||0)+dt;if(n._anim>180){n._anim=0;n._frame=((n._frame||0)+1)%4;}}
      else n._target=null;
    } else n._frame=0;
  }
}

function update(dt){
  let dx=0,dy=0;
  if(keys['w']||keys['ArrowUp'])dy--;if(keys['s']||keys['ArrowDown'])dy++;
  if(keys['a']||keys['ArrowLeft'])dx--;if(keys['d']||keys['ArrowRight'])dx++;
  player.moving=!!(dx||dy);
  if(dx&&dy){dx*=.7071;dy*=.7071;}
  if(Math.abs(dx)>Math.abs(dy))player.dir=dx>0?'right':'left';
  else if(dy)player.dir=dy>0?'down':'up';
  const sp=player.speed,nx=player.x+dx*sp,ny=player.y+dy*sp;
  if(!collidesAt(nx,player.y))player.x=nx;
  if(!collidesAt(player.x,ny))player.y=ny;
  if(player.moving){player.anim+=dt;if(player.anim>140){player.anim=0;player.frame=(player.frame+1)%4;}}else player.frame=0;
  if(interactPressed){interactPressed=false;tryInteract();}
  updateNPCs(dt);updateCam();
}

function zoneOf(px2,py2){
  const tx=Math.floor(px2/TILE),ty=Math.floor(py2/TILE);
  if(ty<=10){
    if(tx<=23)return 'ROLLER COASTER';
    if(tx>=35&&tx<=50)return 'FERRIS WHEEL';
    if(tx>=51)return 'DROP TOWER';
    return 'BACK MIDWAY';
  }
  if(ty<=12)return 'NORTH MIDWAY';
  if(ty<=19){
    if(tx<=22)return 'CAROUSEL';
    if(tx>=39)return 'TEA CUPS';
    return 'CENTRAL MIDWAY';
  }
  if(ty<=21)return 'MID MIDWAY';
  if(ty<=26)return 'FOOD COURT';
  if(ty<=28)return 'SOUTH MIDWAY';
  if(ty<=32){
    if(tx<=22)return 'BUMPER CARS';
    if(tx>=35)return 'GAMES';
    return 'GAMES MIDWAY';
  }
  if(ty<=35)return 'ENTRANCE WAY';
  return 'ENTRANCE PLAZA';
}

const r=(x,y,w,h,c)=>{ctx.fillStyle=c;ctx.fillRect(x|0,y|0,w|0,h|0);};
const px=(x,y,c)=>{ctx.fillStyle=c;ctx.fillRect(x|0,y|0,1,1);};

function drawTiles(){
  const tx0=Math.max(0,Math.floor(cam.x/TILE)),tx1=Math.min(COLS-1,Math.floor((cam.x+W)/TILE));
  const ty0=Math.max(0,Math.floor(cam.y/TILE)),ty1=Math.min(ROWS-1,Math.floor((cam.y+H)/TILE));
  for(let ty=ty0;ty<=ty1;ty++)for(let tx=tx0;tx<=tx1;tx++)drawTile(tx,ty);
}
function drawTile(tx,ty){
  const x=tx*TILE,y=ty*TILE,c=tileAt(tx,ty);
  if(c===' ')dG(x,y,tx,ty);
  else if(c==='c')dC(x,y,tx,ty);
  else if(c==='p')dP(x,y,tx,ty);
  else dG(x,y,tx,ty);
}
function dG(x,y,tx,ty){
  const s=(tx*17+ty*31)%100;
  const base=(s%13<5)?C.grass2:(s%17<3?C.grass3:C.grass1);
  r(x,y,TILE,TILE,base);
  if(s%4===0){px(x+(s*7)%TILE,y+(s*5)%TILE,C.grassDk);px(x+(s*7)%TILE+1,y+(s*5)%TILE,C.grassDk);}
  if(s%5===0)px(x+(s*11)%TILE,y+(s*3)%TILE,C.grassHi);
  if(s%23===0){const fc=[C.flowerR,C.flowerY,C.flowerW,C.flowerP,C.flowerB][s%5];px(x+(s*3)%TILE,y+(s*7)%TILE,fc);}
  if(s%19===0)px(x+(s*5)%TILE,y+(s*9)%TILE,C.stone);
}
function dC(x,y,tx,ty){
  r(x,y,TILE,TILE,C.path1);
  for(let row=0;row<2;row++){
    const ry=y+row*8;
    const rowOff=((ty*2+row)&1)?4:0;
    for(let bx=-2;bx<TILE+2;bx+=8){
      const bX=x+bx+rowOff;
      const bs=(tx*7+ty*11+row*3+bx)%5;
      const bcol=bs<2?C.path2:(bs<4?C.path1:C.path3);
      r(bX,ry,7,7,bcol);
      r(bX,ry,7,1,'rgba(255,255,255,.15)');
      r(bX,ry+6,7,1,'rgba(0,0,0,.2)');
      r(bX,ry,1,7,'rgba(255,255,255,.08)');
    }
  }
  r(x,y+7,TILE,1,C.pathDk);
  r(x,y+15,TILE,1,C.pathDk);
}
function dP(x,y,tx,ty){
  r(x,y,TILE,TILE,C.plaza1);
  r(x,y,TILE,1,C.plazaDk);
  r(x,y,1,TILE,C.plazaDk);
  const s=(tx+ty)%4;
  if(s===0){
    r(x+7,y+5,2,1,C.plaza3);
    r(x+6,y+6,4,1,C.plaza3);
    r(x+5,y+7,6,2,C.plaza3);
    r(x+6,y+9,4,1,C.plaza3);
    r(x+7,y+10,2,1,C.plaza3);
  }
  const sd=(tx*7+ty*13)%9;
  if(sd<3)px(x+(sd*5)%TILE,y+(sd*7)%TILE,C.plazaDk);
  if(sd>6)px(x+(sd*3)%TILE,y+(sd*5)%TILE,C.plaza3);
  r(x,y+TILE-1,TILE,1,C.plazaLn);
  r(x+TILE-1,y,1,TILE,C.plazaLn);
}

function drawCarousel(b,now){
  const x0=b.x*TILE,y0=b.y*TILE,pw=b.w*TILE,ph=b.h*TILE;

  ctx.fillStyle=C.carDeck;
  ctx.beginPath();ctx.ellipse(cx,baseY-2,platR,4,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=C.carBaseLt;
  ctx.beginPath();ctx.ellipse(cx,baseY-3,platR,3,0,0,Math.PI*2);ctx.fill();
  for(let i=0;i<8;i++){
    const a=(i/8)*Math.PI*2;
    const lx=cx+Math.cos(a)*platR;
    const ly=baseY+Math.sin(a)*5;
    r(lx-1,ly-1,2,2,C.carPole);
  }
  const poleH=ph-12;
  r(cx-1,y0+8,2,poleH,C.carPoleDk);
  r(cx,y0+8,1,poleH,C.carPole);
  const t=now/2200;
  const numHorses=6;

  const horsePositions=[];
  for(let i=0;i<numHorses;i++){
    const a=t+(i/numHorses)*Math.PI*2;
    const hx=cx+Math.cos(a)*horseR;
    const hy=baseY-6+Math.sin(a)*4;
    horsePositions.push({hx,hy,i,a});
  }
  horsePositions.sort((a,b)=>a.hy-b.hy);
  for(const hp of horsePositions){
    const {hx,hy,i,a}=hp;
    const facing=Math.cos(a)>=0?'right':'left';

    drawCarouselHorse(hx,hy+bob,facing,i);

  const roofBaseY=y0+10;

  ctx.strokeStyle=C.carRoof3;ctx.lineWidth=1;

  ctx.fillStyle=C.gold;
  ctx.beginPath();ctx.arc(cx,roofTopY-7,2,0,Math.PI*2);ctx.fill();
  const fw=Math.sin(now/400)*1|0;
  r(cx,roofTopY-12,1,5,C.carPoleDk);

    const by=roofBaseY+Math.sin(a)*5;
    r(bx,by,1,2,(i&1)?C.carRoof2:C.carRoof1);
  }

function drawDropTower(b,now){
  const x0=b.x*TILE,y0=b.y*TILE,pw=b.w*TILE,ph=b.h*TILE;
  const cx=x0+pw/2,baseY=y0+ph-2;
  ctx.fillStyle='rgba(0,0,0,.4)';
  ctx.beginPath();ctx.ellipse(cx,baseY+3,pw/2,4,0,0,Math.PI*2);ctx.fill();
  r(x0,baseY-4,pw,6,C.dropStructDk);
  r(x0,baseY-4,pw,2,C.dropStruct);
  r(x0,baseY+2,pw,1,'rgba(0,0,0,.4)');
  for(let i=0;i<pw;i+=4){
    r(x0+i,baseY-2,2,2,(i/4)%2===0?C.dropRed:C.dropWhite);
  }
  const towerW=pw-8,towerH=ph-10;
  const tx0=cx-towerW/2,ty0=y0+4;
  r(tx0-1,ty0-1,towerW+2,towerH+2,'#1a0e10');
  r(tx0,ty0,towerW,towerH,C.dropStruct);
  for(let i=0;i<towerW;i+=3){
    r(tx0+i,ty0,1,towerH,C.dropStructDk);
    r(tx0+i+1,ty0,1,towerH,'rgba(255,255,255,.1)');
  }
  r(tx0-2,ty0,2,towerH,C.dropStructDk);
  r(tx0+towerW,ty0,2,towerH,C.dropStructDk);
  r(tx0-2,ty0,1,towerH,C.dropRed);
  r(tx0+towerW+1,ty0,1,towerH,C.dropRed);
  const cyc=(now/4500)%1;
  let carY;
  if(cyc<0.4){
    carY=ty0+towerH-12-(cyc/0.4)*(towerH-16);
  }else if(cyc<0.5){
    carY=ty0+4;
  }else if(cyc<0.55){
    const f=(cyc-0.5)/0.05;
    carY=ty0+4+f*f*(towerH-16);
  }else{
    carY=ty0+towerH-12;
  }
  carY|=0;
  const carW=towerW+6,carH=8,carX=cx-carW/2;
  r(carX-1,carY-1,carW+2,carH+2,'#1a0e10');
  r(carX,carY,carW,carH,C.dropCar);
  r(carX,carY,carW,1,'#fff8c0');
  r(carX,carY+carH-1,carW,1,C.dropCarDk);
  const numSeats=4;
  for(let i=0;i<numSeats;i++){
    const sx=carX+2+i*((carW-4)/numSeats);
    r(sx,carY+2,2,4,C.dropStructDk);
    px(sx,carY+1,C.dropStructDk);
  }
  const carPhase=Math.sin(now/200);
  if(carPhase>0)px(carX+1,carY+carH-1,C.bulbY);
  if(carPhase<0)px(carX+carW-2,carY+carH-1,C.bulbR);
  r(tx0-3,ty0-3,towerW+6,4,C.dropTop);
  r(tx0-3,ty0-3,towerW+6,1,'#80a8ff');
  r(cx-1,ty0-7,2,4,C.gold);
  ctx.fillStyle=C.gold;
  ctx.beginPath();ctx.arc(cx,ty0-7,2,0,Math.PI*2);ctx.fill();
  px(cx,ty0-9,C.flowerY);
  px(cx-1,ty0-8,C.flowerY);
  px(cx+1,ty0-8,C.flowerY);
  const sn='DROP';
  ctx.font='bold 5px ui-monospace,monospace';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle=C.dropRed;
  for(let i=0;i<sn.length;i++){
    ctx.fillText(sn[i],cx,ty0+towerH-20-i*7);
  }
  ctx.textAlign='left';ctx.textBaseline='top';
}

function drawCoaster(b,now){
  const x0=b.x*TILE,y0=b.y*TILE,pw=b.w*TILE,ph=b.h*TILE;
  ctx.fillStyle='rgba(0,0,0,.25)';
  ctx.fillRect(x0+8,y0+ph-8,pw-16,5);
  const cx=x0+pw/2,cy=y0+ph/2-2;
  const rx=pw/2-12,ry=ph/2-8;
  ctx.fillStyle=C.coastSupport;
  for(let i=0;i<12;i++){
    const a=(i/12)*Math.PI*2;
    const sx=cx+Math.cos(a)*rx;
    const sy=cy+Math.sin(a)*ry;
    ctx.fillStyle='rgba(0,0,0,.3)';
    ctx.fillRect(sx-1,sy+ry+2,2,2);
    ctx.fillStyle=C.coastSupport;
    ctx.fillRect(sx-1,sy,2,4);
    ctx.fillStyle=C.coastTrackDk;
    ctx.fillRect(sx,sy,1,4);
  }
  ctx.strokeStyle=C.coastTrack;ctx.lineWidth=2;
  ctx.beginPath();ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);ctx.stroke();
  ctx.strokeStyle=C.coastTrack;
  ctx.beginPath();ctx.ellipse(cx,cy,rx-3,ry-2,0,0,Math.PI*2);ctx.stroke();
  ctx.strokeStyle=C.coastTrackDk;ctx.lineWidth=1;
  ctx.beginPath();ctx.ellipse(cx,cy+1,rx,ry,0,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.ellipse(cx,cy+1,rx-3,ry-2,0,0,Math.PI*2);ctx.stroke();
  for(let i=0;i<32;i++){
    const a=(i/32)*Math.PI*2;
    const ox=cx+Math.cos(a)*rx,oy=cy+Math.sin(a)*ry;
    const ix=cx+Math.cos(a)*(rx-3),iy=cy+Math.sin(a)*(ry-2);
    ctx.strokeStyle=C.coastTie;ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(ix,iy);ctx.lineTo(ox,oy);ctx.stroke();
  }
  const loopX=cx-rx,loopY=cy-3;
  ctx.strokeStyle=C.coastTrack;ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(loopX,loopY,5,0,Math.PI*2);ctx.stroke();
  ctx.strokeStyle=C.coastTrackDk;ctx.lineWidth=1;
  ctx.beginPath();ctx.arc(loopX,loopY+1,5,0,Math.PI*2);ctx.stroke();
  const t=now/3000;
  const carCols=[C.coastCar,C.coastCarLt,C.coastCar];
  for(let i=0;i<3;i++){
    const a=t-(i*0.15);
    const x=cx+Math.cos(a)*(rx-1.5);
    const y=cy+Math.sin(a)*(ry-1);
    drawCoasterCar(x,y,carCols[i],a);
  }
  const stX=cx-8,stY=y0+ph-12;
  r(stX-1,stY-1,18,8,C.woodDk);
  r(stX,stY,16,6,C.wood1);
  r(stX,stY,16,1,C.wood3);
  r(stX-3,stY-3,22,3,C.coastCar);
  r(stX-3,stY-3,22,1,C.coastCarLt);
  r(stX-3,stY-1,22,1,C.coastCarDk);
  r(stX-2,stY-3,2,8,C.wood2);
  r(stX+16,stY-3,2,8,C.wood2);
  ctx.font='bold 4px ui-monospace,monospace';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle='#fffaf0';
  ctx.fillText('COASTER',stX+8,stY-1);
  ctx.textAlign='left';ctx.textBaseline='top';
  for(let i=0;i<16;i++){
    const a=(i/16)*Math.PI*2;
    const lx=cx+Math.cos(a)*(rx+2);
    const ly=cy+Math.sin(a)*(ry+1);
    const phase=(now/400+i*0.5)%(Math.PI*2);
    if(Math.sin(phase)>0)px(lx,ly,C.bulbY);
  }
}

    px(x+3,y-5,C.popcornW);

    r(x-2,y-2,1,4,C.foodStripe2);

function drawGameContents(type,sx,sy,w,h,now){
  if(type==='ringtoss'){
    for(let i=0;i<5;i++){
      const bx=sx+3+i*4,by=sy+11;
      r(bx,by,2,3,C.bumpCar2);
      r(bx,by,2,1,'#80a8ff');
      px(bx,by-1,C.bumpCar2);
      px(bx+1,by+3,C.bumpCar2);
    }
    ctx.strokeStyle=C.gameYellow;ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(sx+w-6,sy+11,2,0,Math.PI*2);ctx.stroke();
    ctx.strokeStyle=C.gameRed;
    ctx.beginPath();ctx.arc(sx+w-4,sy+13,2,0,Math.PI*2);ctx.stroke();
    ctx.strokeStyle=C.gameBlue;
    ctx.beginPath();ctx.arc(sx+w-6,sy+15,2,0,Math.PI*2);ctx.stroke();
  }else if(type==='balloondart'){
    const colors=[C.gameRed,C.gameBlue,C.gameYellow,C.gameGreen,C.bumpCar5];
    for(let r2=0;r2<3;r2++){
      for(let c2=0;c2<5;c2++){
        const bx=sx+3+c2*4,by=sy+8+r2*4;
        const c=colors[(r2*5+c2+Math.floor(now/500))%5];
        ctx.fillStyle=c;
        ctx.beginPath();ctx.ellipse(bx,by,1.5,2,0,0,Math.PI*2);ctx.fill();
        px(bx,by-1,'rgba(255,255,255,.4)');
      }
    }
  }else if(type==='basketball'){
    r(sx+w/2-5,sy+8,10,1,C.gameRed);
    r(sx+w/2-3,sy+6,6,3,'#dcdce0');
    r(sx+w/2-3,sy+6,6,1,'#fff');
    ctx.strokeStyle=C.gameRed;ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(sx+w/2,sy+10,3,0,Math.PI);ctx.stroke();
    ctx.strokeStyle='#fffaf0';ctx.lineWidth=1;
    for(let i=-2;i<=2;i++){
      ctx.beginPath();
      ctx.moveTo(sx+w/2+i,sy+10);
      ctx.lineTo(sx+w/2+i*0.6,sy+13);
      ctx.stroke();
    }
    ctx.fillStyle=C.foodStripe1;
    ctx.beginPath();ctx.arc(sx+w/2,sy+16,2,0,Math.PI*2);ctx.fill();
    px(sx+w/2,sy+16,'#3a2010');
    px(sx+w/2-1,sy+15,'rgba(255,255,255,.4)');
  }
}

function drawFloatBalloons(now){
  for(const b of floatBalloons){
    const sw=Math.sin(now/700+b.seed)*4;
    const bx=b.bx+sw,by=b.by+Math.cos(now/900+b.seed)*2;
    ctx.strokeStyle='rgba(255,255,255,.4)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(bx,by+5);ctx.lineTo(bx-sw*.3,by+15);ctx.stroke();
    ctx.fillStyle=b.c;
    ctx.beginPath();ctx.ellipse(bx,by,4,5,0,0,Math.PI*2);ctx.fill();
    px(bx-1,by-2,'rgba(255,255,255,.5)');
    px(bx,by-3,'rgba(255,255,255,.7)');
    px(bx,by+5,b.c);
  }
}

function drawBanners(now){
  for(const b of banners){
    const x1=b.x1*TILE+8,y1=b.y1*TILE+12,x2=b.x2*TILE+8,y2=b.y2*TILE+12;
    ctx.strokeStyle='#3a2010';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
    const segs=Math.floor((x2-x1)/6);
    for(let i=0;i<segs;i++){
      const xMid=x1+(i+0.5)*((x2-x1)/segs);
      const sag=Math.sin(((i/segs)*Math.PI))*2;
      const yp=y1+sag;
      const sw=Math.sin(now/600+i)*0.5;
      const c=[C.bannerR,C.bannerY,C.bannerB,C.bannerW][i%4];
      ctx.fillStyle=c;
      ctx.beginPath();
      ctx.moveTo(xMid-2+sw,yp);
      ctx.lineTo(xMid+2+sw,yp);
      ctx.lineTo(xMid+sw,yp+4);
      ctx.closePath();ctx.fill();
    }
  }
}

function drawStringLights(now){
  for(const sl of stringLights){
    const [a,b]=sl;
    const x1=a[0],y1=a[1],x2=b[0],y2=b[1];
    ctx.strokeStyle='#3a2010';ctx.lineWidth=1;
    const segs=10;
    ctx.beginPath();
    for(let i=0;i<=segs;i++){
      const t=i/segs;
      const x=x1+(x2-x1)*t;
      const sag=Math.sin(t*Math.PI)*4;
      const y=y1+(y2-y1)*t+sag;
      if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
    }
    ctx.stroke();
    for(let i=1;i<segs;i++){
      const t=i/segs;
      const x=x1+(x2-x1)*t;
      const sag=Math.sin(t*Math.PI)*4;
      const y=y1+(y2-y1)*t+sag;
      const phase=(now/300+i*0.6+a[0]*.01)%(Math.PI*2);
      const lit=Math.sin(phase)>0;
      const c=[C.bulbY,C.bulbR,C.bulbB,C.bulbG][i%4];
      if(lit){
        ctx.fillStyle='rgba(255,255,200,.2)';
        ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fill();
        px(x,y,c);
        px(x,y+1,c);
      }else{
        px(x,y,'#5a5a5a');
      }
    }
  }
}

function drawPerson(x,y,dir,frame,c){
  const fx=Math.round(x),fy=Math.round(y);
  ctx.fillStyle='rgba(0,0,0,.4)';ctx.fillRect(fx-4,fy,9,2);
  const lf=frame===1?1:0,rf=frame===3?1:0;
  ctx.fillStyle=c.pants;
  ctx.fillRect(fx-3,fy-5+lf,2,5-lf);ctx.fillRect(fx+1,fy-5+rf,2,5-rf);
  ctx.fillStyle=c.shirt;ctx.fillRect(fx-3,fy-10,6,5);
  if(c.shirt2){ctx.fillStyle=c.shirt2;ctx.fillRect(fx-3,fy-7,6,2);}
  ctx.fillStyle=c.shirt;ctx.fillRect(fx-4,fy-9,1,4);ctx.fillRect(fx+3,fy-9,1,4);
  ctx.fillStyle=c.skin;ctx.fillRect(fx-4,fy-6,1,1);ctx.fillRect(fx+3,fy-6,1,1);
  if(c.acc){ctx.fillStyle=c.acc;ctx.fillRect(fx-1,fy-10,2,1);}
  ctx.fillStyle=c.skin;ctx.fillRect(fx-3,fy-15,6,5);
  ctx.fillStyle=c.hair;
  if(dir==='up'){ctx.fillRect(fx-3,fy-15,6,4);ctx.fillRect(fx-3,fy-11,1,1);ctx.fillRect(fx+2,fy-11,1,1);}
  else if(dir==='down'){ctx.fillRect(fx-3,fy-15,6,2);ctx.fillRect(fx-3,fy-13,1,2);ctx.fillRect(fx+2,fy-13,1,2);}
  else if(dir==='left'){ctx.fillRect(fx-3,fy-15,6,2);ctx.fillRect(fx-3,fy-13,2,3);ctx.fillRect(fx+2,fy-13,1,1);}
  else{ctx.fillRect(fx-3,fy-15,6,2);ctx.fillRect(fx+1,fy-13,2,3);ctx.fillRect(fx-3,fy-13,1,1);}
  ctx.fillStyle='#1a1010';
  if(dir==='down'){ctx.fillRect(fx-2,fy-12,1,1);ctx.fillRect(fx+1,fy-12,1,1);}
  else if(dir==='left')ctx.fillRect(fx-2,fy-12,1,1);
  else if(dir==='right')ctx.fillRect(fx+1,fy-12,1,1);
}

function drawPersonExtras(npc,now){
  const fx=Math.round(npc.x),fy=Math.round(npc.y);
  if(npc.balloon){
    const sw=Math.sin(now/500+npc.x*.05)*1;
    const bx=fx+4+sw,by=fy-22;
    ctx.strokeStyle='rgba(255,255,255,.5)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(fx+2,fy-10);ctx.lineTo(bx,by+3);ctx.stroke();
    ctx.fillStyle=C.brPink;
    ctx.beginPath();ctx.ellipse(bx,by,3,4,0,0,Math.PI*2);ctx.fill();
    px(bx-1,by-1,'rgba(255,255,255,.5)');
    px(bx,by+4,C.brPink);
  }
  if(npc.mascot){
    const sw=Math.sin(now/300)*1|0;
    r(fx-2,fy-18+sw,1,3,C.mascotPk);
    r(fx+2,fy-18-sw,1,3,C.mascotPk);
    if((now/200|0)%4===0){
      const sx=fx+(now/100|0%6-3);
      px(sx,fy-20,C.flowerY);
    }
  }
}

function drawCat(c,now){
  const fx=Math.round(c.x),fy=Math.round(c.y);
  ctx.fillStyle='rgba(0,0,0,.35)';ctx.fillRect(fx-5,fy+1,11,2);
  r(fx-5,fy-3,10,5,c.base);r(fx-5,fy-3,10,1,c.light);r(fx-5,fy+1,10,1,c.dark);
  r(fx-4,fy+2,2,2,c.dark);r(fx+2,fy+2,2,2,c.dark);
  const tl=Math.sin(now/320)*2|0;
  r(fx+4,fy-1+tl,3,2,c.base);r(fx+6,fy-2+tl,1,2,c.light);
  r(fx-3,fy-7,6,5,c.base);r(fx-3,fy-7,6,1,c.light);
  r(fx-3,fy-8,2,2,c.base);r(fx+1,fy-8,2,2,c.base);
  px(fx-2,fy-7,c.dark);px(fx+2,fy-7,c.dark);
  c.blinkT-=16;
  const bk=c.blinkT>0&&c.blinkT<120;
  if(Math.random()<.003)c.blinkT=200;
  if(!bk){px(fx-2,fy-5,'#0a0a0c');px(fx+1,fy-5,'#0a0a0c');}
  else{r(fx-2,fy-5,1,1,c.dark);r(fx+1,fy-5,1,1,c.dark);}
  px(fx,fy-3,c.dark);px(fx-1,fy-2,c.dark);px(fx+1,fy-2,c.dark);
}

function drawBubble(b){
  ctx.font='6px ui-monospace,monospace';ctx.textBaseline='top';ctx.textAlign='left';
  const ws=b.line.split(' '),lines=[];
  let cur='';
  for(const w of ws){const t=cur?cur+' '+w:w;
    if(ctx.measureText(t).width>130&&cur){lines.push(cur);cur=w;}else cur=t;}
  if(cur)lines.push(cur);
  const iw=Math.max(ctx.measureText(b.name).width,...lines.map(l=>ctx.measureText(l).width));
  const bw=Math.ceil(iw)+8,bh=4+7+lines.length*7+4;
  let bx=Math.round(b.x-cam.x-bw/2),by=Math.round(b.y-cam.y-bh);
  bx=Math.max(2,Math.min(W-bw-2,bx));by=Math.max(2,by);
  ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(bx+1,by+1,bw,bh);
  r(bx,by,bw,bh,'#101013');r(bx+1,by+1,bw-2,bh-2,'#1a1820');
  const g=ctx.createLinearGradient(bx,by,bx+bw,by);
  g.addColorStop(0,'#ff7849');g.addColorStop(.33,'#ff4d8d');g.addColorStop(.66,'#c870e0');g.addColorStop(1,'#4d8aff');
  ctx.fillStyle=g;ctx.fillRect(bx,by,bw,1);
  r(bx,by,1,1,b.accent);r(bx+bw-1,by,1,1,b.accent);
  ctx.fillStyle=b.accent;ctx.fillText(b.name,bx+4,by+3);
  ctx.fillStyle='#d8d8dc';
  lines.forEach((l,i)=>ctx.fillText(l,bx+4,by+3+7+i*7));
  const tx=Math.max(bx+3,Math.min(bx+bw-4,b.x-cam.x-2));
  r(tx,by+bh,4,1,'#1a1820');r(tx+1,by+bh+1,2,1,'#1a1820');
}

function drawHint(){
  let nearest=null,nd=22;
  for(const t of [...npcs,...cats]){
    const d=Math.hypot(t.x-player.x,(t.y-6)-(player.y-6));
    if(d<nd){nd=d;nearest=t;}
  }
  if(!nearest){
    for(const b of buildings){
      const cx=(b.x+b.w/2)*TILE,cy=(b.y+b.h)*TILE-12;
      const dist=Math.hypot(cx-player.x,cy-player.y);
      if(dist<60&&dist<nd*3){nd=dist/2;nearest={x:cx,y:cy};}
    }
  }
  if(!nearest){
    for(const d of interactables){
      const cx=d.sx?d.sx+d.sw/2:d.x,cy=d.sy?d.sy+d.sh/2:d.y;
      const dd=Math.hypot(cx-player.x,cy-player.y);
      if(dd<30&&dd<nd){nd=dd;nearest={x:cx,y:d.sy||d.y};}
    }
  }
  if(nearest){
    const t=performance.now(),yo=Math.sin(t/240)*1.5;
    const sx=Math.round(nearest.x-cam.x),sy=Math.round(nearest.y-cam.y-26+yo);
    r(sx-4,sy-5,9,9,'#101013');r(sx-3,sy-4,7,7,'#1a1820');
    ctx.font='bold 7px ui-monospace,monospace';ctx.textBaseline='top';
    ctx.fillStyle='#ff4d8d';ctx.fillText('E',sx-2,sy-4);
  }
}

function render(now){
  curNow=now;
  ctx.fillStyle='#06060a';ctx.fillRect(0,0,W,H);
  ctx.save();ctx.translate(-cam.x,-cam.y);
  drawTiles();
  drawBanners(now);
  const items=[];
  for(const d of decorations)items.push({k:'d',y:(d.sy?d.sy+(d.sh||0):d.y)||0,o:d});
  for(const n of npcs)items.push({k:'n',y:n.y,o:n});
  for(const ct of cats)items.push({k:'cat',y:ct.y,o:ct});
  for(const b of buildings)items.push({k:'b',y:(b.y+b.h)*TILE,o:b});
  items.push({k:'p',y:player.y});
  items.sort((a,b)=>a.y-b.y);
  for(const it of items){
    if(it.k==='d'){const fn=DD[it.o.type];if(fn)fn(it.o,now);}
    else if(it.k==='n'){drawPerson(it.o.x,it.o.y,it.o.dir,it.o._frame||0,it.o.colors);drawPersonExtras(it.o,now);}
    else if(it.k==='cat')drawCat(it.o,now);
    else if(it.k==='b'){
      if(it.o.kind==='ferris')drawFerris(it.o,now);
      else if(it.o.kind==='carousel')drawCarousel(it.o,now);
      else if(it.o.kind==='teacups')drawTeacups(it.o,now);
      else if(it.o.kind==='droptower')drawDropTower(it.o,now);
      else if(it.o.kind==='coaster')drawCoaster(it.o,now);
      else if(it.o.kind==='bumpercars')drawBumperCars(it.o,now);
      else if(it.o.kind==='entrance')drawEntranceArch(it.o,now);
    }
    else drawPerson(player.x,player.y,player.dir,player.frame,player.colors);
  }
  drawStringLights(now);
  drawFloatBalloons(now);
  ctx.restore();
  drawHint();
  if(bubble){if(bubble.until>now)drawBubble(bubble);else bubble=null;}
  document.getElementById('zone').textContent=zoneOf(player.x,player.y);
}

let last=performance.now();
function frame(now){
  const dt=Math.min(40,now-last);last=now;
  update(dt);render(now);
  requestAnimationFrame(frame);
}
updateCam();
requestAnimationFrame(frame);
})();
</script>

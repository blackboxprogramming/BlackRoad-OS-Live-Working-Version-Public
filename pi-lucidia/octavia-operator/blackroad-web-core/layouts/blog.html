<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}} — BlackRoad</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/tokens.css">
  <link rel="stylesheet" href="../assets/css/motion.css">
  <link rel="stylesheet" href="../assets/css/core.css">
  <style>
    .blog-content {
      max-width: 680px;
      margin: 0 auto;
      padding: 48px 24px;
    }
    .blog-content h2 {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      margin: 36px 0 12px;
    }
    .blog-content p {
      font-size: var(--fs-lg);
      color: var(--muted-2);
      line-height: var(--lh-body);
      margin-bottom: 16px;
    }
    .blog-content code {
      background: var(--bg-surface);
      padding: 2px 6px;
      font-size: var(--fs-base);
      color: var(--muted-1);
    }
    .blog-date {
      font-size: var(--fs-sm);
      color: var(--muted-4);
      letter-spacing: 0.15em;
    }
    @media (min-width: 768px) {
      .blog-content { padding: 64px 40px; }
    }
  </style>
</head>
<body>

  <header>
    <a href="../index.html" class="logo">BlackRoad</a>
    <nav>
      <a href="../index.html">home</a>
      <a href="../pages/enterprise.html">enterprise</a>
      <a href="../pages/organizations.html">orgs</a>
      <a href="../pages/domains.html">domains</a>
    </nav>
  </header>
  <div class="grad-rule"></div>

  <div class="blog-content">
    {{CONTENT}}
  </div>

  <footer>
    <span>BlackRoad OS, Inc.</span>
    <span>Blog</span>
  </footer>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}} — BlackRoad Docs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/tokens.css">
  <link rel="stylesheet" href="../assets/css/motion.css">
  <link rel="stylesheet" href="../assets/css/core.css">
  <style>
    .docs-grid {
      display: grid;
      grid-template-columns: 220px 1fr;
      min-height: calc(100vh - 60px);
    }
    .docs-nav {
      background: var(--bg);
      border-right: var(--border);
      padding: 24px 16px;
      position: sticky;
      top: 47px;
      height: calc(100vh - 47px);
      overflow-y: auto;
    }
    .docs-nav-group {
      margin-bottom: 20px;
    }
    .docs-nav-title {
      font-size: var(--fs-xs);
      color: var(--muted-4);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .docs-nav a {
      display: block;
      font-size: var(--fs-sm);
      color: var(--muted-3);
      padding: 4px 8px;
      margin-bottom: 2px;
      transition: color 0.15s var(--ease);
    }
    .docs-nav a:hover,
    .docs-nav a.active { color: var(--text); }
    .docs-body {
      padding: 40px;
      max-width: 760px;
    }
    .docs-body h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 16px; }
    .docs-body h2 { font-size: 1.1rem; font-weight: 700; margin: 32px 0 10px; }
    .docs-body p {
      font-size: var(--fs-lg);
      color: var(--muted-2);
      line-height: var(--lh-body);
      margin-bottom: 14px;
    }
    .docs-body pre {
      background: var(--bg-surface);
      border: 1px solid var(--bg-raised);
      padding: 14px 16px;
      font-size: var(--fs-base);
      color: var(--muted-1);
      overflow-x: auto;
      margin-bottom: 18px;
      line-height: 1.8;
    }
    @media (max-width: 767px) {
      .docs-grid { grid-template-columns: 1fr; }
      .docs-nav { position: static; height: auto; border-right: none; border-bottom: var(--border); }
      .docs-body { padding: 24px; }
    }
  </style>
</head>
<body>

  <header>
    <a href="../index.html" class="logo">BlackRoad</a>
    <nav>
      <a href="../index.html">home</a>
      <a href="../pages/enterprise.html">enterprise</a>
      <a href="../pages/organizations.html">orgs</a>
      <a href="../pages/domains.html">domains</a>
    </nav>
  </header>
  <div class="grad-rule"></div>

  <div class="docs-grid">
    <nav class="docs-nav">
      {{SIDEBAR}}
    </nav>
    <main class="docs-body">
      {{CONTENT}}
    </main>
  </div>

  <footer>
    <span>BlackRoad OS, Inc.</span>
    <span>Documentation</span>
  </footer>

</body>
</html>

<!-- BLACKROAD CARD COMPONENT
     Use inside .grid containers -->

<!-- Standard Card -->
<div class="card">
  <div class="card-label">{{LABEL}}</div>
  <div class="card-name">{{NAME}}</div>
  <div class="card-desc">{{DESC}}</div>
</div>

<!-- Link Card (clickable) -->
<a href="{{URL}}" class="link-item">
  <div>
    <div class="link-name">{{NAME}}</div>
    <div class="link-desc">{{DESC}}</div>
  </div>
  <span class="link-arrow">&rarr;</span>
</a>

<!-- Package Card -->
<div class="package-item">
  <span class="pkg-name">{{NAME}}</span>
  <span class="pkg-desc">{{DESC}}</span>
  <div class="pkg-meta">
    <span class="pkg-tag">v <span>{{VERSION}}</span></span>
    <span class="pkg-tag">size <span>{{SIZE}}</span></span>
  </div>
</div>

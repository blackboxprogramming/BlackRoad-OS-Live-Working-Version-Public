<!-- BLACKROAD GRID COMPONENT
     Responsive grid system. Use .grid (3-col), .grid-2, .grid-3, .grid-4 -->

<!-- 3-column grid (default) -->
<div class="grid">
  <div class="section"><!-- Column 1 --></div>
  <div class="section"><!-- Column 2 --></div>
  <div class="section"><!-- Column 3 --></div>
</div>

<!-- 2-column grid -->
<div class="grid-2">
  <div class="section"><!-- Column 1 --></div>
  <div class="section"><!-- Column 2 --></div>
</div>

<!-- 4-column grid -->
<div class="grid-4">
  <div class="section"><!-- Column 1 --></div>
  <div class="section"><!-- Column 2 --></div>
  <div class="section"><!-- Column 3 --></div>
  <div class="section"><!-- Column 4 --></div>
</div>
